name: Agent repair weight evidence

on:
  push:
    branches:
      - agent/c245b2f4/04922595/fix-weight-evidence
    paths:
      - scripts/agent_repair_weight_evidence.py
      - .github/workflows/agent-repair-weight-evidence.yml

permissions:
  contents: write

jobs:
  repair-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/c245b2f4/04922595/fix-weight-evidence
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply deterministic compatibility repair
        run: python scripts/agent_repair_weight_evidence.py
      - name: Validate catalog-v4 contracts
        run: |
          python -m compileall -q scripts/catalog_v4 tests/catalog_v4
          python -m unittest discover -s tests/catalog_v4 -v
      - name: Commit validated repair and remove temporary tooling
        run: |
          git config user.name "dropfinder-agent"
          git config user.email "actions@users.noreply.github.com"
          git rm scripts/agent_repair_weight_evidence.py .github/workflows/agent-repair-weight-evidence.yml
          git add scripts/catalog_v4/normalization.py tests/catalog_v4/test_normalization.py tests/catalog_v4/test_weight_evidence.py tests/catalog_v4/test_cli.py
          git diff --cached --check
          git commit -m "fix(catalog-v4): preserve structured numeric weights"
          git push origin HEAD:agent/c245b2f4/04922595/fix-weight-evidence
