name: DropFinder Autonomous Cloud

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"
  push:
    branches: [main, "ui-rewrite/**"]
    paths:
      - "scripts/cloud_scan.py"
      - "scripts/cloud_scan_v2.py"
      - "scripts/autonomous_worker.py"
      - "scripts/autonomous_worker_v2.py"
      - "scripts/autonomous_worker_v4.py"
      - "scripts/autonomous_merge.py"
      - "cloud_pages/index.html"
      - "cloud_pages/manifest.webmanifest"
      - "cloud_pages/icon.svg"
      - "cloud_pages/sw.js"
      - "web/**"
      - "docs/UI_REWRITE_CONTRACT.md"
      - ".github/workflows/dropfinder-cloud.yml"
  pull_request:
    branches: [main]
    paths:
      - "cloud_pages/manifest.webmanifest"
      - "cloud_pages/icon.svg"
      - "cloud_pages/sw.js"
      - "web/**"
      - "docs/UI_REWRITE_CONTRACT.md"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: dropfinder-autonomous-cloud-${{ github.ref }}
  cancel-in-progress: false

jobs:
  python-validation:
    name: Python contract validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run affected Python self-tests
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/cloud_scan.py scripts/cloud_scan_v2.py \
            scripts/autonomous_worker.py scripts/autonomous_worker_v2.py \
            scripts/autonomous_worker_v4.py scripts/autonomous_merge.py \
            web/scripts/publication_gate.py
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v4.py --self-test
          rm -rf /tmp/dropfinder-autonomous-merge-test
          python scripts/autonomous_merge.py --self-test

  frontend:
    name: Frontend foundation validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned frontend dependencies
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Lint frontend
        working-directory: web
        run: npm run lint
      - name: Typecheck frontend
        working-directory: web
        run: npm run typecheck
      - name: Test frontend contracts and shell
        working-directory: web
        run: npm test
      - name: Build and verify static publication
        working-directory: web
        run: |
          npm run build
          npm run verify:publication
      - name: Export generated lockfile checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dropfinder-web-package-lock
          path: web/package-lock.json
          if-no-files-found: error
          retention-days: 1
      - name: Commit generated lockfile checkpoint
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/ui-rewrite/01-foundation-contracts'
        run: |
          set -euo pipefail
          git config user.name "DropFinder UI Builder"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "build(ui): lock frontend dependencies [skip ci]"
            git pull --rebase origin ui-rewrite/01-foundation-contracts
            git push origin HEAD:ui-rewrite/01-foundation-contracts
          fi

  scan:
    name: Retrieval worker ${{ matrix.shard }}
    needs: python-validation
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Retrieve, retry, verify, and classify storefront data
        run: |
          set -euo pipefail
          mkdir -p "scan-output/${{ matrix.shard }}"
          python scripts/autonomous_worker_v4.py \
            --shard "${{ matrix.shard }}" --shards 6 --workers 3 \
            --output "scan-output/${{ matrix.shard }}"
      - uses: actions/upload-artifact@v4
        with:
          name: autonomous-shard-${{ matrix.shard }}
          path: scan-output/${{ matrix.shard }}/shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Admit healthy sources and publish atomically
    needs: [frontend, python-validation, scan]
    if: needs.frontend.result == 'success' && needs.python-validation.result == 'success' && needs.scan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: autonomous-shard-*
          path: scan-results
          merge-multiple: true
      - name: Admit a zero-degraded production snapshot
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-autonomous-merge-test
          python scripts/autonomous_merge.py --self-test
          python scripts/autonomous_merge.py \
            --input scan-results --output cloud_pages/data \
            --min-active 5 --min-products 25
          python web/scripts/publication_gate.py validate-snapshot
      - name: Commit runtime state to main
        run: |
          set -euo pipefail
          mkdir -p deployment
          cp cloud_pages/data/runtime.json deployment/autonomous-runtime.json
          git config user.name "DropFinder Autonomous Worker"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_pages/data deployment/autonomous-runtime.json
          if ! git diff --cached --quiet; then
            git commit -m "Refresh zero-degraded DropFinder catalog [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build deterministic frontend without touching generated data
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm run verify:publication
      - name: Publish immutable phone app to gh-pages
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-site
          mkdir -p /tmp/dropfinder-site
          cp -a cloud_pages/. /tmp/dropfinder-site/
          touch /tmp/dropfinder-site/.nojekyll
          test -s /tmp/dropfinder-site/data/catalog.json
          test -s /tmp/dropfinder-site/data/status.json
          test -s /tmp/dropfinder-site/data/runtime.json
          test -s /tmp/dropfinder-site/assets/vite-manifest.json
          git config user.name "DropFinder Autonomous Publisher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan autonomous-pages-next
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx >/dev/null 2>&1 || true
          cp -a /tmp/dropfinder-site/. .
          git add -A
          git commit -m "Publish autonomous DropFinder catalog ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
      - name: Verify published branch tree
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          rm -rf /tmp/dropfinder-published
          git worktree add --detach /tmp/dropfinder-published origin/gh-pages
          node web/scripts/verify-publication.mjs /tmp/dropfinder-published
          python web/scripts/publication_gate.py verify-published --root /tmp/dropfinder-published
      - name: Record synchronized deployment receipt
        run: |
          set -euo pipefail
          git switch --force main
          git pull --rebase origin main
          git fetch origin gh-pages
          python web/scripts/publication_gate.py record-receipt
          git config user.name "DropFinder Autonomous Publisher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/cdn.json
          if ! git diff --cached --quiet; then
            git commit -m "Record current autonomous deployment [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
