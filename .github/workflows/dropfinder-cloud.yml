name: DropFinder Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cloud_pages/**"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dropfinder-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        id: configure
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static dashboard
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: cloud_pages

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record workflow outcome
        if: always()
        env:
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          mkdir -p deployment-status
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          payload = {
              "source_commit": os.environ["GITHUB_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "recorded_at": datetime.now(timezone.utc).isoformat(),
              "configure_outcome": os.environ.get("CONFIGURE_OUTCOME", "unknown"),
              "upload_outcome": os.environ.get("UPLOAD_OUTCOME", "unknown"),
              "deploy_outcome": os.environ.get("DEPLOY_OUTCOME", "unknown"),
              "page_url": os.environ.get("PAGE_URL", ""),
          }
          payload["status"] = "deployed" if payload["deploy_outcome"] == "success" else "failed"
          with open("deployment-status/pages-workflow.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
              handle.write("\n")
          PY
          git config user.name "DropFinder Pages Bot"
          git config user.email "actions@users.noreply.github.com"
          git add deployment-status/pages-workflow.json
          git commit -m "Record GitHub Pages workflow outcome" || exit 0
          git push origin HEAD:main
