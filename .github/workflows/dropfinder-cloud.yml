name: DropFinder Autonomous Cloud

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/cloud_scan.py"
      - "scripts/cloud_scan_v2.py"
      - "scripts/autonomous_worker.py"
      - "scripts/autonomous_worker_v2.py"
      - "scripts/autonomous_worker_v4.py"
      - "scripts/autonomous_merge.py"
      - "web/**"
      - "tests/test_dropfinder_cloud_workflow_permissions.py"
      - ".github/workflows/dropfinder-cloud.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/cloud_scan.py"
      - "scripts/cloud_scan_v2.py"
      - "scripts/autonomous_worker.py"
      - "scripts/autonomous_worker_v2.py"
      - "scripts/autonomous_worker_v4.py"
      - "scripts/autonomous_merge.py"
      - "web/**"
      - "tests/test_dropfinder_cloud_workflow_permissions.py"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: read

concurrency:
  group: dropfinder-autonomous-cloud-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-validation:
    name: Python contract validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run affected Python self-tests
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/cloud_scan.py scripts/cloud_scan_v2.py \
            scripts/autonomous_worker.py scripts/autonomous_worker_v2.py \
            scripts/autonomous_worker_v4.py scripts/autonomous_merge.py \
            web/scripts/publication_gate.py
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v4.py --self-test
          rm -rf /tmp/dropfinder-autonomous-merge-test
          python scripts/autonomous_merge.py --self-test
          python -m unittest -v tests.test_dropfinder_cloud_workflow_permissions

  frontend:
    name: Frontend foundation validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install locked frontend dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund
      - name: Validate frontend and publication tree
        working-directory: web
        run: |
          set -euo pipefail
          npm run lint
          npm run typecheck
          npm test
          npm run build
          npm run verify:publication

  scan:
    name: Manual retrieval worker ${{ matrix.shard }}
    needs: python-validation
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Retrieve, retry, verify, and classify storefront data
        run: |
          set -euo pipefail
          mkdir -p "scan-output/${{ matrix.shard }}"
          python scripts/autonomous_worker_v4.py \
            --shard "${{ matrix.shard }}" --shards 6 --workers 3 \
            --output "scan-output/${{ matrix.shard }}"
      - uses: actions/upload-artifact@v4
        with:
          name: autonomous-shard-${{ matrix.shard }}
          path: scan-output/${{ matrix.shard }}/shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 1
