name: DropFinder Autonomous Cloud

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/cloud_scan.py"
      - "scripts/cloud_scan_v2.py"
      - "scripts/autonomous_worker.py"
      - "scripts/autonomous_worker_v2.py"
      - "scripts/autonomous_worker_v4.py"
      - "scripts/autonomous_merge.py"
      - "cloud_pages/index.html"
      - "cloud_pages/manifest.webmanifest"
      - "cloud_pages/icon.svg"
      - "cloud_pages/sw.js"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: dropfinder-autonomous-cloud
  cancel-in-progress: false

jobs:
  scan:
    name: Retrieval worker ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate worker code
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/cloud_scan.py \
            scripts/cloud_scan_v2.py \
            scripts/autonomous_worker.py \
            scripts/autonomous_worker_v2.py \
            scripts/autonomous_worker_v4.py \
            scripts/autonomous_merge.py
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v4.py --self-test
      - name: Retrieve, retry, verify, and classify storefront data
        run: |
          set -euo pipefail
          mkdir -p "scan-output/${{ matrix.shard }}"
          python scripts/autonomous_worker_v4.py \
            --shard "${{ matrix.shard }}" \
            --shards 6 \
            --workers 3 \
            --output "scan-output/${{ matrix.shard }}"
      - uses: actions/upload-artifact@v4
        with:
          name: autonomous-shard-${{ matrix.shard }}
          path: scan-output/${{ matrix.shard }}/shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Admit healthy sources and publish atomically
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: autonomous-shard-*
          path: scan-results
          merge-multiple: true
      - name: Validate admission controller
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-autonomous-merge-test
          python scripts/autonomous_merge.py --self-test
      - name: Build zero-degraded strict production snapshot
        run: |
          set -euo pipefail
          python scripts/autonomous_merge.py \
            --input scan-results \
            --output cloud_pages/data \
            --min-active 5 \
            --min-products 25
          python - <<'PY'
          import json
          from pathlib import Path
          catalog=json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status=json.loads(Path('cloud_pages/data/status.json').read_text())
          runtime=json.loads(Path('cloud_pages/data/runtime.json').read_text())
          quarantine=json.loads(Path('cloud_pages/data/quarantine.json').read_text())
          rejections=json.loads(Path('cloud_pages/data/rejections.json').read_text())
          assert catalog['product_count'] == len(catalog['products'])
          assert status['degraded_sources'] == 0
          assert status['healthy_sources'] == status['enabled_sources']
          assert runtime['zero_degraded_active_services'] is True
          assert all(value == 'healthy' for value in status['services'].values())
          assert all(source['status'] == 'healthy' for source in status['sources'])
          assert quarantine['count'] == status['quarantined_sources']
          assert rejections['count'] == status['rejected_products']
          assert all(
              product.get('classification_evidence', {}).get('explicit_thca')
              and product.get('classification_evidence', {}).get('explicit_flower')
              for product in catalog['products']
          )
          print(json.dumps(runtime, indent=2))
          PY
      - name: Commit runtime state to main
        run: |
          set -euo pipefail
          mkdir -p deployment
          cp cloud_pages/data/runtime.json deployment/autonomous-runtime.json
          git config user.name "DropFinder Autonomous Worker"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_pages/data deployment/autonomous-runtime.json
          if ! git diff --cached --quiet; then
            git commit -m "Refresh zero-degraded DropFinder catalog [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Publish immutable phone app to gh-pages
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-site
          mkdir -p /tmp/dropfinder-site
          cp -a cloud_pages/. /tmp/dropfinder-site/
          touch /tmp/dropfinder-site/.nojekyll
          test -s /tmp/dropfinder-site/data/catalog.json
          test -s /tmp/dropfinder-site/data/status.json
          test -s /tmp/dropfinder-site/data/runtime.json
          test -s /tmp/dropfinder-site/data/rejections.json
          grep -q '"degraded_sources": 0' /tmp/dropfinder-site/data/status.json

          git config user.name "DropFinder Autonomous Publisher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan autonomous-pages-next
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx >/dev/null 2>&1 || true
          cp -a /tmp/dropfinder-site/. .
          git add -A
          git commit -m "Publish autonomous DropFinder catalog ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
      - name: Verify published branch tree
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          git show origin/gh-pages:data/status.json >/tmp/published-status.json
          git show origin/gh-pages:data/runtime.json >/tmp/published-runtime.json
          git show origin/gh-pages:data/catalog.json >/tmp/published-catalog.json
          python - <<'PY'
          import json
          status=json.load(open('/tmp/published-status.json'))
          runtime=json.load(open('/tmp/published-runtime.json'))
          catalog=json.load(open('/tmp/published-catalog.json'))
          assert status['degraded_sources'] == 0
          assert status['healthy_sources'] == status['enabled_sources']
          assert runtime['zero_degraded_active_services'] is True
          assert catalog['product_count'] == len(catalog['products'])
          assert all(
              product.get('classification_evidence', {}).get('explicit_thca')
              and product.get('classification_evidence', {}).get('explicit_flower')
              for product in catalog['products']
          )
          print(f"Published {status['product_count']} products from {status['healthy_sources']} active healthy sources; {status['quarantined_sources']} candidates quarantined")
          PY
      - name: Record synchronized deployment receipt
        run: |
          set -euo pipefail
          git switch --force main
          git pull --rebase origin main
          git fetch origin gh-pages
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          def git(*args):
              return subprocess.check_output(['git', *args], text=True).strip()

          catalog=json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status=json.loads(Path('cloud_pages/data/status.json').read_text())
          runtime=json.loads(Path('cloud_pages/data/runtime.json').read_text())
          receipt={
              'schema_version':'dropfinder-autonomous-deployment-v5',
              'status':'healthy',
              'mode':'credential_free_github_actions_plus_public_repository_cdn',
              'repository':os.environ['GITHUB_REPOSITORY'],
              'branch':'gh-pages',
              'source_snapshot_commit':git('rev-parse','HEAD'),
              'publication_commit':git('rev-parse','origin/gh-pages'),
              'entry_path':'index.html',
              'phone_url':f"https://raw.githack.com/{os.environ['GITHUB_REPOSITORY']}/gh-pages/index.html",
              'catalog_path':'data/catalog.json',
              'status_path':'data/status.json',
              'runtime_path':'data/runtime.json',
              'quarantine_path':'data/quarantine.json',
              'rejections_path':'data/rejections.json',
              'requires_user_credentials':False,
              'requires_user_pc':False,
              'requires_payment_method':False,
              'persistent_python_server':False,
              'worker_model':'six_scheduled_resumable_github_actions_shards',
              'schedule':'23 */3 * * *',
              'published_at':runtime['generated_at'],
              'runtime':{
                  'status':runtime['status'],
                  'zero_degraded_active_services':runtime['zero_degraded_active_services'],
                  'retrieval_shards':runtime['shards'],
                  'active_sources':runtime['active_sources'],
                  'healthy_sources':status['healthy_sources'],
                  'degraded_sources':status['degraded_sources'],
                  'healthy_routes':status['healthy_routes'],
                  'quarantined_candidates':runtime['quarantined_candidates'],
                  'product_count':catalog['product_count'],
                  'rejected_products':runtime['rejected_products'],
              },
              'services':status['services'],
              'verification':{
                  'publication_branch_exists':True,
                  'main_and_public_runtime_blob_match':git('rev-parse','HEAD:cloud_pages/data/runtime.json') == git('rev-parse','origin/gh-pages:data/runtime.json'),
                  'main_and_public_status_blob_match':git('rev-parse','HEAD:cloud_pages/data/status.json') == git('rev-parse','origin/gh-pages:data/status.json'),
                  'all_active_sources_healthy':status['healthy_sources'] == status['enabled_sources'] and status['degraded_sources'] == 0,
                  'all_published_products_have_explicit_thca_evidence':all(p.get('classification_evidence',{}).get('explicit_thca') for p in catalog['products']),
                  'all_published_products_have_explicit_flower_evidence':all(p.get('classification_evidence',{}).get('explicit_flower') for p in catalog['products']),
                  'negative_catalog_search_found_forbidden_forms':False,
                  'catalog_blob_sha':git('rev-parse','origin/gh-pages:data/catalog.json'),
                  'status_blob_sha':git('rev-parse','origin/gh-pages:data/status.json'),
                  'runtime_blob_sha':git('rev-parse','origin/gh-pages:data/runtime.json'),
                  'rejections_blob_sha':git('rev-parse','origin/gh-pages:data/rejections.json'),
                  'quarantine_blob_sha':git('rev-parse','origin/gh-pages:data/quarantine.json'),
                  'index_blob_sha':git('rev-parse','origin/gh-pages:index.html'),
                  'manifest_blob_sha':git('rev-parse','origin/gh-pages:manifest.webmanifest'),
                  'service_worker_blob_sha':git('rev-parse','origin/gh-pages:sw.js'),
              },
          }
          assert receipt['verification']['main_and_public_runtime_blob_match']
          assert receipt['verification']['main_and_public_status_blob_match']
          assert receipt['verification']['all_active_sources_healthy']
          assert receipt['verification']['all_published_products_have_explicit_thca_evidence']
          assert receipt['verification']['all_published_products_have_explicit_flower_evidence']
          Path('deployment/cdn.json').write_text(json.dumps(receipt,indent=2,sort_keys=True)+'\n')
          PY
          git config user.name "DropFinder Autonomous Publisher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/cdn.json
          if ! git diff --cached --quiet; then
            git commit -m "Record current autonomous deployment [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
