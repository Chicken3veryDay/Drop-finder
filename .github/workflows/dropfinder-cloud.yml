name: DropFinder Cloud Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/cloud_scan.py"
      - "cloud_pages/index.html"
      - "cloud_pages/manifest.webmanifest"
      - "cloud_pages/icon.svg"
      - "cloud_pages/sw.js"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dropfinder-cloud-snapshot
  cancel-in-progress: false

jobs:
  scan:
    name: Scan shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 24
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate scanner
        run: |
          python -m py_compile scripts/cloud_scan.py
          python scripts/cloud_scan.py --self-test
      - name: Scan public storefronts
        run: |
          mkdir -p "scan-output/${{ matrix.shard }}"
          python scripts/cloud_scan.py \
            --shard "${{ matrix.shard }}" \
            --shards 6 \
            --output "scan-output/${{ matrix.shard }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dropfinder-shard-${{ matrix.shard }}
          path: scan-output/${{ matrix.shard }}/
          if-no-files-found: error
          retention-days: 2

  publish:
    name: Merge and publish phone dashboard
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: dropfinder-shard-*
          path: scan-results
          merge-multiple: true
      - name: Merge normalized snapshot
        run: |
          cp cloud_pages/data/catalog.json /tmp/previous-catalog.json 2>/dev/null || true
          python scripts/cloud_scan.py \
            --merge scan-results \
            --output cloud_pages/data \
            --previous-catalog /tmp/previous-catalog.json
          python - <<'PY'
          import json
          from pathlib import Path
          catalog=json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status=json.loads(Path('cloud_pages/data/status.json').read_text())
          assert catalog['product_count'] == len(catalog['products'])
          assert status['source_count'] == 35
          assert status['enabled_sources'] == 17
          print(f"Publishing {catalog['product_count']} products from {status['healthy_sources']} healthy sources")
          PY
      - name: Persist latest snapshot
        run: |
          git config user.name "DropFinder Cloud Bot"
          git config user.email "actions@users.noreply.github.com"
          git add cloud_pages/data
          if ! git diff --cached --quiet; then
            git commit -m "Refresh DropFinder cloud snapshot [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: cloud_pages
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
