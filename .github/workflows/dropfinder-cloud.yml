name: DropFinder Cloud Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/cloud_scan.py"
      - "scripts/cloud_scan_v2.py"
      - "cloud_pages/index.html"
      - "cloud_pages/manifest.webmanifest"
      - "cloud_pages/icon.svg"
      - "cloud_pages/sw.js"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dropfinder-cloud-snapshot
  cancel-in-progress: false

jobs:
  scan:
    name: Scan shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 24
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate scanner
        run: |
          python -m py_compile scripts/cloud_scan.py scripts/cloud_scan_v2.py
          python scripts/cloud_scan_v2.py --self-test
      - name: Scan public storefronts
        run: |
          mkdir -p "scan-output/${{ matrix.shard }}"
          python scripts/cloud_scan_v2.py \
            --shard "${{ matrix.shard }}" \
            --shards 6 \
            --output "scan-output/${{ matrix.shard }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dropfinder-shard-${{ matrix.shard }}
          path: scan-output/${{ matrix.shard }}/
          if-no-files-found: error
          retention-days: 2

  publish:
    name: Merge, publish, and verify phone dashboard
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: dropfinder-shard-*
          path: scan-results
          merge-multiple: true
      - name: Merge normalized snapshot
        run: |
          cp cloud_pages/data/catalog.json /tmp/previous-catalog.json 2>/dev/null || true
          python scripts/cloud_scan_v2.py \
            --merge scan-results \
            --output cloud_pages/data \
            --previous-catalog /tmp/previous-catalog.json
          python - <<'PY'
          import json
          from pathlib import Path
          catalog=json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status=json.loads(Path('cloud_pages/data/status.json').read_text())
          assert catalog['product_count'] == len(catalog['products'])
          assert status['source_count'] == 35
          assert status['enabled_sources'] == 17
          print(f"Publishing {catalog['product_count']} products from {status['healthy_sources']} healthy sources")
          PY
      - name: Persist latest snapshot
        run: |
          git config user.name "DropFinder Cloud Bot"
          git config user.email "actions@users.noreply.github.com"
          git add cloud_pages/data
          if ! git diff --cached --quiet; then
            git commit -m "Refresh DropFinder cloud snapshot [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: cloud_pages
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify public endpoint
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          : "${PAGE_URL:?Pages did not return a deployment URL}"
          code=""
          for attempt in $(seq 1 12); do
            code="$(curl -L -sS -o /tmp/dropfinder-page.html -w '%{http_code}' \
              --connect-timeout 10 --max-time 30 "$PAGE_URL" || true)"
            if [ "$code" = "200" ] && grep -q "DropFinder Cloud" /tmp/dropfinder-page.html; then
              break
            fi
            echo "Public endpoint not ready yet (attempt $attempt, HTTP ${code:-none})"
            sleep 10
          done
          test "$code" = "200"
          grep -q "DropFinder Cloud" /tmp/dropfinder-page.html
          mkdir -p deployment
          PAGE_URL="$PAGE_URL" HTTP_CODE="$code" GIT_SHA="$GITHUB_SHA" python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          catalog = json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status = json.loads(Path('cloud_pages/data/status.json').read_text())
          receipt = {
              'schema_version': 'dropfinder-pages-receipt-v1',
              'verified_at': datetime.now(timezone.utc).isoformat(),
              'url': os.environ['PAGE_URL'],
              'http_status': int(os.environ['HTTP_CODE']),
              'content_marker': 'DropFinder Cloud',
              'workflow_commit': os.environ['GIT_SHA'],
              'product_count': catalog['product_count'],
              'healthy_sources': status['healthy_sources'],
              'enabled_sources': status['enabled_sources'],
          }
          Path('deployment/pages-receipt.json').write_text(json.dumps(receipt, indent=2) + '\n')
          print(json.dumps(receipt, indent=2))
          PY
      - name: Persist deployment receipt
        run: |
          git config user.name "DropFinder Cloud Bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main
          git add deployment/pages-receipt.json
          if ! git diff --cached --quiet; then
            git commit -m "Record verified public DropFinder deployment [skip ci]"
            git push origin HEAD:main
          fi
