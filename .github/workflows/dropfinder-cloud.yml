name: DropFinder Autonomous Cloud

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/cloud_scan.py"
      - "scripts/cloud_scan_v2.py"
      - "scripts/autonomous_worker.py"
      - "scripts/autonomous_worker_v2.py"
      - "scripts/autonomous_worker_v3.py"
      - "scripts/autonomous_merge.py"
      - "cloud_pages/index.html"
      - "cloud_pages/manifest.webmanifest"
      - "cloud_pages/icon.svg"
      - "cloud_pages/sw.js"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: dropfinder-autonomous-cloud
  cancel-in-progress: false

jobs:
  scan:
    name: Retrieval worker ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate worker code
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/cloud_scan.py \
            scripts/cloud_scan_v2.py \
            scripts/autonomous_worker.py \
            scripts/autonomous_worker_v2.py \
            scripts/autonomous_worker_v3.py \
            scripts/autonomous_merge.py
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v3.py --self-test
      - name: Retrieve, retry, verify, and classify storefront data
        run: |
          set -euo pipefail
          mkdir -p "scan-output/${{ matrix.shard }}"
          python scripts/autonomous_worker_v3.py \
            --shard "${{ matrix.shard }}" \
            --shards 6 \
            --workers 3 \
            --output "scan-output/${{ matrix.shard }}"
      - uses: actions/upload-artifact@v4
        with:
          name: autonomous-shard-${{ matrix.shard }}
          path: scan-output/${{ matrix.shard }}/shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Admit healthy sources and publish atomically
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: autonomous-shard-*
          path: scan-results
          merge-multiple: true
      - name: Validate admission controller
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-autonomous-merge-test
          python scripts/autonomous_merge.py --self-test
      - name: Build zero-degraded strict production snapshot
        run: |
          set -euo pipefail
          python scripts/autonomous_merge.py \
            --input scan-results \
            --output cloud_pages/data \
            --min-active 5 \
            --min-products 25
          python - <<'PY'
          import json
          from pathlib import Path
          catalog=json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status=json.loads(Path('cloud_pages/data/status.json').read_text())
          runtime=json.loads(Path('cloud_pages/data/runtime.json').read_text())
          quarantine=json.loads(Path('cloud_pages/data/quarantine.json').read_text())
          rejections=json.loads(Path('cloud_pages/data/rejections.json').read_text())
          assert catalog['product_count'] == len(catalog['products'])
          assert status['degraded_sources'] == 0
          assert status['healthy_sources'] == status['enabled_sources']
          assert runtime['zero_degraded_active_services'] is True
          assert all(value == 'healthy' for value in status['services'].values())
          assert all(source['status'] == 'healthy' for source in status['sources'])
          assert quarantine['count'] == status['quarantined_sources']
          assert rejections['count'] == status['rejected_products']
          assert all(
              product.get('classification_evidence', {}).get('explicit_thca')
              and product.get('classification_evidence', {}).get('explicit_flower')
              for product in catalog['products']
          )
          print(json.dumps(runtime, indent=2))
          PY
      - name: Commit runtime state to main
        run: |
          set -euo pipefail
          mkdir -p deployment
          cp cloud_pages/data/runtime.json deployment/autonomous-runtime.json
          git config user.name "DropFinder Autonomous Worker"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_pages/data deployment/autonomous-runtime.json
          if ! git diff --cached --quiet; then
            git commit -m "Refresh zero-degraded DropFinder catalog [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Publish immutable phone app to gh-pages
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-site
          mkdir -p /tmp/dropfinder-site
          cp -a cloud_pages/. /tmp/dropfinder-site/
          touch /tmp/dropfinder-site/.nojekyll
          test -s /tmp/dropfinder-site/data/catalog.json
          test -s /tmp/dropfinder-site/data/status.json
          test -s /tmp/dropfinder-site/data/runtime.json
          test -s /tmp/dropfinder-site/data/rejections.json
          grep -q '"degraded_sources": 0' /tmp/dropfinder-site/data/status.json

          git config user.name "DropFinder Autonomous Publisher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan autonomous-pages-next
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx >/dev/null 2>&1 || true
          cp -a /tmp/dropfinder-site/. .
          git add -A
          git commit -m "Publish autonomous DropFinder catalog ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
      - name: Verify published branch tree
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          git show origin/gh-pages:data/status.json >/tmp/published-status.json
          git show origin/gh-pages:data/runtime.json >/tmp/published-runtime.json
          git show origin/gh-pages:data/catalog.json >/tmp/published-catalog.json
          python - <<'PY'
          import json
          status=json.load(open('/tmp/published-status.json'))
          runtime=json.load(open('/tmp/published-runtime.json'))
          catalog=json.load(open('/tmp/published-catalog.json'))
          assert status['degraded_sources'] == 0
          assert status['healthy_sources'] == status['enabled_sources']
          assert runtime['zero_degraded_active_services'] is True
          assert catalog['product_count'] == len(catalog['products'])
          assert all(
              product.get('classification_evidence', {}).get('explicit_thca')
              and product.get('classification_evidence', {}).get('explicit_flower')
              for product in catalog['products']
          )
          print(f"Published {status['product_count']} products from {status['healthy_sources']} active healthy sources; {status['quarantined_sources']} candidates quarantined")
          PY
