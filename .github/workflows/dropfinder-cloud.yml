name: DropFinder Cloud Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "scripts/cloud_pages_*.py"
      - "cloud_pages/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/dropfinder-cloud.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dropfinder-cloud-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install DropFinder
        run: |
          python -m pip install --upgrade pip
          pip install .
          python -m playwright install --with-deps chromium

      - name: Restore prior cloud catalog
        uses: actions/cache@v4
        with:
          path: runtime
          key: dropfinder-cloud-runtime-${{ github.run_id }}
          restore-keys: |
            dropfinder-cloud-runtime-

      - name: Run bounded collection
        env:
          DROPFINDER_RECORD_EVIDENCE: "0"
          DROPFINDER_BROWSER_MODE: auto
        run: python scripts/cloud_pages_scan.py

      - name: Build sanitized static snapshot
        run: python scripts/cloud_pages_export.py --output cloud_pages

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: cloud_pages

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
