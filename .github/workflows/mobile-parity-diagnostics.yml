name: Mobile Parity Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/mobile-parity-diagnostics.yml"

permissions:
  contents: read

concurrency:
  group: mobile-parity-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install locked dependencies
        working-directory: web
        run: npm ci
      - name: Lint
        id: lint
        continue-on-error: true
        working-directory: web
        run: npm run lint 2>&1 | tee diagnostic-lint.log
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        working-directory: web
        run: npm run typecheck 2>&1 | tee diagnostic-typecheck.log
      - name: Unit and platform tests
        id: tests
        continue-on-error: true
        working-directory: web
        run: npm test 2>&1 | tee diagnostic-tests.log
      - name: Benchmark
        id: benchmark
        continue-on-error: true
        working-directory: web
        run: npm run benchmark 2>&1 | tee diagnostic-benchmark.log
      - name: Publication build
        id: build
        continue-on-error: true
        working-directory: web
        run: npm run build 2>&1 | tee diagnostic-build.log
      - name: Platform build
        id: platform
        continue-on-error: true
        working-directory: web
        run: npm run build:platform 2>&1 | tee diagnostic-platform.log
      - name: Chunk analysis
        id: chunks
        continue-on-error: true
        working-directory: web
        run: npm run analyze:chunks 2>&1 | tee diagnostic-chunks.log
      - name: PWA contract
        id: pwa
        continue-on-error: true
        working-directory: web
        run: npm run pwa:check 2>&1 | tee diagnostic-pwa.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-parity-diagnostics
          path: web/diagnostic-*.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce results
        if: always()
        run: |
          test "${{ steps.lint.outcome }}" = success
          test "${{ steps.typecheck.outcome }}" = success
          test "${{ steps.tests.outcome }}" = success
          test "${{ steps.benchmark.outcome }}" = success
          test "${{ steps.build.outcome }}" = success
          test "${{ steps.platform.outcome }}" = success
          test "${{ steps.chunks.outcome }}" = success
          test "${{ steps.pwa.outcome }}" = success
