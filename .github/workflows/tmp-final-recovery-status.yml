name: Temporary PR 453 Failure Log

on:
  pull_request:
    branches: [verification/balanced-recovery-publish]

permissions:
  actions: read
  contents: read

jobs:
  capture:
    if: github.head_ref == 'trigger/balanced-recovery-publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Capture failed Cloud CI output
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: "29961430235"
        shell: bash
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" --repo "$REPOSITORY" --log-failed > pr453-failed.log
          test -s pr453-failed.log
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr453-failed-log
          path: pr453-failed.log
          if-no-files-found: error
          retention-days: 7
