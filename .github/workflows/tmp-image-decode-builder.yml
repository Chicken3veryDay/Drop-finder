name: Temporary Image Decode Builder

on:
  push:
    branches:
      - fix/issue-121-image-decode-validation

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-121-image-decode-validation
      - name: Apply image readiness gate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          path = Path('web/src/platform/documents/document-viewer-capability.js')
          text = path.read_text(encoding='utf-8')
          text = replace_once(text, '''    this.fetchImpl = options.fetchImpl ?? globalThis.fetch?.bind(globalThis);
              this.loadPdfJs = options.loadPdfJs ?? (() => loadPdfJsRuntime({ workerSrc: options.pdfWorkerUrl }));
          ''', '''    this.fetchImpl = options.fetchImpl ?? globalThis.fetch?.bind(globalThis);
              this.loadPdfJs = options.loadPdfJs ?? (() => loadPdfJsRuntime({ workerSrc: options.pdfWorkerUrl }));
              this.decodeImage = options.decodeImage ?? decodeImageUrl;
          ''', 'image decoder option')
          old = '''  async openImage(documentRef, sessionId, signal) {
              if (!this.fetchImpl) {
                this.setState({ ...this.state, status: 'ready', displayUrl: documentRef.url });
                return;
              }
              const response = await this.fetchImpl(documentRef.url, { signal, credentials: 'omit', referrerPolicy: 'no-referrer' });
              const length = Number(response.headers.get('content-length'));
              if (Number.isFinite(length) && length > this.options.maxBytes) throw new PlatformError('document_oversized', 'Image is too large');
              if (!response.ok) throw new PlatformError('document_unavailable', `Image request failed with ${response.status}`);
              const bytes = await response.arrayBuffer();
              if (bytes.byteLength > this.options.maxBytes) throw new PlatformError('document_oversized', 'Image is too large');
              if (sessionId !== this.session?.id || signal.aborted) return;
              const blob = new Blob([bytes], { type: response.headers.get('content-type') || documentRef.mimeType || 'application/octet-stream' });
              const objectUrl = URL.createObjectURL(blob);
              this.session.objectUrl = objectUrl;
              this.setState({ ...this.state, status: 'ready', displayUrl: objectUrl });
            }
          '''
          new = '''  async openImage(documentRef, sessionId, signal) {
              let objectUrl = null;
              try {
                const sourceUrl = documentRef.url;
                if (!this.fetchImpl) {
                  await this.decodeImage(sourceUrl, signal);
                  if (sessionId !== this.session?.id || signal.aborted) return;
                  this.setState({ ...this.state, status: 'ready', displayUrl: sourceUrl });
                  return;
                }
                const response = await this.fetchImpl(sourceUrl, {
                  signal,
                  credentials: 'omit',
                  referrerPolicy: 'no-referrer',
                });
                const length = Number(response.headers.get('content-length'));
                if (Number.isFinite(length) && length > this.options.maxBytes) {
                  throw new PlatformError('document_oversized', 'Image is too large');
                }
                if (!response.ok) {
                  throw new PlatformError('document_unavailable', `Image request failed with ${response.status}`);
                }
                const bytes = await response.arrayBuffer();
                if (bytes.byteLength > this.options.maxBytes) {
                  throw new PlatformError('document_oversized', 'Image is too large');
                }
                if (sessionId !== this.session?.id || signal.aborted) return;
                const blob = new Blob([bytes], {
                  type: response.headers.get('content-type') || documentRef.mimeType || 'application/octet-stream',
                });
                objectUrl = URL.createObjectURL(blob);
                await this.decodeImage(objectUrl, signal);
                if (sessionId !== this.session?.id || signal.aborted) return;
                this.session.objectUrl = objectUrl;
                this.setState({ ...this.state, status: 'ready', displayUrl: objectUrl });
                objectUrl = null;
              } catch (error) {
                if (objectUrl) URL.revokeObjectURL(objectUrl);
                if (signal.aborted || error?.name === 'AbortError') throw abortError();
                if (error instanceof PlatformError) throw error;
                throw new PlatformError('image_decode_failed', 'This image could not be displayed.', error);
              } finally {
                if (objectUrl) URL.revokeObjectURL(objectUrl);
              }
            }
          '''
          text = replace_once(text, old, new, 'image open lifecycle')
          marker = '''function classifyDocument(documentRef) {
          '''
          helper = '''function decodeImageUrl(url, signal) {
              if (signal?.aborted) return Promise.reject(abortError());
              if (typeof Image === 'undefined') {
                return Promise.reject(new PlatformError('image_decode_unavailable', 'Image decoding is unavailable'));
              }
              return new Promise((resolve, reject) => {
                const image = new Image();
                let settled = false;
                const cleanup = () => {
                  image.onload = null;
                  image.onerror = null;
                  signal?.removeEventListener('abort', onAbort);
                };
                const finish = handler => {
                  if (settled) return;
                  settled = true;
                  cleanup();
                  handler();
                };
                const onAbort = () => finish(() => reject(abortError()));
                image.onload = () => finish(resolve);
                image.onerror = () => finish(() => reject(new PlatformError(
                  'image_decode_failed',
                  'This image could not be displayed.',
                )));
                signal?.addEventListener('abort', onAbort, { once: true });
                image.decoding = 'async';
                image.src = url;
                if (signal?.aborted) onAbort();
              });
            }

          function classifyDocument(documentRef) {
          '''
          text = replace_once(text, marker, helper, 'default image decoder')
          path.write_text(text, encoding='utf-8')

          Path('web/test/document-image-validation.test.mjs').write_text(r'''import test from 'node:test';
          import assert from 'node:assert/strict';
          import { DocumentViewerCapability } from '../src/platform/documents/document-viewer-capability.js';

          async function trackObjectUrlRevocations(run) {
            const original = URL.revokeObjectURL;
            const revoked = [];
            URL.revokeObjectURL = url => {
              revoked.push(url);
              original.call(URL, url);
            };
            try { await run(revoked); }
            finally { URL.revokeObjectURL = original; }
          }

          test('image-classified HTML responses fail before publishing a ready preview', async () => {
            await trackObjectUrlRevocations(async revoked => {
              const viewer = new DocumentViewerCapability({
                fetchImpl: async () => new Response('<html>challenge</html>', {
                  headers: { 'content-type': 'text/html', 'content-length': '22' },
                }),
                decodeImage: async () => { throw new Error('not an image'); },
              });
              await viewer.open({ url: 'https://example.test/coa.png', mimeType: 'image/png' });
              assert.equal(viewer.snapshot().status, 'error');
              assert.equal(viewer.snapshot().displayUrl, null);
              assert.equal(viewer.snapshot().error.code, 'image_decode_failed');
              assert.equal(viewer.snapshot().error.action, 'open-original');
              assert.equal(revoked.length, 1);
              await viewer.close();
              assert.equal(revoked.length, 1);
            });
          });

          test('corrupt bytes labeled as an image fail through the same decode gate', async () => {
            await trackObjectUrlRevocations(async revoked => {
              let decodeCalls = 0;
              const viewer = new DocumentViewerCapability({
                fetchImpl: async () => new Response(new Uint8Array([0, 1, 2, 3]), {
                  headers: { 'content-type': 'image/png', 'content-length': '4' },
                }),
                decodeImage: async () => { decodeCalls += 1; throw new Error('corrupt image'); },
              });
              await viewer.open({ url: 'https://example.test/corrupt.png', mimeType: 'image/png' });
              assert.equal(decodeCalls, 1);
              assert.equal(viewer.snapshot().status, 'error');
              assert.equal(viewer.snapshot().error.message, 'This image could not be displayed.');
              assert.equal(revoked.length, 1);
            });
          });

          test('a successfully decoded image remains ready until close releases its object URL', async () => {
            await trackObjectUrlRevocations(async revoked => {
              let decodedUrl = null;
              const viewer = new DocumentViewerCapability({
                fetchImpl: async () => new Response(new Uint8Array([137, 80, 78, 71]), {
                  headers: { 'content-type': 'image/png', 'content-length': '4' },
                }),
                decodeImage: async url => { decodedUrl = url; },
              });
              await viewer.open({ url: 'https://example.test/valid.png', mimeType: 'image/png' });
              assert.equal(viewer.snapshot().status, 'ready');
              assert.equal(viewer.snapshot().displayUrl, decodedUrl);
              assert.match(decodedUrl, /^blob:/);
              assert.equal(revoked.length, 0);
              await viewer.close();
              assert.deepEqual(revoked, [decodedUrl]);
              assert.equal(viewer.snapshot().status, 'closed');
            });
          });

          test('closing while image decoding is pending aborts validation and releases the object URL', async () => {
            await trackObjectUrlRevocations(async revoked => {
              let decodingStarted;
              const started = new Promise(resolve => { decodingStarted = resolve; });
              const viewer = new DocumentViewerCapability({
                fetchImpl: async () => new Response(new Uint8Array([71, 73, 70, 56]), {
                  headers: { 'content-type': 'image/gif', 'content-length': '4' },
                }),
                decodeImage: (_url, signal) => new Promise((_resolve, reject) => {
                  decodingStarted();
                  signal.addEventListener('abort', () => reject(new DOMException('aborted', 'AbortError')), { once: true });
                }),
              });
              const opening = viewer.open({ url: 'https://example.test/pending.gif', mimeType: 'image/gif' });
              await started;
              await viewer.close();
              await opening;
              assert.equal(viewer.snapshot().status, 'closed');
              assert.equal(revoked.length, 1);
            });
          });

          test('direct image URLs use the same decode gate when transport is unavailable', async () => {
            let decoded = null;
            const viewer = new DocumentViewerCapability({
              fetchImpl: null,
              decodeImage: async url => { decoded = url; },
            });
            viewer.fetchImpl = null;
            await viewer.open({ url: 'https://example.test/direct.webp', mimeType: 'image/webp' });
            assert.equal(decoded, 'https://example.test/direct.webp');
            assert.equal(viewer.snapshot().status, 'ready');
            assert.equal(viewer.snapshot().displayUrl, decoded);
          });
          '''.replace('          ', ''), encoding='utf-8')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Validate document stack
        working-directory: web
        run: |
          npm ci
          node --test test/document-image-validation.test.mjs test/document-worker-fallback.test.mjs test/document-focus-trap.test.mjs
          npm run lint
          npm run typecheck
      - name: Commit final reconstruction
        shell: bash
        run: |
          rm -f .github/workflows/tmp-image-decode-builder.yml .github/.tmp-image-decode-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/platform/documents/document-viewer-capability.js web/test/document-image-validation.test.mjs .github/workflows/tmp-image-decode-builder.yml .github/.tmp-image-decode-trigger
          git commit -m "fix: require image decode before preview readiness"
          git push origin HEAD:fix/issue-121-image-decode-validation
