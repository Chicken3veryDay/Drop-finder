name: Temporary Issue 59 Detail Failure

on:
  pull_request:
    branches:
      - fix/issue-59-detail-failure-state

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issue59-detail-failure'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-59-detail-failure-state
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply per-product detail failure state
        run: |
          python .github/tmp/issue59_detail_failure_state.py
          python .github/tmp/issue59_detail_failure_css.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            web/src/features/marketplace/MarketplaceFeature.tsx \
            web/src/features/marketplace/MarketplaceFeature.detail-failure.test.tsx \
            web/src/features/marketplace/marketplace.css \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Capture focused detail-state contracts
        working-directory: web
        shell: bash
        run: |
          set +e
          timeout 6m npx vitest run \
            src/features/marketplace/MarketplaceFeature.detail-failure.test.tsx \
            src/features/marketplace/MarketplaceFeature.query-path.test.tsx \
            > /tmp/issue59-focused.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issue59-focused.status
          cat /tmp/issue59-focused.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue59-focused
          path: |
            /tmp/issue59-focused.log
            /tmp/issue59-focused.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop on focused failure
        run: test "$(cat /tmp/issue59-focused.status)" -eq 0
      - name: Capture complete frontend tests
        working-directory: web
        shell: bash
        run: |
          set +e
          timeout 16m npm test > /tmp/issue59-tests.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issue59-tests.status
          tail -250 /tmp/issue59-tests.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue59-tests
          path: |
            /tmp/issue59-tests.log
            /tmp/issue59-tests.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop on complete test failure
        run: test "$(cat /tmp/issue59-tests.status)" -eq 0
      - name: Validate static, performance, build, and PWA contracts
        working-directory: web
        shell: bash
        run: |
          npm run lint
          npm run typecheck
          npm run benchmark
          npm run build
          npm run build:platform
          npm run analyze:chunks
          npm run pwa:check
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Validate integrated detail behavior
        working-directory: web
        run: npx playwright test tests/e2e/integrated-app.spec.mjs --project=chromium
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issue59-detail-failure.yml \
            .github/workflows/tmp-issue59-apply-diagnostic.yml \
            .github/tmp/issue59_detail_failure_state.py \
            .github/tmp/issue59_detail_failure_css.py
          git add \
            web/src/features/marketplace/MarketplaceFeature.tsx \
            web/src/features/marketplace/MarketplaceFeature.detail-failure.test.tsx \
            web/src/features/marketplace/marketplace.css
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: surface detail shard failures per product"
          git push origin HEAD:fix/issue-59-detail-failure-state
