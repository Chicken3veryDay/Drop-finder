name: Temporary Final Closure Frontend Diagnostic

on:
  pull_request:
    branches:
      - verification/final-closure-frontend-diagnostic

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'trigger/final-closure-frontend-diagnostic'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: verification/final-closure-frontend-diagnostic
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Run frontend tests with bounded failure output
        working-directory: web
        shell: bash
        run: |
          npm ci
          set +e
          npm test > /tmp/dropfinder-frontend-tests.log 2>&1
          status=$?
          tail -n 240 /tmp/dropfinder-frontend-tests.log
          exit "$status"
