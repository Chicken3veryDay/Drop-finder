name: Temporary Route Repair Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/scraper-route-closure'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Capture focused diagnostics
        shell: bash
        run: |
          set +e
          : > route-repair-debug.txt
          for command in \
            "python -m compileall -q scripts tests" \
            "python scripts/route_repair.py" \
            "python scripts/autonomous_worker_v4.py --self-test" \
            "python -m pytest -q tests/test_route_repair.py"; do
            echo "===== $command =====" >> route-repair-debug.txt
            bash -lc "$command" >> route-repair-debug.txt 2>&1
            echo "exit_code=$?" >> route-repair-debug.txt
          done
          cat route-repair-debug.txt
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: route-repair-debug
          path: route-repair-debug.txt
          if-no-files-found: error
          retention-days: 1
