name: Agent issue 40 worker parity repair

on:
  push:
    branches:
      - agent/ec249c6b/cycle-0004/issue-40-worker-variant-parity
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate-and-commit:
    if: >-
      (github.event_name == 'push' && github.ref_name == 'agent/ec249c6b/cycle-0004/issue-40-worker-variant-parity') ||
      (github.event_name == 'pull_request' && github.head_ref == 'agent/ec249c6b/cycle-0004/issue-40-worker-variant-parity')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ec249c6b/cycle-0004/issue-40-worker-variant-parity
          fetch-depth: 0

      - name: Apply focused patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .agent-work/patches/cycle-0004-issue40.patch
          git apply .agent-work/patches/cycle-0004-issue40.patch
          git diff --check

      - name: Install web dependencies
        working-directory: web
        run: npm ci --ignore-scripts

      - name: Validate worker and synchronous marketplace paths
        working-directory: web
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm run typecheck
          npm run test:unit -- --run src/features/integration/marketplace-integration.test.ts
          npm test
          npm run build

      - name: Commit verified repair
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- cloud_pages/app-shell.json cloud_pages/assets/vite-manifest.json cloud_pages/index.html || true
          git clean -f -- cloud_pages/assets
          rm -f \
            .agent-work/patches/cycle-0004-issue40.patch \
            .github/workflows/agent-issue40-complete.yml
          git config user.name "continuous-work-agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: enforce worker variant renderability parity"
          git push origin HEAD:agent/ec249c6b/cycle-0004/issue-40-worker-variant-parity
