name: Deploy full DropFinder to Render

on:
  workflow_dispatch:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/render-deploy-request.txt"

permissions:
  contents: write

concurrency:
  group: dropfinder-render-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Render deployment package
        run: |
          set -euo pipefail
          python -m py_compile \
            deploy/render/render_deploy.py \
            deploy/render/render_complete_verifier.py \
            deploy/render/render_deploy_with_report.py \
            deploy/huggingface-space/space_app.py \
            deploy/huggingface-space/hf_state.py \
            deploy/huggingface-space/hf_supervisor.py \
            scripts/cloud_scan.py \
            scripts/cloud_scan_v2.py \
            scripts/autonomous_worker.py \
            scripts/autonomous_worker_v2.py \
            scripts/autonomous_worker_v4.py \
            scripts/autonomous_worker_v5.py \
            scripts/autonomous_worker_v6.py \
            scripts/autonomous_merge.py \
            scripts/autonomous_merge_complete.py
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v6.py --self-test
          python scripts/autonomous_merge_complete.py --self-test
          test -s deploy/render/Dockerfile
          grep -q 'plan.*free' deploy/render/render_deploy.py
          grep -q 'render_autonomous_service' deploy/render/Dockerfile
          grep -q 'autonomous_worker_v6.py' deploy/render/Dockerfile
          grep -q 'autonomous_merge_complete.py' deploy/render/Dockerfile
          grep -q 'exact_price_weight_ppg_thca_stock_image_v1' deploy/render/render_complete_verifier.py
      - name: Create, deploy, scan, and verify Render service
        id: render_deploy
        continue-on-error: true
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_STATE_REPO: Cgptmichaccount/dropfinder-private-state
          DROPFINDER_OPERATOR_TOKEN: ${{ secrets.DROPFINDER_OPERATOR_TOKEN }}
          DROPFINDER_DEPLOYMENT_RECEIPT: deployment/render-deployment.json
        run: |
          set -euo pipefail
          python deploy/render/render_deploy_with_report.py
      - name: Record Render deployment result
        if: always()
        run: |
          set -euo pipefail
          mkdir -p /tmp/dropfinder-render-result
          for file in deployment/render-deployment.json deployment/render-deployment-error.json; do
            if test -f "$file"; then
              cp "$file" /tmp/dropfinder-render-result/
            fi
          done
          git fetch origin deploy/full-stack-hf
          git reset --hard origin/deploy/full-stack-hf
          rm -f deployment/render-deployment.json deployment/render-deployment-error.json
          cp /tmp/dropfinder-render-result/* deployment/ 2>/dev/null || true
          git config user.name "DropFinder Render Deployer"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A deployment/render-deployment.json deployment/render-deployment-error.json
          if ! git diff --cached --quiet; then
            git commit -m "deploy: record Render service result [skip ci]"
            git push origin HEAD:deploy/full-stack-hf
          fi
      - name: Require verified deployment
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.render_deploy.outcome }}
        run: |
          set -euo pipefail
          test "$DEPLOY_OUTCOME" = success
          test -s deployment/render-deployment.json
