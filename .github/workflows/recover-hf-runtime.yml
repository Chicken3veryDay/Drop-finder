name: Recover Hugging Face runtime

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/recover-hf-runtime.yml"

permissions:
  contents: write

concurrency:
  group: recover-hf-runtime
  cancel-in-progress: true

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Recover and verify historical source parts
        run: |
          set -euo pipefail
          git fetch origin deploy/full-stack-hf:refs/remotes/origin/deploy/full-stack-hf
          rm -rf /tmp/df-recover
          mkdir -p /tmp/df-recover/parts
          for number in $(seq -w 1 23); do
            path="bootstrap/source.part${number}.b64"
            while read -r commit; do
              if git cat-file -e "${commit}:${path}" 2>/dev/null; then
                git show "${commit}:${path}" > "/tmp/df-recover/parts/${number}.b64"
                break
              fi
            done < <(git rev-list --all -- "$path")
          done
          python - <<'PY'
          import base64, hashlib, json, subprocess
          from pathlib import Path
          root=Path('/tmp/df-recover')
          parts=sorted((root/'parts').glob('*.b64'))
          report={'expected_parts':23,'found_parts':len(parts),'parts':[p.name for p in parts]}
          if parts:
              text=''.join(p.read_text(encoding='ascii').strip() for p in parts)
              try:
                  payload=base64.b64decode(text, validate=True)
              except Exception as exc:
                  report['decode_error']=str(exc)
              else:
                  archive=root/'archive.bin'; archive.write_bytes(payload)
                  report.update(bytes=len(payload),sha256=hashlib.sha256(payload).hexdigest())
                  if payload.startswith(b'PK\x03\x04'):
                      probe=subprocess.run(['unzip','-t',str(archive)],capture_output=True,text=True)
                      report['format']='zip'; report['valid']=probe.returncode==0
                  elif payload.startswith(b'\xfd7zXZ\x00'):
                      probe=subprocess.run(['tar','-tJf',str(archive)],capture_output=True,text=True)
                      report['format']='tar.xz'; report['valid']=probe.returncode==0
                  else:
                      report['format']='unknown'; report['valid']=False
          report['complete']=report.get('valid',False) and report['found_parts']==23
          Path('/tmp/df-recover/report.json').write_text(json.dumps(report,indent=2,sort_keys=True)+'\n')
          print(json.dumps(report,indent=2))
          PY
      - name: Update deployment branch
        run: |
          set -euo pipefail
          git switch --force deploy/full-stack-hf
          mkdir -p deployment deploy/huggingface-space
          cp /tmp/df-recover/report.json deployment/history-recovery.json
          complete=$(python -c "import json; print(str(json.load(open('/tmp/df-recover/report.json'))['complete']).lower())")
          if [ "$complete" = true ]; then
            archive=/tmp/df-recover/archive.bin
            rm -rf /tmp/df-recover/source
            mkdir -p /tmp/df-recover/source
            if [ "$(head -c 2 "$archive")" = "PK" ]; then
              unzip -q "$archive" -d /tmp/df-recover/source
            else
              tar -xJf "$archive" -C /tmp/df-recover/source
            fi
            root=$(find /tmp/df-recover/source -type f -name pyproject.toml -printf '%h\n' | head -1)
            test -n "$root" && test -d "$root/app" && test -f "$root/run.sh"
            tar --sort=name --mtime='UTC 2026-07-14' --owner=0 --group=0 --numeric-owner \
              -cJf /tmp/df-recover/dropfinder-runtime.tar.xz \
              -C "$root" app config profiles requirements.txt pyproject.toml cli.py run.sh
            base64 -w 0 /tmp/df-recover/dropfinder-runtime.tar.xz > deploy/huggingface-space/dropfinder-runtime.tar.xz.b64
            sha256sum /tmp/df-recover/dropfinder-runtime.tar.xz > deployment/dropfinder-runtime.sha256
            base64 -d deploy/huggingface-space/dropfinder-runtime.tar.xz.b64 | tar -tJf - >/dev/null
          fi
          git config user.name "DropFinder Runtime Recovery"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/history-recovery.json deployment/dropfinder-runtime.sha256 deploy/huggingface-space/dropfinder-runtime.tar.xz.b64 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: recover Hugging Face runtime from history [skip ci]"
            git push origin HEAD:deploy/full-stack-hf
          fi
