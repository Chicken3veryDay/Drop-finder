name: Temporary Final Production Browser V3F

on:
  pull_request:
    branches: [verification/final-production-browser-v3f]
    paths:
      - verification/final-production-browser-v3f.trigger
      - .github/workflows/tmp-final-production-browser-v3f.yml
      - web/playwright.live.config.mjs
      - web/tests/e2e/live-production.spec.mjs

permissions:
  contents: read

jobs:
  browser:
    if: github.head_ref == 'trigger/final-production-browser-v3f'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: chromium, engine: chromium }
          - { project: firefox, engine: firefox }
          - { project: webkit, engine: webkit }
          - { project: mobile-chromium, engine: chromium }
          - { project: mobile-webkit, engine: webkit }
    env:
      PUBLIC_URL: https://chicken3veryday.github.io/Drop-finder/
      EXPECTED_GENERATION: 50d09aeec0eed7b301891c360e4a6344
      EXPECTED_GENERATED_AT: 2026-07-20T21:38:19+00:00
      PROJECT: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: verification/final-production-browser-v3f
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Bind immutable live generation
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${PUBLIC_URL}data/runtime.json?v3f=${GITHUB_RUN_ID}-${PROJECT}" -o /tmp/runtime.json
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "${PUBLIC_URL}data/catalog-v4/manifest.json?v3f=${GITHUB_RUN_ID}-${PROJECT}" -o /tmp/manifest.json
          python - <<'PY'
          import json, os
          runtime=json.load(open('/tmp/runtime.json'))
          manifest=json.load(open('/tmp/manifest.json'))
          assert runtime['generated_at'] == os.environ['EXPECTED_GENERATED_AT'], runtime
          assert runtime['status'] == 'healthy', runtime
          assert runtime['zero_degraded_active_services'] is True, runtime
          assert manifest['generation_id'] == os.environ['EXPECTED_GENERATION'], manifest
          assert manifest['generated_at'] == os.environ['EXPECTED_GENERATED_AT'], manifest
          PY
      - name: Install frozen frontend and browser
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps "${{ matrix.engine }}"
      - name: Run current live project
        working-directory: web
        env:
          DROPFINDER_PUBLIC_URL: ${{ env.PUBLIC_URL }}
        run: npx playwright test --config=playwright.live.config.mjs --project="${PROJECT}"
      - name: Summarize project
        if: always()
        working-directory: web
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          path=Path('test-results/live-results.json')
          data=json.loads(path.read_text()) if path.is_file() else {'suites': []}
          counts={'passed':0,'failed':0,'skipped':0,'timedOut':0,'interrupted':0}
          def walk(suite):
              for spec in suite.get('specs',[]):
                  for test in spec.get('tests',[]):
                      results=test.get('results',[])
                      status=results[-1].get('status','failed') if results else 'skipped'
                      counts[status if status in counts else 'failed'] += 1
              for child in suite.get('suites',[]): walk(child)
          for suite in data.get('suites',[]): walk(suite)
          summary={'project':os.environ['PROJECT'],'generation_id':os.environ['EXPECTED_GENERATION'],'counts':counts,'verified':counts['passed']==2 and not any(counts[key] for key in ('failed','timedOut','interrupted'))}
          Path('test-results').mkdir(exist_ok=True)
          Path(f"test-results/summary-{os.environ['PROJECT']}.json").write_text(json.dumps(summary,indent=2,sort_keys=True)+'\n')
          print(json.dumps(summary,sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: final-current-browser-${{ matrix.project }}-v3f
          path: |
            web/test-results
            web/playwright-live-report
          if-no-files-found: warn
          retention-days: 90

  aggregate:
    if: always()
    needs: browser
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: final-current-browser-*-v3f
          path: /tmp/browser-v3f
      - name: Verify all projects
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          expected={'chromium','firefox','webkit','mobile-chromium','mobile-webkit'}
          rows=[json.loads(path.read_text()) for path in Path('/tmp/browser-v3f').rglob('summary-*.json')]
          projects={row['project']:row for row in rows}
          assert set(projects) == expected, projects
          assert all(row['verified'] for row in projects.values()), projects
          totals={'passed':0,'failed':0,'skipped':0,'timedOut':0,'interrupted':0}
          for row in projects.values():
              for key in totals: totals[key] += int(row['counts'].get(key,0))
          assert totals == {'passed':10,'failed':0,'skipped':0,'timedOut':0,'interrupted':0}, totals
          report={'verified':True,'scope':'current semantic live marketplace','generation_id':'50d09aeec0eed7b301891c360e4a6344','counts':totals,'projects':projects}
          Path('/tmp/final-production-browser-summary-v3f.json').write_text(json.dumps(report,indent=2,sort_keys=True)+'\n')
          print(json.dumps(report,sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: final-production-browser-evidence-v3f
          path: |
            /tmp/final-production-browser-summary-v3f.json
            /tmp/browser-v3f
          if-no-files-found: error
          retention-days: 90
