name: Recover DropFinder runtime from Git history

on:
  workflow_dispatch:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - ".github/workflows/recover-runtime-history.yml"

permissions:
  contents: write

concurrency:
  group: dropfinder-runtime-history-recovery
  cancel-in-progress: true

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - name: Recover numbered bootstrap parts
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-history-recovery
          mkdir -p /tmp/dropfinder-history-recovery/parts deployment
          found=0
          missing=""
          for number in $(seq -w 1 23); do
            path="bootstrap/source.part${number}.b64"
            recovered=""
            while read -r commit; do
              if git cat-file -e "${commit}:${path}" 2>/dev/null; then
                git show "${commit}:${path}" > "/tmp/dropfinder-history-recovery/parts/part${number}.b64"
                recovered="$commit"
                break
              fi
            done < <(git rev-list --all -- "$path")
            if [ -n "$recovered" ]; then
              found=$((found + 1))
              printf '%s %s %s\n' "$number" "$recovered" "$(wc -c < "/tmp/dropfinder-history-recovery/parts/part${number}.b64")"
            else
              missing="${missing} ${number}"
            fi
          done | tee /tmp/dropfinder-history-recovery/parts.txt
          cat /tmp/dropfinder-history-recovery/parts/part*.b64 > /tmp/dropfinder-history-recovery/source.b64 || true
          python - <<'PY'
          import base64
          import hashlib
          import json
          import subprocess
          from pathlib import Path

          root=Path('/tmp/dropfinder-history-recovery')
          parts=sorted((root/'parts').glob('part*.b64'))
          result={
              'schema_version':'dropfinder-history-recovery-v1',
              'expected_parts':23,
              'found_parts':len(parts),
              'part_names':[p.name for p in parts],
              'complete':False,
              'archive_valid':False,
          }
          if parts:
              joined=''.join(p.read_text(encoding='ascii').strip() for p in parts)
              result['base64_characters']=len(joined)
              try:
                  payload=base64.b64decode(joined, validate=True)
              except Exception as exc:
                  result['decode_error']=str(exc)
              else:
                  archive=root/'source-archive.bin'
                  archive.write_bytes(payload)
                  result['archive_bytes']=len(payload)
                  result['archive_sha256']=hashlib.sha256(payload).hexdigest()
                  result['archive_file']=subprocess.run(
                      ['file','-b',str(archive)],capture_output=True,text=True,check=False
                  ).stdout.strip()
                  tests=[]
                  if payload.startswith(b'PK\x03\x04'):
                      probe=subprocess.run(['unzip','-t',str(archive)],capture_output=True,text=True)
                      tests.append({'type':'zip','returncode':probe.returncode,'output':(probe.stdout+probe.stderr)[-2000:]})
                  elif payload.startswith(b'\xfd7zXZ\x00'):
                      probe=subprocess.run(['tar','-tJf',str(archive)],capture_output=True,text=True)
                      tests.append({'type':'tar.xz','returncode':probe.returncode,'output':(probe.stdout+probe.stderr)[-2000:]})
                  result['tests']=tests
                  result['archive_valid']=bool(tests) and all(test['returncode']==0 for test in tests)
          result['complete']=result['found_parts']==result['expected_parts'] and result['archive_valid']
          Path('deployment/history-recovery.json').write_text(json.dumps(result,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          print(json.dumps(result,indent=2))
          PY
      - name: Build runtime package when recovery is complete
        run: |
          set -euo pipefail
          complete=$(python -c "import json; print(str(json.load(open('deployment/history-recovery.json'))['complete']).lower())")
          if [ "$complete" != true ]; then
            echo "History does not contain a complete verified 23-part archive; committing the evidence report only."
            exit 0
          fi
          archive=/tmp/dropfinder-history-recovery/source-archive.bin
          rm -rf /tmp/dropfinder-history-recovery/source
          mkdir -p /tmp/dropfinder-history-recovery/source
          if head -c 4 "$archive" | grep -q $'PK\003\004'; then
            unzip -q "$archive" -d /tmp/dropfinder-history-recovery/source
          else
            tar -xJf "$archive" -C /tmp/dropfinder-history-recovery/source
          fi
          root=$(find /tmp/dropfinder-history-recovery/source -type f -name pyproject.toml -printf '%h\n' | head -1)
          test -n "$root"
          test -d "$root/app"
          test -f "$root/run.sh"
          tar --sort=name --mtime='UTC 2026-07-14' --owner=0 --group=0 --numeric-owner \
            -cJf /tmp/dropfinder-history-recovery/dropfinder-runtime.tar.xz \
            -C "$root" app config profiles requirements.txt pyproject.toml cli.py run.sh
          base64 -w 0 /tmp/dropfinder-history-recovery/dropfinder-runtime.tar.xz \
            > deploy/huggingface-space/dropfinder-runtime.tar.xz.b64
          sha256sum /tmp/dropfinder-history-recovery/dropfinder-runtime.tar.xz \
            > deployment/dropfinder-runtime.sha256
          base64 -d deploy/huggingface-space/dropfinder-runtime.tar.xz.b64 | tar -tJf - >/dev/null
      - name: Commit recovery result
        run: |
          set -euo pipefail
          git config user.name "DropFinder Runtime Recovery"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/history-recovery.json deployment/dropfinder-runtime.sha256 deploy/huggingface-space/dropfinder-runtime.tar.xz.b64 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: recover verified DropFinder runtime from history [skip ci]"
            git push origin HEAD:deploy/full-stack-hf
          fi
