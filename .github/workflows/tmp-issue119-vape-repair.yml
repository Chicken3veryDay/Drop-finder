name: Temporary Issue 119 Vape Repair

on:
  pull_request:
    branches:
      - fix/issue-119-vape-quantity-post-variant

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.head_ref == 'trigger/issue119-vape-quantity-post-variant'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-119-vape-quantity-post-variant
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply anchored production edits
        run: python .github/tmp/issue119_vape_quantity_repair.py
      - name: Validate complete multi-product contracts
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q scripts/multi_product tests/multi_product
            python -m unittest discover -s tests/multi_product -v
            python -m scripts.multi_product.verify_vape_quantity --help
          } > /tmp/issue119-validation.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issue119-validation.status
          tail -n 360 /tmp/issue119-validation.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue119-validation
          path: |
            /tmp/issue119-validation.log
            /tmp/issue119-validation.status
      - name: Stop on validation failure
        run: test "$(cat /tmp/issue119-validation.status)" = "0"
      - name: Verify unrelated source remains intact
        shell: bash
        run: |
          grep -q 'def completeness_score' scripts/multi_product/normalization.py
          grep -q 'def merge(input_dir:' scripts/multi_product/publication.py
          grep -q 'route_results' scripts/multi_product/publication.py
      - name: Commit clean implementation
        shell: bash
        run: |
          rm -f .github/workflows/tmp-issue119-vape-repair.yml .github/tmp/issue119_vape_quantity_repair.py .github/.issue119-vape-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore vape quantity integrity and artifact verification"
          git push origin HEAD:fix/issue-119-vape-quantity-post-variant
