name: Temporary Issue 26 Browser Cache Key Repair

on:
  pull_request:
    branches:
      - fix/issue-26-offline-document-cache

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issue26-browser-cache-key'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-26-offline-document-cache
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply query-sensitive application cache repair
        run: python .github/tmp/issue26_browser_cache_key.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            cloud_pages/sw.js \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/register-marketplace-props.document-cache.test.ts \
            web/test/service-worker.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Capture focused cache contracts
        working-directory: web
        shell: bash
        run: |
          set +e
          {
            node --test test/service-worker.test.mjs test/service-worker-document-bound.test.mjs
            npx vitest run src/features/integration/register-marketplace-props.document-cache.test.ts
            npm run typecheck
          } > /tmp/issue26-cache-key.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issue26-cache-key.status
          cat /tmp/issue26-cache-key.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue26-cache-key
          path: |
            /tmp/issue26-cache-key.log
            /tmp/issue26-cache-key.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop on focused cache failure
        shell: bash
        run: test "$(cat /tmp/issue26-cache-key.status)" -eq 0
      - name: Capture integrated browser matrix
        working-directory: web
        shell: bash
        run: |
          set +e
          npx playwright install --with-deps chromium firefox webkit > /tmp/issue26-browser-install.log 2>&1
          install_status=$?
          if [ "$install_status" -eq 0 ]; then
            npx playwright test tests/e2e/integrated-app.spec.mjs > /tmp/issue26-browser.log 2>&1
            status=$?
          else
            cp /tmp/issue26-browser-install.log /tmp/issue26-browser.log
            status=$install_status
          fi
          printf '%s\n' "$status" > /tmp/issue26-browser.status
          cat /tmp/issue26-browser.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue26-browser
          path: |
            /tmp/issue26-browser.log
            /tmp/issue26-browser.status
            web/test-results
            web/playwright-report
          if-no-files-found: warn
          retention-days: 7
      - name: Stop on browser failure
        shell: bash
        run: test "$(cat /tmp/issue26-browser.status)" -eq 0
      - name: Commit clean browser repair
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issue26-browser-cache-key.yml \
            .github/tmp/issue26_browser_cache_key.py
          git add cloud_pages/sw.js web/test/service-worker.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: keep query-versioned application assets distinct"
          git push origin HEAD:fix/issue-26-offline-document-cache
