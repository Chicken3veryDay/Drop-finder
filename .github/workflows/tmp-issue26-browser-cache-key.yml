name: Temporary Issue 26 Browser Cache Key Repair

on:
  pull_request:
    branches:
      - fix/issue-26-offline-document-cache

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issue26-browser-cache-key'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-26-offline-document-cache
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply development-module cache repair
        run: python .github/tmp/issue26_browser_cache_key.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            cloud_pages/sw.js \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/register-marketplace-props.document-cache.test.ts \
            web/test/service-worker.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Capture focused cache contracts
        working-directory: web
        shell: bash
        run: |
          set +e
          {
            node --test test/service-worker.test.mjs test/service-worker-document-bound.test.mjs
            npx vitest run src/features/integration/register-marketplace-props.document-cache.test.ts
            npm run typecheck
          } > /tmp/issue26-focused.log 2>&1
          printf '%s\n' "$?" > /tmp/issue26-focused.status
          cat /tmp/issue26-focused.log
          exit 0
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Capture blank-shell diagnostics
        working-directory: web
        shell: bash
        run: |
          cat > tests/e2e/issue26-diagnostic.spec.mjs <<'EOF'
          import { test } from '@playwright/test';
          import fs from 'node:fs/promises';

          test('capture integrated app boot diagnostics', async ({ page }) => {
            const events = [];
            page.on('console', message => events.push({ type: 'console', level: message.type(), text: message.text() }));
            page.on('pageerror', error => events.push({ type: 'pageerror', name: error.name, message: error.message, stack: error.stack }));
            page.on('requestfailed', request => events.push({ type: 'requestfailed', url: request.url(), failure: request.failure() }));
            page.on('response', response => {
              if (response.status() >= 400 || /(?:\.js|\.tsx?|catalog-v4|sw\.js)(?:\?|$)/.test(response.url())) {
                events.push({ type: 'response', url: response.url(), status: response.status(), contentType: response.headers()['content-type'] || '' });
              }
            });
            const response = await page.goto('/', { waitUntil: 'networkidle' }).catch(error => {
              events.push({ type: 'goto-error', message: error.message, stack: error.stack });
              return null;
            });
            await page.waitForTimeout(2500);
            const state = await page.evaluate(async () => {
              const registrations = 'serviceWorker' in navigator
                ? await navigator.serviceWorker.getRegistrations().then(rows => rows.map(row => ({ scope: row.scope, active: row.active?.scriptURL || '', waiting: row.waiting?.scriptURL || '', installing: row.installing?.scriptURL || '' })))
                : [];
              const cacheRows = 'caches' in globalThis
                ? await caches.keys().then(async names => Promise.all(names.map(async name => {
                    const cache = await caches.open(name);
                    const keys = await cache.keys();
                    return { name, keys: keys.map(key => key.url) };
                  })))
                : [];
              return {
                href: location.href,
                title: document.title,
                readyState: document.readyState,
                bodyText: document.body?.innerText || '',
                bodyHtml: document.body?.innerHTML || '',
                rootHtml: document.querySelector('#root')?.innerHTML || '',
                registrations,
                controller: navigator.serviceWorker?.controller?.scriptURL || '',
                caches: cacheRows,
              };
            }).catch(error => ({ evaluateError: error.message }));
            const payload = {
              response: response ? { url: response.url(), status: response.status(), headers: response.headers() } : null,
              events,
              state,
            };
            await fs.writeFile('/tmp/issue26-page-diagnostic.json', JSON.stringify(payload, null, 2));
            console.log(JSON.stringify(payload, null, 2));
          });
          EOF
          cat > tests/e2e/issue26-diagnostic.config.mjs <<'EOF'
          import { defineConfig, devices } from '@playwright/test';
          export default defineConfig({
            testDir: '.',
            testMatch: 'issue26-diagnostic.spec.mjs',
            timeout: 60_000,
            workers: 1,
            reporter: 'line',
            use: { baseURL: 'http://localhost:4173', trace: 'retain-on-failure', screenshot: 'only-on-failure' },
            webServer: {
              command: 'npm run dev:e2e',
              url: 'http://127.0.0.1:4173/tests/e2e/fixtures/harness.html',
              reuseExistingServer: false,
              timeout: 120_000,
            },
            projects: [{ name: 'chromium', use: { ...devices['Desktop Chrome'] } }],
          });
          EOF
          set +e
          npx playwright test --config=tests/e2e/issue26-diagnostic.config.mjs > /tmp/issue26-diagnostic.log 2>&1
          printf '%s\n' "$?" > /tmp/issue26-diagnostic.status
          rm -f tests/e2e/issue26-diagnostic.spec.mjs tests/e2e/issue26-diagnostic.config.mjs
          cat /tmp/issue26-diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue26-combined-diagnostic
          path: |
            /tmp/issue26-focused.log
            /tmp/issue26-focused.status
            /tmp/issue26-diagnostic.log
            /tmp/issue26-diagnostic.status
            /tmp/issue26-page-diagnostic.json
            web/test-results
            web/playwright-report
          if-no-files-found: warn
          retention-days: 7
      - name: Stop after diagnostics
        shell: bash
        run: |
          test "$(cat /tmp/issue26-focused.status)" -eq 0
          test "$(cat /tmp/issue26-diagnostic.status)" -eq 0
      - name: Commit clean browser repair
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issue26-browser-cache-key.yml \
            .github/tmp/issue26_browser_cache_key.py
          git add cloud_pages/sw.js web/test/service-worker.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: bypass Vite development modules in the service worker"
          git push origin HEAD:fix/issue-26-offline-document-cache
