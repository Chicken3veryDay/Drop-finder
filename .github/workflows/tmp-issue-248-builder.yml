name: Temporary Issue 248 Builder

on:
  push:
    branches:
      - fix/issue-248-query-readiness

permissions:
  contents: write

concurrency:
  group: tmp-issue-248-builder
  cancel-in-progress: false

jobs:
  build-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-248-query-readiness
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply generation-safe query readiness fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          provider_path = Path('web/src/features/integration/register-marketplace-props.tsx')
          text = provider_path.read_text(encoding='utf-8')

          text = replace_once(text, '''type ProviderProps = {
            mount: ComponentType<MarketplaceFeatureProps>;
            capabilities: CapabilityReader;
          };
          ''', '''type ProviderProps = {
            mount: ComponentType<MarketplaceFeatureProps>;
            capabilities: CapabilityReader;
          };

          type MarketplaceCatalogView = {
            products: MarketplaceProduct[];
            readyEngine: PlatformQueryEngine | null;
            generationId: string | null;
          };
          ''', 'catalog view type')

          text = replace_once(text,
              '  const [products, setProducts] = useState<MarketplaceProduct[]>([]);\n',
              '''  const [catalogView, setCatalogView] = useState<MarketplaceCatalogView>({
            products: [],
            readyEngine: null,
            generationId: null,
          });
          ''',
              'catalog view state')

          text = replace_once(text,
              '  const mounted = useRef(true);\n',
              '''  const mounted = useRef(true);
            const refreshRequest = useRef(0);
            const refreshTail = useRef<Promise<void>>(Promise.resolve());
          ''',
              'refresh coordination refs')

          text = replace_once(text, '''  const queryAdapter = useMemo(
            () => queryEngine ? createMarketplaceQueryAdapter(queryEngine) : undefined,
            [queryEngine],
          );
          ''', '''  const queryAdapter = useMemo(
            () => queryEngine && catalogView.readyEngine === queryEngine && catalogView.generationId
              ? createMarketplaceQueryAdapter(queryEngine)
              : undefined,
            [catalogView.generationId, catalogView.readyEngine, queryEngine],
          );
          ''', 'query adapter readiness gate')

          old_refresh = '''  const refresh = useCallback(async (force = false, signal?: AbortSignal) => {
            if (!catalog || !queryEngine) {
              setError("Required marketplace platform capabilities are unavailable.");
              setLoading(false);
              return;
            }
            if (force) setRefreshing(true);
            else setLoading(true);
            setError(null);
            try {
              const generation = await catalog.initialize({ signal, force });
              const nextProducts = mapCatalogIndex(generation.index);
              await queryEngine.initialize(generation.generationId, toPlatformProducts(nextProducts));
              if (!mounted.current || signal?.aborted) return;
              setProducts(nextProducts);
            } catch (caught) {
              if (!mounted.current || signal?.aborted) return;
              if (caught instanceof DOMException && caught.name === "AbortError") return;
              setError(caught instanceof Error ? caught.message : "Marketplace data could not be loaded.");
            } finally {
              if (mounted.current && !signal?.aborted) {
                setLoading(false);
                setRefreshing(false);
              }
            }
          }, [catalog, queryEngine]);
          '''
          new_refresh = '''  const refresh = useCallback((force = false, signal?: AbortSignal): Promise<void> => {
            if (!catalog || !queryEngine) {
              setError("Required marketplace platform capabilities are unavailable.");
              setLoading(false);
              return Promise.resolve();
            }

            const requestId = ++refreshRequest.current;
            setCatalogView((current) => ({
              ...current,
              readyEngine: null,
              generationId: null,
            }));
            if (force) setRefreshing(true);
            else setLoading(true);
            setError(null);

            const run = async () => {
              if (signal?.aborted) return;
              try {
                const generation = await catalog.initialize({ signal, force });
                const nextProducts = mapCatalogIndex(generation.index);
                if (!mounted.current || signal?.aborted || requestId !== refreshRequest.current) return;

                await queryEngine.initialize(generation.generationId, toPlatformProducts(nextProducts));
                if (!mounted.current || signal?.aborted || requestId !== refreshRequest.current) return;

                setCatalogView({
                  products: nextProducts,
                  readyEngine: queryEngine,
                  generationId: generation.generationId,
                });
                setError(null);
              } catch (caught) {
                if (!mounted.current || signal?.aborted || requestId !== refreshRequest.current) return;
                if (caught instanceof DOMException && caught.name === "AbortError") return;
                setError(caught instanceof Error ? caught.message : "Marketplace data could not be loaded.");
              } finally {
                if (mounted.current && !signal?.aborted && requestId === refreshRequest.current) {
                  setLoading(false);
                  setRefreshing(false);
                }
              }
            };

            const queued = refreshTail.current.catch(() => undefined).then(run);
            refreshTail.current = queued.catch(() => undefined);
            return queued;
          }, [catalog, queryEngine]);
          '''
          text = replace_once(text, old_refresh, new_refresh, 'serialized refresh lifecycle')

          text = replace_once(text, '''    setProducts((current) => current.map((product) =>
              product.id === productId ? enrichProduct(product, payload) : product
            ));
          ''', '''    setCatalogView((current) => ({
              ...current,
              products: current.products.map((product) =>
                product.id === productId ? enrichProduct(product, payload) : product
              ),
            }));
          ''', 'detail enrichment state')

          text = replace_once(text,
              '        products={products}\n',
              '        products={catalogView.products}\n',
              'mount product source')

          if 'setProducts' in text:
              raise SystemExit('stale setProducts reference remains')
          provider_path.write_text(text, encoding='utf-8')

          e2e_path = Path('web/tests/e2e/integrated-app.spec.mjs')
          e2e = e2e_path.read_text(encoding='utf-8')
          e2e = replace_once(e2e,
              "import { expect, test } from '@playwright/test';\n",
              "import { createHash } from 'node:crypto';\nimport { expect, test } from '@playwright/test';\n",
              'crypto import')

          fixture = r'''
          const sha256 = (text) => createHash('sha256').update(text).digest('hex');
          const delay = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));

          async function installDelayedCatalogFixture(page) {
            const generationId = 'delayed-query-ready-generation';
            const variant = {
              variant_id: 'delayed-query-ready-variant',
              grams: 7,
              current_price: 35,
              price_per_gram: 5,
              product_url: 'https://example.test/delayed-query-ready-product',
              source_weight_label: '7 g',
              documents: [],
            };
            const product = {
              product_id: 'delayed-query-ready-product',
              vendor_id: 'delayed-query-ready-vendor',
              vendor_name: 'Delayed Query Vendor',
              strain_name: 'Delayed Query Flower',
              lineage: 'hybrid',
              total_thc_display_percent: 25,
              detail_shard: 0,
              variants: [variant],
            };
            const indexText = JSON.stringify({ generation_id: generationId, products: [product] });
            const detailText = JSON.stringify({ generation_id: generationId, products: [product] });
            const detailDescriptor = {
              path: 'data/catalog-v4/details/000.json',
              product_count: 1,
              sha256: sha256(detailText),
            };
            const manifestText = JSON.stringify({
              schema_version: 'dropfinder-catalog-manifest-v4',
              generation_id: generationId,
              compact_index: {
                path: 'data/catalog-v4/index.json',
                sha256: sha256(indexText),
              },
              product_detail_shards: [detailDescriptor],
              details: { [product.product_id]: detailDescriptor },
            });
            const json = (body) => ({ status: 200, contentType: 'application/json', body });

            await page.route(/\/data\/catalog-v4\/manifest\.json(?:\?.*)?$/, async (route) => {
              await delay(350);
              await route.fulfill(json(manifestText));
            });
            await page.route(/\/data\/catalog-v4\/index\.json(?:\?.*)?$/, async (route) => {
              await delay(350);
              await route.fulfill(json(indexText));
            });
            await page.route(/\/data\/catalog-v4\/details\/000\.json(?:\?.*)?$/, (route) => route.fulfill(json(detailText)));
          }
          '''.strip('\n')
          marker = "};\n\ntest('integrated marketplace loads catalog-v4 and preserves bounded accessible interaction'"
          e2e = replace_once(e2e, marker, "};\n\n" + fixture + "\n\ntest('integrated marketplace loads catalog-v4 and preserves bounded accessible interaction'", 'fixture insertion')

          regression = r'''
          test('delayed catalog initialization never exposes an uninitialized async query engine', async ({ page }) => {
            await installDelayedCatalogFixture(page);
            await page.goto('/');

            const resultStatus = page.locator('.df-result-header').first();
            await expect(resultStatus).toContainText('1 result', { timeout: 20_000 });
            await expect(page.locator('.df-row').first()).toBeVisible();
            await expect(page.getByText('Query engine is not initialized')).toHaveCount(0);
            await expect(page.getByRole('button', { name: 'Retry' })).toHaveCount(0);
          });
          '''.strip('\n')
          mobile_marker = "test('mobile is a complete responsive port of the desktop marketplace'"
          e2e = replace_once(e2e, mobile_marker, regression + "\n\n" + mobile_marker, 'regression insertion')
          e2e_path.write_text(e2e, encoding='utf-8')
          PY
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Run focused validation
        working-directory: web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build
      - name: Run Chromium readiness regression
        working-directory: web
        run: |
          npx playwright install --with-deps chromium
          npx playwright test tests/e2e/integrated-app.spec.mjs --project=chromium --grep "delayed catalog initialization"
      - name: Commit clean implementation and remove builder
        shell: bash
        run: |
          rm .github/workflows/tmp-issue-248-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/features/integration/register-marketplace-props.tsx web/tests/e2e/integrated-app.spec.mjs .github/workflows/tmp-issue-248-builder.yml
          git commit -m "fix: gate marketplace queries on generation readiness"
          git push origin HEAD:fix/issue-248-query-readiness
