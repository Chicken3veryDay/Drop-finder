name: Temporary PR 333 Mapping Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/issue-84-mapping-prerequisites'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture complete deterministic Python suite
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_*.py' -v > /tmp/pr333-python.log 2>&1
          printf '%s\n' "$?" > /tmp/pr333-python.status
          tail -200 /tmp/pr333-python.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr333-mapping-diagnostic
          path: |
            /tmp/pr333-python.log
            /tmp/pr333-python.status
          if-no-files-found: error
          retention-days: 7
