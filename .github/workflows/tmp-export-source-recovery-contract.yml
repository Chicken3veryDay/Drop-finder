name: Temporary Export Source Recovery Contract

on:
  push:
    branches:
      - fix/scraper-recovery-closure

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/scraper-recovery-closure
      - name: Build permanent workflow and regression files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/dropfinder-cloud.yml')
          text = workflow.read_text(encoding='utf-8')
          path_anchor = '      - "scripts/route_repair.py"\n'
          source_path = '      - "scripts/source_recovery.py"\n'
          if source_path not in text:
              count = text.count(path_anchor)
              if count != 2:
                  raise SystemExit(f'expected two route trigger anchors, found {count}')
              text = text.replace(path_anchor, path_anchor + source_path)

          compile_anchor = '            scripts/route_repair.py scripts/vendor_expansion.py \\\n'
          compile_line = '            scripts/route_repair.py scripts/source_recovery.py scripts/vendor_expansion.py \\\n'
          if compile_line not in text:
              if text.count(compile_anchor) != 1:
                  raise SystemExit('compile anchor missing')
              text = text.replace(compile_anchor, compile_line, 1)

          test_anchor = '            tests.catalog_v4.test_route_repair \\\n'
          recovery_test = '            tests.catalog_v4.test_source_recovery \\\n'
          if recovery_test not in text:
              if text.count(test_anchor) != 1:
                  raise SystemExit('unittest anchor missing')
              text = text.replace(test_anchor, test_anchor + recovery_test, 1)
          workflow.write_text(text, encoding='utf-8')

          contract = Path('tests/test_dropfinder_cloud_workflow_permissions.py')
          tests = contract.read_text(encoding='utf-8')
          assertion_anchor = '        self.assertIn("scripts/route_repair.py scripts/vendor_expansion.py", self.text)\n'
          assertion_replacement = (
              '        self.assertIn("scripts/route_repair.py scripts/source_recovery.py scripts/vendor_expansion.py", self.text)\n'
          )
          if assertion_anchor in tests:
              tests = tests.replace(assertion_anchor, assertion_replacement, 1)
          elif assertion_replacement not in tests:
              raise SystemExit('compile assertion anchor missing')

          route_test_anchor = '        self.assertIn("tests.catalog_v4.test_route_repair", self.text)\n'
          recovery_assertion = '        self.assertIn("tests.catalog_v4.test_source_recovery", self.text)\n'
          if recovery_assertion not in tests:
              if route_test_anchor not in tests:
                  raise SystemExit('test assertion anchor missing')
              tests = tests.replace(route_test_anchor, route_test_anchor + recovery_assertion, 1)

          path_tuple_anchor = '            \'      - "scripts/route_repair.py"\',\n'
          source_tuple = '            \'      - "scripts/source_recovery.py"\',\n'
          if source_tuple not in tests:
              if path_tuple_anchor not in tests:
                  raise SystemExit('path tuple anchor missing')
              tests = tests.replace(path_tuple_anchor, path_tuple_anchor + source_tuple, 1)
          contract.write_text(tests, encoding='utf-8')
          PY
          git diff --check
          mkdir -p exported/tests
          cp .github/workflows/dropfinder-cloud.yml exported/dropfinder-cloud.yml
          cp tests/test_dropfinder_cloud_workflow_permissions.py exported/tests/test_dropfinder_cloud_workflow_permissions.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-recovery-contract-files
          path: exported
          if-no-files-found: error
          retention-days: 1
