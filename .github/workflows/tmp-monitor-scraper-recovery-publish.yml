name: Temporary Scraper Recovery Publish Monitor

on:
  pull_request:
    branches: [verification/scraper-recovery-publish]

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      SOURCE_COMMIT: 2b8ad8577f1cd2f8ff1fe3a51915957e84fda6dc
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for exact production workflows
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          source = os.environ["SOURCE_COMMIT"]
          token = os.environ["GH_TOKEN"]
          required = {
              "DropFinder Cloud CI",
              "DropFinder Autonomous Cloud",
          }
          latest = {}
          for _ in range(150):
              query = urllib.parse.urlencode({"head_sha": source, "per_page": 100})
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/actions/runs?{query}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
              for run in payload.get("workflow_runs", []):
                  if run.get("head_sha") != source or run.get("event") != "push":
                      continue
                  name = str(run.get("name") or "")
                  if name in required:
                      current = latest.get(name)
                      if current is None or int(run.get("id") or 0) > int(current.get("id") or 0):
                          latest[name] = run
              failed = {
                  name: run
                  for name, run in latest.items()
                  if run.get("status") == "completed" and run.get("conclusion") != "success"
              }
              if failed:
                  Path = __import__('pathlib').Path
                  Path("production-workflows.json").write_text(json.dumps(latest, indent=2, sort_keys=True) + "\n")
                  raise SystemExit("exact-source production workflow failed: " + ", ".join(failed))
              if required.issubset(latest) and all(latest[name].get("status") == "completed" for name in required):
                  break
              time.sleep(10)
          else:
              raise SystemExit("timed out waiting for exact-source production workflows")

          summary = {
              name: {
                  "id": latest[name]["id"],
                  "name": name,
                  "status": latest[name]["status"],
                  "conclusion": latest[name]["conclusion"],
                  "head_sha": latest[name]["head_sha"],
                  "html_url": latest[name]["html_url"],
              }
              for name in sorted(required)
          }
          from pathlib import Path
          Path("production-workflows.json").write_text(json.dumps(summary, indent=2, sort_keys=True) + "\n")
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: scraper-recovery-publish-monitor
          path: production-workflows.json
          if-no-files-found: error
          retention-days: 30
