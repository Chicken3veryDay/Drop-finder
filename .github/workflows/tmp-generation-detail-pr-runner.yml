name: Temporary Generation-Safe Detail PR Runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'fix/issue-94-generation-safe-details' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-94-generation-safe-details
      - name: Apply staged reconstruction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/tmp-generation-safe-detail-builder.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          code = textwrap.dedent(workflow[start:end])
          exec(compile(code, 'generation-safe-details', 'exec'))
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Validate catalog and React lifecycle
        working-directory: web
        run: |
          npm ci
          node --test test/catalog-generation-stale-detail.test.mjs test/catalog-shared-cancellation.test.mjs test/catalog-generation-freshness.test.mjs
          npm run lint
          npm run typecheck
          npm test
      - name: Commit final reconstruction
        shell: bash
        run: |
          rm -f .github/workflows/tmp-generation-safe-detail-builder.yml .github/workflows/tmp-generation-detail-pr-runner.yml .github/.tmp-generation-detail-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reject stale detail work after catalog activation"
          git push origin HEAD:fix/issue-94-generation-safe-details
