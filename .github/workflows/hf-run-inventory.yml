name: Inspect Hugging Face deployment run

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/hf-diagnostic-request.txt"

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - name: Capture deployment workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sleep 5
          gh api --paginate "repos/$GH_REPO/actions/runs?branch=deploy%2Ffull-stack-hf&per_page=30" > /tmp/runs.json
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          data = json.loads(Path('/tmp/runs.json').read_text(encoding='utf-8'))
          runs = []
          for row in data.get('workflow_runs', []):
              if row.get('name') != 'Deploy full DropFinder to Hugging Face':
                  continue
              runs.append({
                  'id': row.get('id'),
                  'status': row.get('status'),
                  'conclusion': row.get('conclusion'),
                  'event': row.get('event'),
                  'head_sha': row.get('head_sha'),
                  'created_at': row.get('created_at'),
                  'updated_at': row.get('updated_at'),
                  'html_url': row.get('html_url'),
                  'run_attempt': row.get('run_attempt'),
              })
          payload = {
              'schema_version': 'dropfinder-hf-run-inventory-v1',
              'captured_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'runs': runs[:10],
          }
          Path('deployment/hf-run-inventory.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name "DropFinder Run Inspector"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/hf-run-inventory.json
          git commit -m "deploy: capture Hugging Face workflow status [skip ci]"
          git pull --rebase origin deploy/full-stack-hf
          git push origin HEAD:deploy/full-stack-hf
