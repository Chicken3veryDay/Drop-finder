name: Inspect Hugging Face deployment run

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/hf-diagnostic-request.txt"

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - name: Capture deployment workflow runs and masked failure tail
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sleep 5
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ['GH_REPO']
          token = os.environ['GH_TOKEN']
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'User-Agent': 'DropFinder-Run-Inspector',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          def load_json(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          query = urllib.parse.urlencode({'branch': 'deploy/full-stack-hf', 'per_page': 50})
          payload = {
              'schema_version': 'dropfinder-hf-run-inventory-v2',
              'captured_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'runs': [],
          }
          try:
              data = load_json(f'https://api.github.com/repos/{repo}/actions/runs?{query}')
              for row in data.get('workflow_runs', []):
                  if row.get('name') != 'Deploy full DropFinder to Hugging Face':
                      continue
                  payload['runs'].append({
                      'id': row.get('id'),
                      'status': row.get('status'),
                      'conclusion': row.get('conclusion'),
                      'event': row.get('event'),
                      'head_sha': row.get('head_sha'),
                      'created_at': row.get('created_at'),
                      'updated_at': row.get('updated_at'),
                      'html_url': row.get('html_url'),
                      'run_attempt': row.get('run_attempt'),
                  })
              payload['runs'] = payload['runs'][:10]
              if payload['runs']:
                  latest = payload['runs'][0]
                  jobs_data = load_json(
                      f"https://api.github.com/repos/{repo}/actions/runs/{latest['id']}/jobs?per_page=20"
                  )
                  jobs = []
                  for job in jobs_data.get('jobs', []):
                      jobs.append({
                          'id': job.get('id'),
                          'name': job.get('name'),
                          'status': job.get('status'),
                          'conclusion': job.get('conclusion'),
                          'started_at': job.get('started_at'),
                          'completed_at': job.get('completed_at'),
                          'steps': [
                              {
                                  'name': step.get('name'),
                                  'status': step.get('status'),
                                  'conclusion': step.get('conclusion'),
                                  'number': step.get('number'),
                              }
                              for step in job.get('steps', [])
                          ],
                      })
                  payload['latest_jobs'] = jobs
                  if jobs and jobs[0].get('id'):
                      Path('/tmp/latest_job_id').write_text(str(jobs[0]['id']), encoding='ascii')
          except Exception as exc:
              payload['error'] = f'{type(exc).__name__}: {exc}'
          Path('deployment/hf-run-inventory.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

          if [[ -s /tmp/latest_job_id ]]; then
            job_id="$(cat /tmp/latest_job_id)"
            if gh api "repos/$GH_REPO/actions/jobs/$job_id/logs" > /tmp/latest-job.log 2>/tmp/log-download-error.txt; then
              python - <<'PY'
              import re
              from pathlib import Path
              raw = Path('/tmp/latest-job.log').read_text(encoding='utf-8', errors='replace')
              raw = re.sub(r'hf_[A-Za-z0-9_-]{8,}', '[REDACTED_HF_TOKEN]', raw)
              raw = re.sub(r'(?i)(authorization:\s*(?:bearer|basic)\s+)[^\s]+', r'\1[REDACTED]', raw)
              lines = raw.splitlines()[-240:]
              Path('deployment/hf-latest-job.log').write_text('\n'.join(lines) + '\n', encoding='utf-8')
              PY
            else
              printf 'Unable to download job log.\n' > deployment/hf-latest-job.log
              cat /tmp/log-download-error.txt >> deployment/hf-latest-job.log || true
            fi
          fi

          git config user.name "DropFinder Run Inspector"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/hf-run-inventory.json deployment/hf-latest-job.log 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "deploy: capture Hugging Face workflow diagnostics [skip ci]"
            git pull --rebase origin deploy/full-stack-hf
            git push origin HEAD:deploy/full-stack-hf
          fi
