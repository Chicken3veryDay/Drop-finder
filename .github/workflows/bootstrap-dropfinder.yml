name: Bootstrap DropFinder OS v9

on:
  push:
    branches: [main]
    paths:
      - "bootstrap/source.sha256"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dropfinder-bootstrap
  cancel-in-progress: false

jobs:
  import-source:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Reconstruct verified source archive
        shell: bash
        run: |
          set -euo pipefail
          test -f bootstrap/source.sha256
          test "$(find bootstrap -name 'source.part*.b64' -type f | wc -l)" -gt 0
          cat bootstrap/source.part*.b64 | tr -d '\r\n' | base64 --decode > /tmp/dropfinder-source.tar.xz
          expected="$(cut -d' ' -f1 bootstrap/source.sha256)"
          actual="$(sha256sum /tmp/dropfinder-source.tar.xz | cut -d' ' -f1)"
          test "$actual" = "$expected"
          mkdir -p /tmp/dropfinder-source
          tar -xJf /tmp/dropfinder-source.tar.xz -C /tmp/dropfinder-source
          test -f /tmp/dropfinder-source/pyproject.toml
          test -f /tmp/dropfinder-source/cloud_site/index.html
          test -f /tmp/dropfinder-source/.github/workflows/cloud-pages.yml
      - name: Replace bootstrap tree with editable source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          cp -a /tmp/dropfinder-source/. .
          git config user.name "dropfinder-bootstrap-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: import complete DropFinder OS v9 source and cloud deployment"
          git push origin HEAD:main
