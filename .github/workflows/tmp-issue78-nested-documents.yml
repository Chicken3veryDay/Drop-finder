name: Temporary Issue 78 Nested Documents

on:
  pull_request:
    branches:
      - fix/issue-78-nested-document-merge

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issue78-nested-documents'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-78-nested-document-merge
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply field-aware nested document merge
        run: python .github/tmp/issue78_nested_documents.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            scripts/catalog_v4/builder.py \
            tests/catalog_v4/test_nested_documents.py \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Validate focused and complete Catalog V4 contracts
        run: |
          python -m compileall -q scripts/catalog_v4 tests/catalog_v4
          python -m unittest -v tests.catalog_v4.test_nested_documents tests.catalog_v4.test_document_scope_integrity tests.catalog_v4.test_builder
          python -m scripts.catalog_v4.selftest
          python -m unittest discover -s tests/catalog_v4 -v
          python -m scripts.catalog_v4 build --input cloud_pages/data/catalog.json --output /tmp/catalog-v4-issue78
          python -m scripts.catalog_v4 verify --output /tmp/catalog-v4-issue78
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issue78-nested-documents.yml \
            .github/tmp/issue78_nested_documents.py
          git add scripts/catalog_v4/builder.py tests/catalog_v4/test_nested_documents.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: preserve parent documents on nested variants"
          git push origin HEAD:fix/issue-78-nested-document-merge
