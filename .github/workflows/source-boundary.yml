name: DropFinder Source Boundary

on:
  pull_request:
    paths:
      - 'app/**'
      - 'tests/app/**'
      - 'scripts/verify_source_boundary.py'
      - 'pyproject.toml'
      - 'bootstrap/**'
      - 'PROJECT_STATUS.md'
      - 'release/source-build.json'
      - '.github/workflows/source-boundary.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/app/**'
      - 'scripts/verify_source_boundary.py'
      - 'pyproject.toml'
      - 'bootstrap/**'
      - 'PROJECT_STATUS.md'
      - 'release/source-build.json'
      - '.github/workflows/source-boundary.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
      - name: Install tracked package
        run: python -m pip install --disable-pip-version-check -e .
      - name: Compile and import every tracked app module
        run: python scripts/verify_source_boundary.py --output source-boundary-receipt.json
      - name: Test reliability package
        run: python -m unittest discover -s tests/app -p 'test_*.py' -v
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-boundary-receipt
          path: source-boundary-receipt.json
          if-no-files-found: error
          retention-days: 14
