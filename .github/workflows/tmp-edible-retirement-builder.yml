name: Temporary Edible Retirement Builder

on:
  push:
    branches:
      - docs/issue-175-retire-cannabis-edibles

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/issue-175-retire-cannabis-edibles
      - name: Reconcile code, tests, and documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          migration_path = Path('docs/MULTI_PRODUCT_MIGRATION_PLAN.md')
          migration = migration_path.read_text(encoding='utf-8')
          migration = replace_once(
              migration,
              'Design and implementation contract for the staged migration from the current THCA-flower-only pipeline to a type-aware product marketplace.\n\nThis document is intentionally the first pull request in the stack. No production scraper, catalog, or UI behavior changes should merge before the schema, vendor coverage, retrieval, parsing, publication, and test boundaries below are accepted.\n',
              'Current production contract for DropFinder\'s type-aware marketplace. The supported primary types are cannabis flower, cannabis vape, psilocybin mushroom, and psilocybin vape.\n\nCannabis edibles were formally retired from the v1 contract on 2026-07-18 because the repository has no complete potency, quantity, comparison, publication, UI, or acceptance implementation for that category.\n',
              'migration status',
          )
          migration = migration.replace('3. Preserve multiple type tags for mixed products such as a THCA + mushroom gummy.\n', '3. Preserve type tags without admitting unsupported product categories.\n')
          migration = migration.replace('5. Add a compact-row terpene field to every cannabis product type.\n', '5. Add a compact-row terpene field to supported cannabis product types.\n')
          migration = replace_once(
              migration,
              '''- `cannabis_flower`
          - `cannabis_vape`
          - `cannabis_edible`
          - `psilocybin_mushroom`
          - `psilocybin_vape`

          `type_tags` may contain more than one type. A mixed THCA + mushroom gummy can use:

          ```json
          {
            "primary_type": "cannabis_edible",
            "type_tags": ["cannabis_edible", "psilocybin_mushroom"]
          }
          ```
          ''',
              '''- `cannabis_flower`
          - `cannabis_vape`
          - `psilocybin_mushroom`
          - `psilocybin_vape`

          `type_tags` may contain more than one supported type only when the product has explicit evidence for each tag. Unsupported edible-only and mixed edible offers are not admitted to the stable taxonomy.
          ''',
              'taxonomy list',
          )
          start = migration.index('### Cannabis edible\n')
          end = migration.index('### Psilocybin mushroom\n', start)
          migration = migration[:start] + migration[end:]
          decision = '''
          ## Retired product type decision: cannabis edibles

          `cannabis_edible` is not a stable or enabled DropFinder product type. The symbol, classifier path, UI selector, filters, comparison metric, and row contract were removed together on 2026-07-18.

          The retirement is deliberate rather than a claim that edible support is impossible. The previous documentation described a category that the repository did not implement end to end. There was no accepted contract for piece count, labeled active amount, active amount per piece, multi-active products, `price_per_100mg`, completeness scoring, publication admission, generated artifacts, shopper cards, legal boundaries, or production acceptance. Keeping the type declared would allow fixtures or integrations to imply support that production could not deliver.

          Edible-only products and mixed offers whose primary representation would require an edible contract remain unsupported and are not classified into another category. Existing four-type data remains schema-compatible because no published production artifact was authorized to use `cannabis_edible`.

          A future reintroduction requires a versioned taxonomy and publication schema, explicit source-evidence rules, potency and quantity normalization, a documented comparison metric, completeness scoring, legal and privacy review, generated-data migration and rollback, UI selectors and cards, negative classification tests, browser acceptance, and a production receipt. It must not reuse the retired identifier silently under different semantics.

          '''.replace('          ', '')
          controlled = '## Controlled-product boundary\n'
          migration = replace_once(migration, controlled, decision + controlled, 'retirement decision')
          migration_path.write_text(migration, encoding='utf-8')

          ui_path = Path('docs/MULTI_PRODUCT_UI_SPEC.md')
          ui = ui_path.read_text(encoding='utf-8')
          ui = ui.replace('- Edibles\n', '')
          ui = ui.replace('?type=cannabis_edible\n', '')
          ui = replace_once(
              ui,
              'Search does not pull secondary-tagged records from another primary-type index. A mixed THCA + mushroom gummy with `primary_type=cannabis_edible` remains in Edibles and does not appear in Mushrooms.\n',
              'Search does not pull secondary-tagged records from another primary-type index. Unsupported edible-only or mixed edible offers do not appear under another supported type.\n',
              'UI search contract',
          )
          start = ui.index('#### Cannabis edible\n')
          end = ui.index('#### Psilocybin mushroom\n', start)
          ui = ui[:start] + ui[end:]
          ui = ui.replace('- cannabis edible: price per 100 mg\n', '')
          start = ui.index('### Cannabis edible row\n')
          end = ui.index('### Psilocybin mushroom row\n', start)
          ui = ui[:start] + ui[end:]
          note = '''
          ## Unsupported category behavior

          The production selector exposes exactly four primary types: Flower, Vapes, Mushrooms, and Mushroom vapes. Cannabis edibles are not hidden behind a feature flag or accepted without a view. Edible-only and mixed edible records are unsupported until a future versioned product contract is implemented and accepted.

          '''.replace('          ', '')
          ui = replace_once(ui, '## Information architecture\n', note + '## Information architecture\n', 'UI retirement note')
          ui_path.write_text(ui, encoding='utf-8')

          test_path = Path('tests/multi_product/test_classification.py')
          tests = test_path.read_text(encoding='utf-8')
          tests = tests.replace('    CANNABIS_EDIBLE,\n', '')
          tests = tests.replace('        self.assertNotIn(CANNABIS_EDIBLE, ENABLED_PRODUCT_TYPES)\n', '')
          tests = tests.replace('        self.assertIn(CANNABIS_EDIBLE, SUPPORTED_PRODUCT_TYPES)\n', '')
          insertion = '''
              def test_supported_taxonomy_excludes_retired_cannabis_edibles(self):
                  self.assertEqual(
                      SUPPORTED_PRODUCT_TYPES,
                      (
                          CANNABIS_FLOWER,
                          CANNABIS_VAPE,
                          PSILOCYBIN_MUSHROOM,
                          PSILOCYBIN_VAPE,
                      ),
                  )
                  self.assertEqual(ENABLED_PRODUCT_TYPES, SUPPORTED_PRODUCT_TYPES)
                  self.assertIsNone(classify_product(name="Delta-9 THC Gummies 10mg 20 count"))
                  self.assertIsNone(classify_product(name="THCA and magic mushroom gummy variety pack"))
          '''.replace('          ', '')
          marker = '\n\nif __name__ == "__main__":\n'
          tests = replace_once(tests, marker, insertion + marker, 'classification retirement test')
          test_path.write_text(tests, encoding='utf-8')
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate retired contract
        run: |
          python -m compileall -q scripts/multi_product tests/multi_product
          python -m unittest discover -s tests/multi_product -p 'test_*.py' -v
          ! grep -R "cannabis_edible\|Cannabis edible\|Edibles" scripts/multi_product tests/multi_product docs/MULTI_PRODUCT_MIGRATION_PLAN.md docs/MULTI_PRODUCT_UI_SPEC.md
      - name: Commit final reconciliation
        shell: bash
        run: |
          rm -f .github/workflows/tmp-edible-retirement-builder.yml .github/.tmp-edible-retirement-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/multi_product/classification.py scripts/multi_product/__init__.py tests/multi_product/test_classification.py docs/MULTI_PRODUCT_MIGRATION_PLAN.md docs/MULTI_PRODUCT_UI_SPEC.md .github/workflows/tmp-edible-retirement-builder.yml .github/.tmp-edible-retirement-trigger
          git commit -m "docs: retire the unimplemented cannabis edible contract"
          git push origin HEAD:docs/issue-175-retire-cannabis-edibles
