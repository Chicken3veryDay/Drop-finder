name: Deploy DropFinder Cloud

on:
  push:
    branches: [main]
    paths:
      - "cloud_pages/**"
      - "web/scripts/verify-publication.mjs"
      - "web/scripts/verify-pages-endpoint.mjs"
      - "web/scripts/publication_gate.py"
      - ".github/workflows/deploy-pages.yml"
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, '[deploy]')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Validate cloud artifact
        shell: bash
        run: |
          set -euo pipefail
          node web/scripts/verify-publication.mjs cloud_pages
          python web/scripts/publication_gate.py verify-published --root cloud_pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cloud_pages
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify public endpoint and record receipt
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOYED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          : "${PAGE_URL:?Pages did not return a deployment URL}"
          verified=false
          verification_error=""
          for attempt in $(seq 1 12); do
            if node web/scripts/verify-pages-endpoint.mjs "$PAGE_URL" >/tmp/pages-verification.json 2>/tmp/pages-verification.err; then
              cat /tmp/pages-verification.json
              verified=true
              verification_error=""
              break
            fi
            verification_error="$(cat /tmp/pages-verification.err)"
            echo "Endpoint not ready (attempt $attempt): $verification_error"
            sleep 10
          done
          test "$verified" = "true"
          mkdir -p deployment
          PAGE_URL="$PAGE_URL" VERIFIED="$verified" DEPLOYED_SHA="$DEPLOYED_SHA" python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          catalog = json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status = json.loads(Path('cloud_pages/data/status.json').read_text())
          payload = {
              'schema_version': 'dropfinder-pages-deployment-v3',
              'status': 'live',
              'page_url': os.environ['PAGE_URL'],
              'http_status': 200,
              'publication_verified': os.environ['VERIFIED'] == 'true',
              'deployed_sha': os.environ['DEPLOYED_SHA'],
              'verified_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'product_count': catalog['product_count'],
              'healthy_sources': status['healthy_sources'],
              'enabled_sources': status['enabled_sources'],
          }
          Path('deployment/pages.json').write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n')
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
          git config user.name "dropfinder-deploy-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add deployment/pages.json
          git diff --cached --quiet || git commit -m "chore: record verified Pages deployment [skip ci]"
          git push origin HEAD:main
      - name: Close deployment trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue close "$ISSUE_URL" --comment "Deployment verified: ${{ steps.deployment.outputs.page_url }}"
