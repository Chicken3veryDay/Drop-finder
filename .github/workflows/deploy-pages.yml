name: Deploy DropFinder Cloud

on:
  push:
    branches: [main]
    paths:
      - "cloud_site/**"
      - ".github/workflows/deploy-pages.yml"
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, '[deploy]')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Validate cloud artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s cloud_site/index.html
          test -s cloud_site/data/status.json
          python -m json.tool cloud_site/data/status.json >/dev/null
          python -m json.tool cloud_site/manifest.webmanifest >/dev/null
          grep -q "DropFinder OS 9.0" cloud_site/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cloud_site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Record verified deployment
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOYED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -n "$PAGE_URL"
          mkdir -p deployment
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          payload = {
              "schema_version": "dropfinder-pages-deployment-v1",
              "status": "live",
              "page_url": os.environ["PAGE_URL"],
              "deployed_sha": os.environ["DEPLOYED_SHA"],
              "verified_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
          }
          with open("deployment/pages.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          git config user.name "dropfinder-deploy-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/pages.json
          git diff --cached --quiet || git commit -m "chore: record verified Pages deployment [skip ci]"
          git push origin HEAD:main
      - name: Close deployment trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue close "$ISSUE_URL" --comment "Deployment completed: ${{ steps.deployment.outputs.page_url }}"
