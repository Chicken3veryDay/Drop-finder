name: Temporary Scraper Recovery Patch

on:
  pull_request:
    branches: [fix/scraper-recovery-closure]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'trigger/scraper-recovery-patch'
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/scraper-recovery-closure
          fetch-depth: 0
      - name: Load recovery patch from execution branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin trigger/scraper-recovery-patch
          git show origin/trigger/scraper-recovery-patch:scripts/tmp_apply_scraper_recovery.py > /tmp/apply_scraper_recovery.py
      - name: Apply recovery patch
        run: python /tmp/apply_scraper_recovery.py
      - name: Normalize generated whitespace
        run: |
          python - <<'PY'
          from pathlib import Path
          for name in ('scripts/route_repair.py', 'tests/catalog_v4/test_route_repair.py'):
              path = Path(name)
              lines = [line.rstrip() for line in path.read_text(encoding='utf-8').splitlines()]
              while lines and not lines[-1]:
                  lines.pop()
              path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Compile patched module
        run: python -m py_compile scripts/route_repair.py
      - name: Run route-repair unit tests
        run: python -m unittest -v tests.catalog_v4.test_route_repair
      - name: Run production worker self-test
        run: python scripts/autonomous_worker_v4.py --self-test
      - name: Validate permanent diff
        run: |
          git diff --check -- scripts/route_repair.py tests/catalog_v4/test_route_repair.py
          git status --short
          git diff --stat -- scripts/route_repair.py tests/catalog_v4/test_route_repair.py
      - name: Commit permanent patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'dropfinder-maintenance-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/route_repair.py tests/catalog_v4/test_route_repair.py
          git commit -m 'fix: recover remaining scraper data paths'
      - name: Push permanent patch
        run: git push origin HEAD:fix/scraper-recovery-closure
