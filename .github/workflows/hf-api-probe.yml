name: Probe Hugging Face API

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/hf-api-probe-request.txt"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Provision and probe Hugging Face repositories
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check 'huggingface_hub>=0.34,<2'
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          token = os.getenv("HF_TOKEN", "").strip()
          report = {
              "schema_version": "dropfinder-hf-api-probe-v2",
              "checked_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              "status": "failed",
              "steps": [],
          }

          def clean(value):
              text = str(value)
              return text.replace(token, "[REDACTED]") if token else text

          def run_step(name, operation):
              try:
                  result = operation()
                  report["steps"].append({"name": name, "status": "healthy", "result": clean(result)[:500]})
                  return result
              except Exception as exc:
                  report["steps"].append({
                      "name": name,
                      "status": "failed",
                      "error_type": type(exc).__name__,
                      "error": clean(exc)[:1200],
                  })
                  raise

          try:
              if not token:
                  raise RuntimeError("HF_TOKEN is missing or empty")
              from huggingface_hub import HfApi
              api = HfApi(token=token)
              identity = run_step("whoami", api.whoami)
              namespace = str(identity.get("name") or "").strip()
              if not namespace:
                  raise RuntimeError("Hugging Face identity did not contain a username")
              state_repo = f"{namespace}/dropfinder-private-state"
              space_repo = f"{namespace}/dropfinder-os"
              report["identity"] = namespace
              report["state_repository"] = state_repo
              report["space_repository"] = space_repo
              run_step(
                  "create_private_state_repository",
                  lambda: api.create_repo(
                      repo_id=state_repo,
                      repo_type="dataset",
                      private=True,
                      exist_ok=True,
                  ),
              )
              run_step(
                  "create_docker_space",
                  lambda: api.create_repo(
                      repo_id=space_repo,
                      repo_type="space",
                      space_sdk="docker",
                      private=False,
                      exist_ok=True,
                  ),
              )
              report["status"] = "healthy"
          except Exception as exc:
              report["error_type"] = type(exc).__name__
              report["error"] = clean(exc)[:1200]

          Path("deployment/hf-api-probe.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.name "DropFinder API Probe"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/hf-api-probe.json
          git commit -m "deploy: record Hugging Face repository probe [skip ci]"
          git pull --rebase origin deploy/full-stack-hf
          git push origin HEAD:deploy/full-stack-hf
