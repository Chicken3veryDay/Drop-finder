name: DropFinder Multi-Product

on:
  push:
    branches: [main, "multi-product/**"]
    paths:
      - "scripts/multi_product/**"
      - "tests/multi_product/**"
      - "scripts/autonomous_worker_v4.py"
      - "scripts/autonomous_merge.py"
      - "web/src/features/marketplace/**"
      - "web/src/features/integration/**"
      - "web/scripts/publication_gate.py"
      - ".github/workflows/multi-product.yml"
  pull_request:
    branches: [main, "multi-product/**"]
    paths:
      - "scripts/multi_product/**"
      - "tests/multi_product/**"
      - "scripts/autonomous_worker_v4.py"
      - "scripts/autonomous_merge.py"
      - "web/src/features/marketplace/**"
      - "web/src/features/integration/**"
      - "web/scripts/publication_gate.py"
      - ".github/workflows/multi-product.yml"

permissions:
  contents: write

jobs:
  python-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile multi-product modules
        run: python -m compileall -q scripts/multi_product tests/multi_product
      - name: Test multi-product contracts
        run: python -m unittest discover -s tests/multi_product -v
      - name: Test production worker wrapper
        run: python scripts/autonomous_worker_v4.py --self-test
      - name: Test publication sanitizer
        run: python scripts/autonomous_merge.py --self-test

  web-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish verified current UI to GitHub Pages
        if: github.event_name == 'pull_request' && github.head_ref == 'ops/publish-current-ui' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          npm --prefix web run verify:publication
          rm -rf /tmp/dropfinder-current-ui /tmp/dropfinder-pages-repo
          mkdir -p /tmp/dropfinder-current-ui
          cp -a cloud_pages/. /tmp/dropfinder-current-ui/
          touch /tmp/dropfinder-current-ui/.nojekyll
          test -s /tmp/dropfinder-current-ui/data/catalog.json
          test -s /tmp/dropfinder-current-ui/data/status.json
          test -s /tmp/dropfinder-current-ui/assets/vite-manifest.json
          node web/scripts/verify-publication.mjs /tmp/dropfinder-current-ui
          git config user.name "DropFinder UI Publisher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add --detach /tmp/dropfinder-pages-repo origin/gh-pages
          cd /tmp/dropfinder-pages-repo
          git switch --orphan pr-ui-pages-next
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx >/dev/null 2>&1 || true
          cp -a /tmp/dropfinder-current-ui/. .
          git add -A
          git commit -m "Publish verified multi-product UI ${GITHUB_SHA}"
          published_sha="$(git rev-parse HEAD)"
          git push --force origin HEAD:gh-pages
          remote_sha="$(git ls-remote origin refs/heads/gh-pages | awk '{print $1}')"
          test "$remote_sha" = "$published_sha"
          node "$GITHUB_WORKSPACE/web/scripts/verify-publication.mjs" /tmp/dropfinder-pages-repo
