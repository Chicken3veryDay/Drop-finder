name: Temporary Balanced Shard Map

on:
  pull_request:
    branches: [verification/balanced-recovery-publish]

permissions:
  contents: read

jobs:
  map:
    if: github.head_ref == 'trigger/balanced-recovery-publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 58589d9b43dbcc2f3ff291b551ef7a56591e3911
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Record production shard assignments
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import scripts.autonomous_worker_v4 as composition
          composition.install_runtime()
          sources = composition.worker.core.SOURCES
          payload = {
              str(shard): [
                  {
                      'source_id': source[0],
                      'vendor': source[1],
                      'route_count': len(source[2]),
                      'fallback_count': len(composition.worker.FALLBACK_HTML_ROUTES.get(source[0], [])),
                  }
                  for index, source in enumerate(sources)
                  if index % 6 == shard
              ]
              for shard in range(6)
          }
          json.dump(payload, open('balanced-shard-map.json', 'w', encoding='utf-8'), indent=2, sort_keys=True)
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: balanced-shard-map
          path: balanced-shard-map.json
          if-no-files-found: error
          retention-days: 1
