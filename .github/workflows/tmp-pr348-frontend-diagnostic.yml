name: Temporary PR 348 Frontend Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/issue-83-bounded-cache-fallback'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - name: Capture complete frontend tests
        working-directory: web
        shell: bash
        run: |
          set +e
          npm test > /tmp/pr348-frontend.log 2>&1
          printf '%s\n' "$?" > /tmp/pr348-frontend.status
          tail -300 /tmp/pr348-frontend.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr348-frontend
          path: |
            /tmp/pr348-frontend.log
            /tmp/pr348-frontend.status
          if-no-files-found: error
          retention-days: 7
