name: Temporary Issues 98 99 Virtual Policy

on:
  pull_request:
    branches:
      - fix/issues-98-99-virtual-scroll-focus

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issues98-99-virtual-policy-r2'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issues-98-99-virtual-scroll-focus
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply semantic scroll and focus policy
        run: |
          python .github/tmp/issues98_99_virtual_policy.py
          python .github/tmp/issues98_99_tests.py
      - name: Verify bounded source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/virtual-marketplace-focus.test.tsx \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/virtual-query-focus-policy.test.mjs \
            | sort > /tmp/allowed-files
          comm -23 /tmp/actual-files /tmp/allowed-files > /tmp/unexpected-files
          test ! -s /tmp/unexpected-files || { cat /tmp/unexpected-files; exit 1; }
          while read -r required; do grep -qx "$required" /tmp/actual-files; done < /tmp/allowed-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Validate focused virtual policies
        working-directory: web
        run: |
          node --test test/virtual-query-focus-policy.test.mjs test/virtual-page-retention.test.mjs
          npx vitest run src/features/integration/virtual-marketplace-focus.test.tsx src/features/integration/marketplace-integration.test.ts
      - name: Validate complete frontend and build contracts
        working-directory: web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run benchmark
          npm run build
          npm run build:platform
          npm run analyze:chunks
          npm run pwa:check
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Validate integrated virtual marketplace
        working-directory: web
        run: npx playwright test tests/e2e/integrated-app.spec.mjs --project=chromium
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issues98-99-virtual-policy.yml \
            .github/tmp/issues98_99_virtual_policy.py \
            .github/tmp/issues98_99_tests.py
          git add \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/virtual-marketplace-focus.test.tsx \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/virtual-query-focus-policy.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: reset semantic queries and retain virtual focus"
          git push origin HEAD:fix/issues-98-99-virtual-scroll-focus
