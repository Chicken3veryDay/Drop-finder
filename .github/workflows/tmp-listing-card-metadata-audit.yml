name: Temporary Listing Card Metadata Audit

on:
  pull_request:
    branches: [verification/listing-card-metadata-audit]

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'trigger/listing-card-metadata-audit'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
      - name: Capture first-party listing-card evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p listing-card-audit/raw listing-card-audit/snippets
          python - <<'PY'
          from __future__ import annotations

          import html
          import json
          import pathlib
          import re
          import urllib.error
          import urllib.request
          from urllib.parse import urlsplit

          root = pathlib.Path('listing-card-audit')
          raw_dir = root / 'raw'
          snippet_dir = root / 'snippets'
          user_agent = 'DropFinderCloud/9.0 (+https://github.com/Chicken3veryDay/Drop-finder)'
          targets = [
              {
                  'id': 'plain_jane_home',
                  'url': 'https://plainjane.com/',
                  'needles': ['Purple Milk', 'Orange Cookies', 'Dior Runtz', 'Animal Mintz'],
              },
              {
                  'id': 'plain_jane_all_page_3',
                  'url': 'https://plainjane.com/collections/all?page=3',
                  'needles': ['Purple Milk', 'Orange Cookies', 'Dior Runtz', 'Animal Mintz'],
              },
              {
                  'id': 'gold_canna_bulk',
                  'url': 'https://goldcanna.com/collections/thca-bulk',
                  'needles': ['Cap Junkie', 'THCA'],
              },
              {
                  'id': 'gold_canna_all',
                  'url': 'https://goldcanna.com/collections/all',
                  'needles': ['Cap Junkie', 'THCA'],
              },
          ]

          attribute_pattern = re.compile(r'''([:\w-]+)\s*=\s*(["'])(.*?)\2''', re.S)
          product_anchor_pattern = re.compile(
              r'''<a\b(?P<attrs>[^>]*\bhref\s*=\s*(["'])(?P<href>.*?)\2[^>]*)>(?P<body>.*?)</a>''',
              re.I | re.S,
          )
          metadata_patterns = {
              'thca': re.compile(r'\b(?:THCA|THC-A)\b.{0,40}?\b\d{1,3}(?:\.\d+)?\s*%', re.I | re.S),
              'lineage': re.compile(r'\b(?:strain\s+profile|indica(?:-leaning)?|sativa(?:-leaning)?|hybrid)\b', re.I),
              'rating': re.compile(r'\b(?:rating|review|stars?|judge\.me|stamped|loox)\b', re.I),
          }

          results = []
          for target in targets:
              request = urllib.request.Request(
                  target['url'],
                  headers={
                      'User-Agent': user_agent,
                      'Accept': 'text/html,application/xhtml+xml;q=0.9,*/*;q=0.1',
                      'Accept-Encoding': 'identity',
                  },
              )
              record = {
                  'id': target['id'],
                  'url': target['url'],
                  'status': None,
                  'content_type': '',
                  'bytes': 0,
                  'error': '',
                  'needle_hits': {},
                  'product_anchors': [],
                  'metadata_matches': {},
              }
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = response.read(12 * 1024 * 1024 + 1)
                      if len(payload) > 12 * 1024 * 1024:
                          raise ValueError('listing response exceeds 12 MiB audit limit')
                      charset = response.headers.get_content_charset() or 'utf-8'
                      text = payload.decode(charset, 'replace')
                      record['status'] = int(getattr(response, 'status', 200))
                      record['content_type'] = str(response.headers.get('Content-Type') or '')
                      record['bytes'] = len(payload)
              except Exception as exc:
                  record['error'] = f'{type(exc).__name__}: {exc}'
                  results.append(record)
                  continue

              (raw_dir / f"{target['id']}.html").write_text(text, encoding='utf-8')
              lower = text.casefold()
              for needle in target['needles']:
                  positions = []
                  start = 0
                  lowered_needle = needle.casefold()
                  while len(positions) < 12:
                      position = lower.find(lowered_needle, start)
                      if position < 0:
                          break
                      positions.append(position)
                      start = position + len(lowered_needle)
                  record['needle_hits'][needle] = positions
                  if positions:
                      parts = []
                      for index, position in enumerate(positions):
                          left = max(0, position - 2500)
                          right = min(len(text), position + len(needle) + 3500)
                          parts.append(f'\n===== {needle} hit {index + 1} at {position} =====\n{text[left:right]}')
                      (snippet_dir / f"{target['id']}--{re.sub(r'[^a-z0-9]+', '-', lowered_needle).strip('-')}.html").write_text(
                          ''.join(parts), encoding='utf-8'
                      )

              for match in product_anchor_pattern.finditer(text):
                  href = html.unescape(match.group('href')).strip()
                  if '/products/' not in href and '/product/' not in href:
                      continue
                  attrs = {name.casefold(): html.unescape(value) for name, _, value in attribute_pattern.findall(match.group('attrs'))}
                  body_text = re.sub(r'<[^>]+>', ' ', html.unescape(match.group('body')))
                  body_text = ' '.join(body_text.split())[:500]
                  record['product_anchors'].append({
                      'start': match.start(),
                      'end': match.end(),
                      'href': href[:1000],
                      'body_text': body_text,
                      'class': attrs.get('class', '')[:500],
                      'aria_label': attrs.get('aria-label', '')[:500],
                      'data_product_id': attrs.get('data-product-id', '')[:200],
                  })
                  if len(record['product_anchors']) >= 500:
                      break

              for name, pattern in metadata_patterns.items():
                  matches = []
                  for match in pattern.finditer(text):
                      left = max(0, match.start() - 240)
                      right = min(len(text), match.end() + 500)
                      matches.append({
                          'start': match.start(),
                          'match': ' '.join(re.sub(r'<[^>]+>', ' ', html.unescape(match.group(0))).split())[:300],
                          'context': text[left:right],
                      })
                      if len(matches) >= 200:
                          break
                  record['metadata_matches'][name] = matches

              results.append(record)

          (root / 'audit.json').write_text(json.dumps(results, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          summary = [
              {
                  'id': item['id'],
                  'status': item['status'],
                  'bytes': item['bytes'],
                  'error': item['error'],
                  'needle_counts': {key: len(value) for key, value in item['needle_hits'].items()},
                  'product_anchor_count': len(item['product_anchors']),
                  'metadata_match_counts': {key: len(value) for key, value in item['metadata_matches'].items()},
              }
              for item in results
          ]
          (root / 'summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: listing-card-metadata-audit
          path: listing-card-audit
          if-no-files-found: error
          retention-days: 14
