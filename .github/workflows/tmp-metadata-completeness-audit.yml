name: Temporary Metadata Completeness Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'fix/metadata-completeness'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Audit catalog metadata and source paths
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p metadata-audit
          find . -maxdepth 4 -type f | sort > metadata-audit/repository-files.txt
          rg -n -i --glob '!data/**' --glob '!node_modules/**' --glob '!.git/**' \
            'lineage|total[_ -]?thc|rating|review[_ -]?count|potency|thca|delta.?9|coa|certificate' \
            . > metadata-audit/field-paths.txt || true
          rg -l -i --glob '!data/**' --glob '!node_modules/**' --glob '!.git/**' \
            'lineage|total[_ -]?thc|rating|review[_ -]?count|potency|thca|delta.?9|coa|certificate' \
            . | sort > metadata-audit/candidate-files.txt || true
          python - <<'PY' > metadata-audit/python.log 2>&1
          import json
          import math
          import pathlib
          import traceback
          from collections import Counter, defaultdict

          root = pathlib.Path('.')
          audit = pathlib.Path('metadata-audit')

          def extract_rows(payload):
              if isinstance(payload, list):
                  return [row for row in payload if isinstance(row, dict)]
              if not isinstance(payload, dict):
                  return []
              for key in ('products', 'items', 'records', 'entries', 'data'):
                  value = payload.get(key)
                  if isinstance(value, list) and any(isinstance(row, dict) for row in value):
                      return [row for row in value if isinstance(row, dict)]
              for value in payload.values():
                  if isinstance(value, dict):
                      rows = extract_rows(value)
                      if rows:
                          return rows
              return []

          try:
              catalog_files = sorted((root / 'data/catalog-v4').rglob('*.json'))
              file_shapes = {}
              all_rows = []
              rows_by_file = {}
              for path in catalog_files:
                  try:
                      payload = json.loads(path.read_text(encoding='utf-8'))
                      rows = extract_rows(payload)
                      rows_by_file[str(path)] = len(rows)
                      file_shapes[str(path)] = {
                          'root_type': type(payload).__name__,
                          'root_keys': sorted(payload.keys()) if isinstance(payload, dict) else [],
                          'row_count': len(rows),
                      }
                      if '/details/' in str(path).replace('\\', '/'):
                          all_rows.extend(rows)
                  except Exception as exc:
                      file_shapes[str(path)] = {'error': repr(exc)}

              index_path = root / 'data/catalog-v4/index.json'
              index_rows = []
              if index_path.exists():
                  index_rows = extract_rows(json.loads(index_path.read_text(encoding='utf-8')))
              products = all_rows or index_rows

              def get_path(obj, path):
                  cur = obj
                  for key in path.split('.'):
                      if not isinstance(cur, dict) or key not in cur:
                          return None
                      cur = cur[key]
                  return cur

              def present(value):
                  if value is None:
                      return False
                  if isinstance(value, str):
                      return bool(value.strip()) and value.strip().lower() not in {'unknown', 'unavailable', 'n/a', 'na', 'none', '-', '—'}
                  if isinstance(value, (list, tuple, set, dict)):
                      return bool(value)
                  if isinstance(value, float) and math.isnan(value):
                      return False
                  return True

              candidate_paths = {
                  'lineage': ['lineage', 'strain.lineage', 'metadata.lineage', 'genetics.lineage', 'classification.lineage', 'strain_type'],
                  'thca': ['potency.thca', 'potency.thca_percent', 'thca', 'thca_percent', 'cannabinoids.thca', 'potency.values.thca'],
                  'delta9_thc': ['potency.delta9_thc', 'potency.delta9_thc_percent', 'delta9_thc', 'delta9_thc_percent', 'cannabinoids.delta9_thc', 'potency.values.delta9_thc'],
                  'total_thc': ['potency.total_thc', 'potency.total_thc_percent', 'total_thc', 'total_thc_percent', 'cannabinoids.total_thc', 'potency.values.total_thc'],
                  'rating': ['rating', 'reviews.rating', 'review_summary.rating', 'aggregate_rating.value', 'aggregateRating.ratingValue'],
                  'review_count': ['review_count', 'reviews.count', 'review_summary.count', 'aggregate_rating.count', 'aggregateRating.reviewCount'],
                  'images': ['images', 'image_urls', 'media.images', 'image'],
                  'documents': ['documents', 'coa_documents', 'lab_documents', 'compliance.documents', 'potency.documents'],
              }

              def first_value(product, paths):
                  for path in paths:
                      value = get_path(product, path)
                      if present(value):
                          return path, value
                  return None, None

              counts = {}
              resolved_paths = defaultdict(Counter)
              missing_examples = defaultdict(list)
              for field, paths in candidate_paths.items():
                  populated = 0
                  for product in products:
                      path, value = first_value(product, paths)
                      if path:
                          populated += 1
                          resolved_paths[field][path] += 1
                      elif len(missing_examples[field]) < 16:
                          missing_examples[field].append({
                              'vendor': product.get('vendor_name') or product.get('vendor') or product.get('source_name'),
                              'name': product.get('name') or product.get('title') or product.get('strain_name'),
                              'id': product.get('id') or product.get('product_id'),
                          })
                  counts[field] = {
                      'populated': populated,
                      'missing': max(0, len(products) - populated),
                      'coverage': round(populated / len(products), 6) if products else 0,
                  }

              top_keys = Counter()
              nested_keys = Counter()
              for product in products:
                  top_keys.update(product.keys())
                  for key, value in product.items():
                      if isinstance(value, dict):
                          nested_keys.update(f'{key}.{child}' for child in value.keys())

              target_terms = ('plain jane', 'gold canna', 'bay smokes', 'green unicorn')
              samples = []
              for product in products:
                  vendor = str(product.get('vendor_name') or product.get('vendor') or product.get('source_name') or '').lower()
                  if any(term in vendor for term in target_terms):
                      samples.append(product)
                  if len(samples) >= 32:
                      break

              summary = {
                  'schema_version': 'dropfinder-metadata-completeness-audit-v2',
                  'product_count': len(products),
                  'index_product_count': len(index_rows),
                  'catalog_json_file_count': len(catalog_files),
                  'rows_by_file': rows_by_file,
                  'file_shapes': file_shapes,
                  'coverage': counts,
                  'resolved_paths': {field: dict(counter) for field, counter in resolved_paths.items()},
                  'missing_examples': dict(missing_examples),
                  'top_level_keys': dict(top_keys.most_common()),
                  'nested_keys': dict(nested_keys.most_common()),
              }
              (audit / 'summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n', encoding='utf-8')
              (audit / 'sample-products.json').write_text(json.dumps(samples, indent=2, sort_keys=True) + '\n', encoding='utf-8')
              print(json.dumps(summary, indent=2, sort_keys=True))
          except Exception:
              traceback.print_exc()
          PY
          echo "$?" > metadata-audit/python-exit-code.txt
          if [ -s metadata-audit/candidate-files.txt ]; then
            tar -czf metadata-audit/candidate-source-files.tar.gz -T metadata-audit/candidate-files.txt || true
          fi
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: metadata-completeness-audit
          path: metadata-audit
          if-no-files-found: error
          retention-days: 30
