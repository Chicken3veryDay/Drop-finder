name: Temporary Cache-Bust Status Snapshot

on:
  pull_request:
    branches: [verification/cache-bust-publish]

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    env:
      SOURCE_COMMIT: 08fe39226d9d077987e067bdf875baa73c97f28c
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Capture exact-source workflow status
        run: |
          python - <<'PY'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path
          repo = os.environ['GITHUB_REPOSITORY']
          source = os.environ['SOURCE_COMMIT']
          query = urllib.parse.urlencode({'head_sha': source, 'per_page': 100})
          request = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/runs?{query}',
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)
          rows = [
              {
                  'id': run.get('id'),
                  'name': run.get('name'),
                  'event': run.get('event'),
                  'status': run.get('status'),
                  'conclusion': run.get('conclusion'),
                  'head_sha': run.get('head_sha'),
                  'html_url': run.get('html_url'),
                  'jobs_url': run.get('jobs_url'),
              }
              for run in payload.get('workflow_runs', [])
              if run.get('head_sha') == source and run.get('event') == 'push'
          ]
          Path('cache-bust-status.json').write_text(json.dumps(rows, indent=2, sort_keys=True) + '\n')
          print(json.dumps(rows, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cache-bust-status
          path: cache-bust-status.json
          if-no-files-found: error
          retention-days: 1
