name: Temporary Image Decode Regression Builder

on:
  pull_request:
    branches:
      - fix/image-decode-main-regression

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.head_ref == 'trigger/image-decode-main-regression'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/image-decode-main-regression
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Restore image decode ownership
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          path = Path('web/src/platform/documents/document-viewer-capability.js')
          text = path.read_text(encoding='utf-8')

          constructor_anchor = "    this.loadPdfJs = options.loadPdfJs ?? (() => loadPdfJsRuntime({ workerSrc: options.pdfWorkerUrl }));\n"
          decoder_line = "    this.decodeImage = options.decodeImage ?? decodeImageUrl;\n"
          if decoder_line not in text:
              if text.count(constructor_anchor) != 1:
                  raise SystemExit('image decoder option anchor is not unique')
              text = text.replace(constructor_anchor, constructor_anchor + decoder_line, 1)

          start = text.index('  async openImage(documentRef, sessionId, signal) {')
          end = text.index('\n\n  renderPage(', start)
          open_image = dedent('''
            async openImage(documentRef, sessionId, signal) {
              let objectUrl = null;
              try {
                const sourceUrl = documentRef.url;
                if (!this.fetchImpl) {
                  await this.decodeImage(sourceUrl, signal);
                  if (sessionId !== this.session?.id || signal.aborted) return;
                  this.setState({ ...this.state, status: 'ready', displayUrl: sourceUrl });
                  return;
                }
                const response = await this.fetchImpl(sourceUrl, {
                  signal,
                  credentials: 'omit',
                  referrerPolicy: 'no-referrer',
                });
                const length = Number(response.headers.get('content-length'));
                if (Number.isFinite(length) && length > this.options.maxBytes) {
                  throw new PlatformError('document_oversized', 'Image is too large');
                }
                if (!response.ok) {
                  throw new PlatformError('document_unavailable', `Image request failed with ${response.status}`);
                }
                const bytes = await response.arrayBuffer();
                if (bytes.byteLength > this.options.maxBytes) {
                  throw new PlatformError('document_oversized', 'Image is too large');
                }
                if (sessionId !== this.session?.id || signal.aborted) return;
                const blob = new Blob([bytes], {
                  type: response.headers.get('content-type') || documentRef.mimeType || 'application/octet-stream',
                });
                objectUrl = URL.createObjectURL(blob);
                await this.decodeImage(objectUrl, signal);
                if (sessionId !== this.session?.id || signal.aborted) return;
                this.session.objectUrl = objectUrl;
                this.setState({ ...this.state, status: 'ready', displayUrl: objectUrl });
                objectUrl = null;
              } catch (error) {
                if (objectUrl) {
                  URL.revokeObjectURL(objectUrl);
                  objectUrl = null;
                }
                if (signal.aborted || error?.name === 'AbortError') throw abortError();
                if (error instanceof PlatformError) throw error;
                throw new PlatformError('image_decode_failed', 'This image could not be displayed.', error);
              } finally {
                if (objectUrl) URL.revokeObjectURL(objectUrl);
              }
            }
          ''').strip('\n')
          text = text[:start] + open_image + text[end:]

          classify_anchor = 'export function classifyDocument(documentRef) {\n'
          if 'function decodeImageUrl(url, signal) {' not in text:
              helper = dedent('''
              function decodeImageUrl(url, signal) {
                if (signal?.aborted) return Promise.reject(abortError());
                if (typeof Image === 'undefined') {
                  return Promise.reject(new PlatformError('image_decode_unavailable', 'Image decoding is unavailable'));
                }
                return new Promise((resolve, reject) => {
                  const image = new Image();
                  let settled = false;
                  const cleanup = () => {
                    image.onload = null;
                    image.onerror = null;
                    signal?.removeEventListener('abort', onAbort);
                  };
                  const finish = handler => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    handler();
                  };
                  const onAbort = () => finish(() => {
                    image.src = '';
                    reject(abortError());
                  });
                  image.onload = () => finish(resolve);
                  image.onerror = () => finish(() => reject(new PlatformError(
                    'image_decode_failed',
                    'This image could not be displayed.',
                  )));
                  signal?.addEventListener('abort', onAbort, { once: true });
                  image.decoding = 'async';
                  image.src = url;
                  if (signal?.aborted) onAbort();
                });
              }

              ''')
              if text.count(classify_anchor) != 1:
                  raise SystemExit('document classifier anchor is not unique')
              text = text.replace(classify_anchor, helper + classify_anchor, 1)

          malformed = "    malformed: 'This document could not be read.',\n"
          image_messages = (
              "    image_decode_failed: 'This image could not be displayed.',\n"
              "    image_decode_unavailable: 'This image could not be displayed.',\n"
          )
          if 'image_decode_failed:' not in text:
              if text.count(malformed) != 1:
                  raise SystemExit('document error message anchor is not unique')
              text = text.replace(malformed, malformed + image_messages, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate image and document lifecycle
        working-directory: web
        run: |
          npm ci
          node --test test/document-image-validation.test.mjs test/document-worker-fallback.test.mjs test/document-focus-trap.test.mjs
          npm run lint
          npm run typecheck
      - name: Commit implementation and remove builder
        shell: bash
        run: |
          rm -f .github/workflows/tmp-image-decode-regression-builder.yml .github/.image-decode-regression-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore image decode validation before readiness"
          git push origin HEAD:fix/image-decode-main-regression
