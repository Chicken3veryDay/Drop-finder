name: Inspect Render deployment run

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/render-diagnostic-request.txt"

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - name: Capture Render deployment workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sleep 5
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ['GH_REPO']
          token = os.environ['GH_TOKEN']
          query = urllib.parse.urlencode({'branch': 'deploy/full-stack-hf', 'per_page': 50})
          request = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/runs?{query}',
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f'Bearer {token}',
                  'User-Agent': 'DropFinder-Render-Run-Inspector',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              data = json.load(response)
          runs = []
          for row in data.get('workflow_runs', []):
              if row.get('name') != 'Deploy full DropFinder to Render':
                  continue
              runs.append({
                  'id': row.get('id'),
                  'status': row.get('status'),
                  'conclusion': row.get('conclusion'),
                  'event': row.get('event'),
                  'head_sha': row.get('head_sha'),
                  'created_at': row.get('created_at'),
                  'updated_at': row.get('updated_at'),
                  'html_url': row.get('html_url'),
                  'run_attempt': row.get('run_attempt'),
              })
          payload = {
              'schema_version': 'dropfinder-render-run-inventory-v1',
              'captured_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'runs': runs[:10],
          }
          Path('deployment/render-run-inventory.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name "DropFinder Render Run Inspector"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/render-run-inventory.json
          git commit -m "deploy: capture Render workflow status [skip ci]"
          git pull --rebase origin deploy/full-stack-hf
          git push origin HEAD:deploy/full-stack-hf
