name: Temporary Variant Reconciliation Push Runner

on:
  push:
    branches:
      - fix/issue-50-variant-reconciliation-current-main

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-50-variant-reconciliation-current-main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply staged reconciliation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/tmp-variant-reconciliation-current-main.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          raw = workflow[start:end]
          code = "\n".join(line[10:] if line.startswith("          ") else line for line in raw.splitlines())
          exec(compile(code, 'variant-reconciliation-current-main', 'exec'))
          PY
      - name: Validate exact branch
        run: |
          python -m compileall -q scripts/catalog_v4 tests/catalog_v4
          python -m unittest tests.catalog_v4.test_builder -v
      - name: Commit clean implementation
        shell: bash
        run: |
          rm -f .github/workflows/tmp-variant-reconciliation-current-main.yml .github/workflows/tmp-variant-reconciliation-push.yml .github/.variant-reconciliation-current-main-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reconcile variants across duplicate product URLs"
          git push origin HEAD:fix/issue-50-variant-reconciliation-current-main
