name: Temporary Strict JSON Bridge

on:
  pull_request:
    branches:
      - fix/issue-89-strict-json-publication

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'trigger/strict-json-reconstruction'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-89-strict-json-publication
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply strict JSON reconstruction
        shell: bash
        run: |
          set +e
          python - <<'PY' > /tmp/strict-json-reconstruction.log 2>&1
          from pathlib import Path
          import re

          normalization_path = Path('scripts/catalog_v4/normalization.py')
          normalization = normalization_path.read_text(encoding='utf-8')
          if 'from .strict_json import json_safe_raw\n' not in normalization:
              normalization = normalization.replace(
                  'from typing import Any, Iterable\n',
                  'from typing import Any, Iterable\n\nfrom .strict_json import json_safe_raw\n',
                  1,
              )
          rating_start = normalization.index('def rating(')
          rating_end = normalization.index('\n\ndef explicit_stock', rating_start)
          rating_lines = [
              'def rating(score: Any, count: Any) -> tuple[float | None, int | None, dict[str, Any]]:',
              '    parsed_score = safe_decimal(score, minimum=Decimal("0"), maximum=Decimal("5"))',
              '    parsed_count = safe_decimal(count, minimum=Decimal("1"), maximum=Decimal("100000000"))',
              '    if parsed_score is None or parsed_count is None or parsed_count != parsed_count.to_integral_value():',
              '        return None, None, {',
              '            "source": "unavailable",',
              '            "raw_score": json_safe_raw(score),',
              '            "raw_count": json_safe_raw(count),',
              '        }',
              '    return (',
              '        float(parsed_score.quantize(Decimal("0.01"))),',
              '        int(parsed_count),',
              '        {',
              '            "source": "source_exposed",',
              '            "raw_score": json_safe_raw(score),',
              '            "raw_count": json_safe_raw(count),',
              '        },',
              '    )',
          ]
          normalization = normalization[:rating_start] + '\n'.join(rating_lines) + normalization[rating_end:]
          normalization_path.write_text(normalization, encoding='utf-8')

          workflow = Path('.github/workflows/tmp-strict-json-pr-runner.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          raw = workflow[start:end]
          code = "\n".join(line[10:] if line.startswith("          ") else line for line in raw.splitlines())
          code, replacements = re.subn(
              r"\n\s*replace_once\(\n\s*'scripts/catalog_v4/normalization\.py',\n\s*'''    if parsed_score.*?\n\s*'rating provenance sanitization',\n\s*\)\n",
              "\n",
              code,
              count=1,
              flags=re.S,
          )
          if replacements != 1:
              raise SystemExit(f'rating reconstruction bypass: expected one block, found {replacements}')
          exec(compile(code, 'strict-json-reconstruction', 'exec'))

          test_lines = [
              'from __future__ import annotations',
              '',
              'import hashlib',
              'import json',
              'import math',
              'import sys',
              'import tempfile',
              'import unittest',
              'from pathlib import Path',
              'from unittest.mock import patch',
              '',
              'from scripts.catalog_v4.builder import _canonical_bytes, _json_bytes, build_catalog, write_result',
              'from scripts.catalog_v4.cli import main as cli_main',
              'from scripts.catalog_v4.normalization import rating',
              'from scripts.catalog_v4.strict_json import StrictJsonError, load_path_strict, loads_strict',
              'from scripts.catalog_v4.vendor_profiles import optional_json',
              'from scripts.catalog_v4.verify import VerificationError, verify_publication',
              '',
              '',
              'class StrictJsonTests(unittest.TestCase):',
              '    def test_parser_rejects_non_standard_numeric_constants(self) -> None:',
              '        for token in ("NaN", "Infinity", "-Infinity"):',
              '            with self.subTest(token=token), self.assertRaises(StrictJsonError):',
              '                loads_strict("{\\\"value\\\":" + token + "}", source="test")',
              '',
              '    def test_serializers_reject_nested_non_finite_values(self) -> None:',
              '        for value in (math.nan, math.inf, -math.inf):',
              '            for payload in ({"nested": {"value": value}}, {"items": [value]}):',
              '                with self.subTest(value=value, payload=payload):',
              '                    with self.assertRaises(StrictJsonError):',
              '                        _json_bytes(payload)',
              '                    with self.assertRaises(StrictJsonError):',
              '                        _canonical_bytes(payload)',
              '',
              '    def test_invalid_rating_provenance_is_json_safe(self) -> None:',
              '        for value in (math.nan, math.inf, -math.inf):',
              '            score, count, provenance = rating(value, 10)',
              '            self.assertIsNone(score)',
              '            self.assertIsNone(count)',
              '            self.assertIsNone(provenance["raw_score"])',
              '            loads_strict(json.dumps(provenance, allow_nan=False))',
              '',
              '    def test_cli_and_optional_files_reject_non_standard_constants(self) -> None:',
              '        with tempfile.TemporaryDirectory() as root:',
              '            root_path = Path(root)',
              '            input_path = root_path / "input.json"',
              '            output_path = root_path / "output"',
              '            input_path.write_text("{\\\"products\\\":[{\\\"rating\\\":NaN}]}", encoding="utf-8")',
              '            with patch.object(sys, "argv", ["catalog-v4", "--input", str(input_path), "--output", str(output_path)]):',
              '                with self.assertRaises(SystemExit) as raised:',
              '                    cli_main()',
              '            self.assertIn("non-finite JSON constant", str(raised.exception))',
              '            self.assertFalse(output_path.exists())',
              '            with self.assertRaises(StrictJsonError):',
              '                optional_json(input_path)',
              '            with self.assertRaises(StrictJsonError):',
              '                load_path_strict(input_path)',
              '',
              '    def test_verifier_rejects_hash_valid_non_standard_detail_json(self) -> None:',
              '        rows = [{',
              '            "source_id": "vendor",',
              '            "vendor": "Vendor",',
              '            "name": "Blue Dream THCA Flower 3.5g",',
              '            "url": "https://vendor.example/products/blue-dream",',
              '            "variant": "3.5g",',
              '            "price": 25,',
              '            "availability": "in_stock",',
              '        }]',
              '        result = build_catalog(rows, generated_at="2026-01-01T00:00:00Z", detail_shards=1)',
              '        with tempfile.TemporaryDirectory() as root:',
              '            output = Path(root)',
              '            write_result(result, output)',
              '            manifest_path = output / "catalog-v4" / "manifest.json"',
              '            manifest = json.loads(manifest_path.read_text(encoding="utf-8"))',
              '            detail_meta = manifest["product_detail_shards"][0]',
              '            detail_path = output / str(detail_meta["path"]).removeprefix("data/")',
              '            text = detail_path.read_text(encoding="utf-8")',
              '            contaminated = text.replace("\\\"products\\\": [", "\\\"contaminated\\\": NaN,\\n  \\\"products\\\": [", 1)',
              '            detail_path.write_text(contaminated, encoding="utf-8")',
              '            detail_meta["sha256"] = hashlib.sha256(contaminated.encode("utf-8")).hexdigest()',
              '            manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\\n", encoding="utf-8")',
              '            with self.assertRaises(VerificationError):',
              '                verify_publication(output)',
              '',
              '',
              'if __name__ == "__main__":',
              '    unittest.main()',
          ]
          Path('tests/catalog_v4/test_strict_json.py').write_text('\n'.join(test_lines) + '\n', encoding='utf-8')
          PY
          status=$?
          printf '%s\n' "$status" > /tmp/strict-json-reconstruction.status
          cat /tmp/strict-json-reconstruction.log
          exit 0
      - name: Validate strict JSON boundary
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q scripts/catalog_v4 tests/catalog_v4
            python -m unittest tests.catalog_v4.test_strict_json tests.catalog_v4.test_builder
          } > /tmp/strict-json-validation.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/strict-json-validation.status
          cat /tmp/strict-json-validation.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: strict-json-reconstruction-log
          path: |
            /tmp/strict-json-reconstruction.log
            /tmp/strict-json-reconstruction.status
            /tmp/strict-json-validation.log
            /tmp/strict-json-validation.status
      - name: Stop on reconstruction or validation failure
        run: |
          test "$(cat /tmp/strict-json-reconstruction.status)" = "0"
          test "$(cat /tmp/strict-json-validation.status)" = "0"
      - name: Commit final reconstruction
        shell: bash
        run: |
          rm -f .github/workflows/tmp-strict-json-builder.yml .github/workflows/tmp-strict-json-pr-runner.yml .github/workflows/tmp-strict-json-bridge.yml .github/.tmp-strict-json-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: enforce strict JSON publication boundaries"
          git push origin HEAD:fix/issue-89-strict-json-publication
