name: Temporary Patch Cloud Route Trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/cloud-route-trigger'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/cloud-route-trigger
          fetch-depth: 0
      - name: Patch autonomous workflow triggers and regression
        id: patch
        shell: bash
        run: |
          set +e
          (
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/dropfinder-cloud.yml')
          text = workflow.read_text(encoding='utf-8')

          path_anchor = '      - "scripts/autonomous_merge.py"\n'
          if '      - "scripts/route_repair.py"\n' not in text:
              count = text.count(path_anchor)
              if count != 2:
                  raise SystemExit(f'expected two path anchors, found {count}')
              text = text.replace(
                  path_anchor,
                  path_anchor
                  + '      - "scripts/route_repair.py"\n'
                  + '      - "scripts/vendor_expansion.py"\n',
              )

          compile_anchor = '            scripts/autonomous_worker_v4.py scripts/autonomous_merge.py \\\n'
          if '            scripts/route_repair.py scripts/vendor_expansion.py \\\n' not in text:
              count = text.count(compile_anchor)
              if count != 1:
                  raise SystemExit(f'expected one compile anchor, found {count}')
              text = text.replace(
                  compile_anchor,
                  compile_anchor + '            scripts/route_repair.py scripts/vendor_expansion.py \\\n',
                  1,
              )

          unittest_anchor = '            tests.test_vendor_document_publication \\\n'
          if '            tests.catalog_v4.test_route_repair \\\n' not in text:
              count = text.count(unittest_anchor)
              if count != 1:
                  raise SystemExit(f'expected one unittest anchor, found {count}')
              text = text.replace(
                  unittest_anchor,
                  unittest_anchor + '            tests.catalog_v4.test_route_repair \\\n',
                  1,
              )
          workflow.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_dropfinder_cloud_workflow_permissions.py')
          tests = test_path.read_text(encoding='utf-8')
          tuple_anchor = '            \'      - "scripts/publication_release.py"\',\n'
          if '            \'      - "scripts/route_repair.py"\',\n' not in tests:
              count = tests.count(tuple_anchor)
              if count != 1:
                  raise SystemExit(f'expected one test tuple anchor, found {count}')
              tests = tests.replace(
                  tuple_anchor,
                  tuple_anchor
                  + '            \'      - "scripts/route_repair.py"\',\n'
                  + '            \'      - "scripts/vendor_expansion.py"\',\n',
                  1,
              )

          assertion_anchor = '        self.assertIn("tests.test_publication_release", self.text)\n'
          if 'self.assertIn("tests.catalog_v4.test_route_repair", self.text)' not in tests:
              count = tests.count(assertion_anchor)
              if count != 1:
                  raise SystemExit(f'expected one assertion anchor, found {count}')
              tests = tests.replace(
                  assertion_anchor,
                  assertion_anchor
                  + '        self.assertIn("scripts/route_repair.py scripts/vendor_expansion.py", self.text)\n'
                  + '        self.assertIn("tests.catalog_v4.test_route_repair", self.text)\n',
                  1,
              )
          test_path.write_text(tests, encoding='utf-8')
          PY
          git diff --check
          if git diff --quiet -- .github/workflows/dropfinder-cloud.yml tests/test_dropfinder_cloud_workflow_permissions.py; then
            echo 'Patch already present.'
          else
            git config user.name 'dropfinder-maintenance-bot'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .github/workflows/dropfinder-cloud.yml tests/test_dropfinder_cloud_workflow_permissions.py
            git commit -m 'fix: trigger autonomous scans for route changes'
            git push origin HEAD:fix/cloud-route-trigger
          fi
          ) >patch-output.txt 2>&1
          rc=$?
          cat patch-output.txt
          echo "rc=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: cloud-route-trigger-patch-log
          path: patch-output.txt
          if-no-files-found: error
          retention-days: 1
      - name: Fail on patch error
        if: steps.patch.outputs.rc != '0'
        run: exit 1
