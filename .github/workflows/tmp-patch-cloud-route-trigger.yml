name: Temporary Patch Cloud Route Trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  patch:
    if: github.head_ref == 'fix/cloud-route-trigger'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/cloud-route-trigger
      - name: Build patched workflow files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/dropfinder-cloud.yml')
          text = workflow.read_text(encoding='utf-8')
          path_anchor = '      - "scripts/autonomous_merge.py"\n'
          if '      - "scripts/route_repair.py"\n' not in text:
              assert text.count(path_anchor) == 2
              text = text.replace(
                  path_anchor,
                  path_anchor
                  + '      - "scripts/route_repair.py"\n'
                  + '      - "scripts/vendor_expansion.py"\n',
              )
          compile_anchor = '            scripts/autonomous_worker_v4.py scripts/autonomous_merge.py \\\n'
          if '            scripts/route_repair.py scripts/vendor_expansion.py \\\n' not in text:
              assert text.count(compile_anchor) == 1
              text = text.replace(
                  compile_anchor,
                  compile_anchor + '            scripts/route_repair.py scripts/vendor_expansion.py \\\n',
                  1,
              )
          unittest_anchor = '            tests.test_vendor_document_publication \\\n'
          if '            tests.catalog_v4.test_route_repair \\\n' not in text:
              assert text.count(unittest_anchor) == 1
              text = text.replace(
                  unittest_anchor,
                  unittest_anchor + '            tests.catalog_v4.test_route_repair \\\n',
                  1,
              )
          workflow.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_dropfinder_cloud_workflow_permissions.py')
          tests = test_path.read_text(encoding='utf-8')
          tuple_anchor = '            \'      - "scripts/publication_release.py"\',\n'
          if '            \'      - "scripts/route_repair.py"\',\n' not in tests:
              assert tests.count(tuple_anchor) == 1
              tests = tests.replace(
                  tuple_anchor,
                  tuple_anchor
                  + '            \'      - "scripts/route_repair.py"\',\n'
                  + '            \'      - "scripts/vendor_expansion.py"\',\n',
                  1,
              )
          assertion_anchor = '        self.assertIn("tests.test_publication_release", self.text)\n'
          if 'self.assertIn("tests.catalog_v4.test_route_repair", self.text)' not in tests:
              assert tests.count(assertion_anchor) == 1
              tests = tests.replace(
                  assertion_anchor,
                  assertion_anchor
                  + '        self.assertIn("scripts/route_repair.py scripts/vendor_expansion.py", self.text)\n'
                  + '        self.assertIn("tests.catalog_v4.test_route_repair", self.text)\n',
                  1,
              )
          test_path.write_text(tests, encoding='utf-8')
          PY
          git diff --check
          mkdir -p patched/.github/workflows patched/tests
          cp .github/workflows/dropfinder-cloud.yml patched/.github/workflows/dropfinder-cloud.yml
          cp tests/test_dropfinder_cloud_workflow_permissions.py patched/tests/test_dropfinder_cloud_workflow_permissions.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: patched-cloud-route-trigger-files
          path: patched
          if-no-files-found: error
          retention-days: 1
