name: Temporary Patch WNC Shard Cost

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/wnc-shard-budget'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/wnc-shard-budget
          fetch-depth: 0
      - name: Patch observed WNC cost and balancing regression
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          source = Path('scripts/vendor_expansion.py')
          text = source.read_text(encoding='utf-8')
          old = '    "wnc_cbd": 80,\n'
          new = '    "wnc_cbd": 300,\n'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'expected one WNC cost entry, found {text.count(old)}')
              text = text.replace(old, new, 1)
          source.write_text(text, encoding='utf-8')

          test_path = Path('tests/catalog_v4/test_vendor_expansion_balancing.py')
          tests = test_path.read_text(encoding='utf-8')
          old_largest = '        largest = ("hello_mary", "cali_canna", "five_leaf_wellness", "bay_smokes")\n'
          new_largest = '        largest = ("wnc_cbd", "hello_mary", "cali_canna", "five_leaf_wellness")\n'
          if new_largest not in tests:
              if tests.count(old_largest) != 1:
                  raise SystemExit(f'expected one largest-source assertion, found {tests.count(old_largest)}')
              tests = tests.replace(old_largest, new_largest, 1)
          test_path.write_text(tests, encoding='utf-8')
          PY
          git diff --check
          python -m unittest -v tests.catalog_v4.test_vendor_expansion_balancing
          git config user.name 'dropfinder-maintenance-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/vendor_expansion.py tests/catalog_v4/test_vendor_expansion_balancing.py
          git commit -m 'fix: weight WNC sitemap verification accurately'
          git push origin HEAD:fix/wnc-shard-budget
