name: Temporary Query Pagination Retention Repair

on:
  pull_request:
    branches:
      - fix/issues-34-46-query-pagination-retention-current-main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issues-34-46-query-pagination-retention'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issues-34-46-query-pagination-retention-current-main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply query and pagination lifecycle repair
        run: |
          python .github/tmp/issues_34_46_query_pagination_repair.py
          python .github/tmp/issues_34_46_legacy_test_repair.py
      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
      - name: Run focused page-window and virtualization regressions
        working-directory: web
        shell: bash
        run: |
          set +e
          {
            npx vitest run src/features/marketplace/test/marketplace-pagination.test.ts
            first=$?
            node --test test/virtual-page-retention.test.mjs test/platform.test.mjs
            second=$?
            test "$first" = 0 -a "$second" = 0
          } > /tmp/issues-34-46-focused.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issues-34-46-focused.status
          cat /tmp/issues-34-46-focused.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issues-34-46-focused
          path: |
            /tmp/issues-34-46-focused.log
            /tmp/issues-34-46-focused.status
      - name: Stop on focused regression failure
        run: test "$(cat /tmp/issues-34-46-focused.status)" = 0
      - name: Validate complete frontend contracts
        working-directory: web
        shell: bash
        run: |
          set +e
          {
            npm run lint
            lint_status=$?
            npm run typecheck
            typecheck_status=$?
            npm test
            test_status=$?
            npm run benchmark
            benchmark_status=$?
            printf 'statuses lint=%s typecheck=%s test=%s benchmark=%s\n' \
              "$lint_status" "$typecheck_status" "$test_status" "$benchmark_status"
            test "$lint_status" = 0 -a "$typecheck_status" = 0 -a "$test_status" = 0 -a "$benchmark_status" = 0
          } > /tmp/issues-34-46-complete.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issues-34-46-complete.status
          cat /tmp/issues-34-46-complete.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issues-34-46-complete
          path: |
            /tmp/issues-34-46-complete.log
            /tmp/issues-34-46-complete.status
      - name: Stop on complete frontend failure
        run: test "$(cat /tmp/issues-34-46-complete.status)" = 0
      - name: Verify exact source boundary
        shell: bash
        run: |
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/marketplace/MarketplaceFeature.tsx \
            web/src/features/marketplace/marketplace-core.ts \
            web/src/features/marketplace/marketplace-pagination.ts \
            web/src/features/marketplace/test/marketplace-pagination.test.ts \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/platform.test.mjs \
            web/test/virtual-page-retention.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Validate production build
        working-directory: web
        run: npm run build
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issues-34-46-repair.yml \
            .github/tmp/issues_34_46_query_pagination_repair.py \
            .github/tmp/issues_34_46_legacy_test_repair.py
          git add \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/marketplace/MarketplaceFeature.tsx \
            web/src/features/marketplace/marketplace-core.ts \
            web/src/features/marketplace/marketplace-pagination.ts \
            web/src/features/marketplace/test/marketplace-pagination.test.ts \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/platform.test.mjs \
            web/test/virtual-page-retention.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: serialize marketplace pagination with bounded retention"
          git push origin HEAD:fix/issues-34-46-query-pagination-retention-current-main
