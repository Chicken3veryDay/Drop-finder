name: Temporary Issues 98 99 Virtual Policy R6

on:
  pull_request:
    branches:
      - fix/issues-98-99-virtual-scroll-focus

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issues98-99-virtual-policy-r6'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issues-98-99-virtual-scroll-focus
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply semantic scroll and focus policy
        run: |
          python .github/tmp/issues98_99_virtual_policy.py
          python .github/tmp/issues98_99_tests.py
      - name: Verify exact source boundary including new tests
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
            git ls-files --others --exclude-standard
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/virtual-marketplace-focus.test.tsx \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/virtual-query-focus-policy.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Capture focused virtual policies
        working-directory: web
        shell: bash
        run: |
          set +e
          {
            node --test test/virtual-query-focus-policy.test.mjs test/virtual-page-retention.test.mjs
            npx vitest run src/features/integration/virtual-marketplace-focus.test.tsx src/features/integration/marketplace-integration.test.ts
          } > /tmp/issues98-99-focused-r6.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issues98-99-focused-r6.status
          cat /tmp/issues98-99-focused-r6.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issues98-99-focused-r6
          path: |
            /tmp/issues98-99-focused-r6.log
            /tmp/issues98-99-focused-r6.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop on focused failure
        run: test "$(cat /tmp/issues98-99-focused-r6.status)" -eq 0
      - name: Validate complete frontend and build contracts
        working-directory: web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run benchmark
          npm run build
          npm run build:platform
          npm run analyze:chunks
          npm run pwa:check
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Validate integrated virtual marketplace
        working-directory: web
        run: npx playwright test tests/e2e/integrated-app.spec.mjs --project=chromium
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issues98-99-virtual-policy.yml \
            .github/workflows/tmp-issues98-99-virtual-policy-r4.yml \
            .github/tmp/issues98_99_virtual_policy.py \
            .github/tmp/issues98_99_tests.py
          git add \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/virtual-marketplace-focus.test.tsx \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/virtual-query-focus-policy.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: reset semantic queries and retain virtual focus"
          git push origin HEAD:fix/issues-98-99-virtual-scroll-focus
