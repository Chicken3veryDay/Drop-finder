name: Temporary PDF Startup Builder

on:
  push:
    branches:
      - fix/issue-32-pdf-startup-deadline

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-32-pdf-startup-deadline
      - name: Apply focused PDF lifecycle reconstruction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          path = Path('web/src/platform/documents/document-viewer-capability.js')
          text = path.read_text(encoding='utf-8')
          old = '''    const pdfjs = await this.loadPdfJs();
              if (signal.aborted || sessionId !== this.session?.id) return;

              const task = pdfjs.getDocument({
                data: bytes,
                isEvalSupported: false,
                useWorkerFetch: false,
              });
              this.session.loadingTask = task;
              const pdf = await settleWithin(
                task.promise,
                this.options.workerStartupTimeoutMs,
                signal,
                'document_worker_timeout',
              );
          '''
          new = '''    const session = this.session;
              let loadingTask = null;
              let destroyPromise = null;
              let startupExpired = false;
              const destroyLoadingTask = () => {
                if (!loadingTask) return Promise.resolve();
                if (session?.loadingTask === loadingTask) session.loadingTask = null;
                if (!destroyPromise) {
                  destroyPromise = Promise.resolve()
                    .then(() => loadingTask.destroy?.())
                    .catch(() => undefined);
                }
                return destroyPromise;
              };

              const startup = (async () => {
                const pdfjs = await this.loadPdfJs();
                if (startupExpired || signal.aborted || sessionId !== this.session?.id) throw abortError();

                loadingTask = pdfjs.getDocument({
                  data: bytes,
                  isEvalSupported: false,
                  useWorkerFetch: false,
                });
                if (startupExpired || signal.aborted || sessionId !== this.session?.id) {
                  await destroyLoadingTask();
                  throw abortError();
                }
                session.loadingTask = loadingTask;
                return loadingTask.promise;
              })();

              let pdf;
              try {
                pdf = await settleWithin(
                  startup,
                  this.options.workerStartupTimeoutMs,
                  signal,
                  'document_worker_timeout',
                  () => {
                    startupExpired = true;
                    void destroyLoadingTask();
                  },
                );
              } catch (error) {
                if (error?.code === 'document_worker_timeout') {
                  startupExpired = true;
                  await destroyLoadingTask();
                }
                throw error;
              }
          '''
          text = replace_once(text, old, new, 'PDF startup lifecycle')
          old_helper = '''function settleWithin(promise, timeoutMs, signal, code) {
            if (signal?.aborted) return Promise.reject(abortError());
            return new Promise((resolve, reject) => {
              const timer = setTimeout(() => reject(new PlatformError(code, 'Document initialization timed out')), timeoutMs);
          '''
          new_helper = '''function settleWithin(promise, timeoutMs, signal, code, onTimeout = null) {
            if (signal?.aborted) return Promise.reject(abortError());
            return new Promise((resolve, reject) => {
              const timer = setTimeout(() => {
                try { onTimeout?.(); } catch {}
                reject(new PlatformError(code, 'Document initialization timed out'));
              }, timeoutMs);
          '''
          text = replace_once(text, old_helper, new_helper, 'timeout callback')
          path.write_text(text, encoding='utf-8')

          test_path = Path('web/test/document-worker-fallback.test.mjs')
          test_text = test_path.read_text(encoding='utf-8')
          test_text = test_text.replace(
            "test('document viewer fails concisely when the dedicated PDF worker misses its bounded startup window', async () => {",
            "test('document viewer destroys a timed-out PDF loading task before open settles', async () => {",
            1,
          )
          test_text = replace_once(test_text, '''  assert.equal(viewer.snapshot().error.code, 'document_worker_timeout');
            assert.equal(viewer.snapshot().error.action, 'open-original');
            await viewer.close();
            assert.equal(destroyed, true);
          });
          ''', '''  assert.equal(viewer.snapshot().error.code, 'document_worker_timeout');
            assert.equal(viewer.snapshot().error.action, 'open-original');
            assert.equal(destroyed, true);
            await viewer.close();
          });

          test('document viewer applies the startup deadline to lazy PDF runtime loading', async () => {
            let releaseLoader;
            let getDocumentCalls = 0;
            const loader = new Promise(resolve => { releaseLoader = resolve; });
            const viewer = new DocumentViewerCapability({
              workerStartupTimeoutMs: 5,
              fetchImpl: async () => new Response(new Uint8Array([1, 2, 3]), { headers: { 'content-length': '3' } }),
              loadPdfJs: () => loader,
            });

            await viewer.open({ url: 'https://example.test/sample.pdf', mimeType: 'application/pdf' });
            assert.equal(viewer.snapshot().status, 'error');
            assert.equal(viewer.snapshot().error.code, 'document_worker_timeout');

            releaseLoader({
              getDocument() {
                getDocumentCalls += 1;
                return { promise: Promise.resolve({ numPages: 1, destroy: async () => {} }) };
              },
            });
            await new Promise(resolve => setImmediate(resolve));

            assert.equal(getDocumentCalls, 0);
            assert.equal(viewer.snapshot().status, 'error');
            await viewer.close();
          });
          ''', 'PDF startup tests')
          test_path.write_text(test_text, encoding='utf-8')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Validate focused change
        working-directory: web
        run: |
          npm ci
          node --test test/document-worker-fallback.test.mjs test/document-focus-trap.test.mjs
          npm run lint
          npm run typecheck
      - name: Commit final reconstruction
        shell: bash
        run: |
          rm -f .github/workflows/tmp-pdf-startup-builder.yml .github/.tmp-pdf-startup-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/platform/documents/document-viewer-capability.js web/test/document-worker-fallback.test.mjs .github/workflows/tmp-pdf-startup-builder.yml .github/.tmp-pdf-startup-trigger
          git commit -m "fix: bound PDF startup timeout lifecycle"
          git push origin HEAD:fix/issue-32-pdf-startup-deadline
