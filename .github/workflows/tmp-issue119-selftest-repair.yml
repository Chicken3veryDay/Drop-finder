name: Temporary Issue 119 Self-Test Repair

on:
  pull_request:
    branches:
      - fix/issue-119-vape-quantity-post-variant

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issue119-selftest-repair'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-119-vape-quantity-post-variant
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply self-test fixture repair
        run: python .github/tmp/issue119_selftest_repair.py
      - name: Validate exact repository contract
        run: |
          python -m compileall -q scripts/multi_product tests/multi_product
          python -m unittest discover -s tests/multi_product -v
          python scripts/multi_product/publication.py --self-test
      - name: Commit clean repair
        shell: bash
        run: |
          rm -f .github/workflows/tmp-issue119-selftest-repair.yml .github/tmp/issue119_selftest_repair.py .github/.issue119-selftest-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: align vape publication self-test with quantity contract"
          git push origin HEAD:fix/issue-119-vape-quantity-post-variant
