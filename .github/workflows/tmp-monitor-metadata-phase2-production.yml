name: Temporary Metadata Phase 2 Production Monitor

on:
  pull_request:
    branches: [verification/metadata-phase2-production]

permissions:
  actions: read
  contents: read

jobs:
  verify:
    if: github.head_ref == 'trigger/metadata-phase2-production'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      SOURCE_SHA: 36ec853311abc5f1f2a80f2d80da28e71e7a5892
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Wait for exact production and capture coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p metadata-phase2-production
          python - <<'PY'
          import base64
          import json
          import os
          import pathlib
          import time
          import urllib.parse
          import urllib.request

          repo = os.environ['REPOSITORY']
          source = os.environ['SOURCE_SHA']
          token = os.environ['GH_TOKEN']
          output = pathlib.Path('metadata-phase2-production')
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'DropFinderMetadataPhase2Monitor/1.0',
          }

          def request_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.load(response)

          def content(path, ref='main'):
              encoded = urllib.parse.quote(path, safe='/')
              payload = request_json(f'https://api.github.com/repos/{repo}/contents/{encoded}?ref={urllib.parse.quote(ref)}')
              return json.loads(base64.b64decode(payload['content']).decode('utf-8'))

          required = {'DropFinder Cloud CI', 'DropFinder Autonomous Cloud'}
          runs_by_name = {}
          for _ in range(90):
              payload = request_json(
                  f'https://api.github.com/repos/{repo}/actions/runs?head_sha={source}&event=push&per_page=100'
              )
              candidates = payload.get('workflow_runs') or []
              for run in candidates:
                  if run.get('name') in required:
                      current = runs_by_name.get(run['name'])
                      if current is None or int(run.get('id') or 0) > int(current.get('id') or 0):
                          runs_by_name[run['name']] = run
              if required.issubset(runs_by_name) and all(run.get('status') == 'completed' for run in runs_by_name.values()):
                  break
              time.sleep(20)
          else:
              raise SystemExit('timed out waiting for exact push workflows')

          failed = {
              name: {'id': run.get('id'), 'conclusion': run.get('conclusion'), 'html_url': run.get('html_url')}
              for name, run in runs_by_name.items()
              if run.get('conclusion') != 'success'
          }
          if failed:
              raise SystemExit('exact push workflows failed: ' + json.dumps(failed, sort_keys=True))

          release = None
          manifest = None
          receipt_path = None
          for _ in range(90):
              for candidate in ('deployment/release.json', 'data/deployment-receipt.json'):
                  try:
                      current = content(candidate)
                  except Exception:
                      continue
                  if current.get('source_commit') == source and current.get('status') == 'live':
                      release = current
                      receipt_path = candidate
                      break
              if release is not None:
                  manifest = content('cloud_pages/data/catalog-v4/manifest.json')
                  if manifest.get('generation_id') == release.get('generation_id'):
                      break
              time.sleep(20)
          else:
              raise SystemExit('timed out waiting for exact canonical live receipt and manifest')

          coverage = manifest.get('metadata_coverage') or {}
          summary = {
              'schema_version': 'dropfinder-metadata-phase2-production-verification-v1',
              'source_commit': source,
              'receipt_path': receipt_path,
              'release': release,
              'manifest': {
                  'generation_id': manifest.get('generation_id'),
                  'product_count': manifest.get('product_count'),
                  'in_stock_variant_count': manifest.get('in_stock_variant_count'),
                  'vendor_count': manifest.get('vendor_count'),
                  'metadata_coverage': coverage,
              },
              'push_workflows': {
                  name: {
                      'id': run.get('id'),
                      'conclusion': run.get('conclusion'),
                      'html_url': run.get('html_url'),
                  }
                  for name, run in sorted(runs_by_name.items())
              },
          }
          (output / 'verification.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n')
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: metadata-phase2-production-verification
          path: metadata-phase2-production
          if-no-files-found: error
          retention-days: 30
