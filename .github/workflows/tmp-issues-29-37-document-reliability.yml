name: Temporary Document Reliability Repair

on:
  pull_request:
    branches:
      - fix/issues-29-37-document-reliability

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issues-29-37-document-reliability'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issues-29-37-document-reliability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply document reliability repair
        run: python .github/tmp/issues_29_37_document_reliability.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            cloud_pages/sw.js \
            web/src/platform/documents/document-viewer-capability.js \
            web/src/platform/network/read-bounded-bytes.js \
            web/test/document-bounded-read-and-close.test.mjs \
            web/test/service-worker-document-bound.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Validate focused document lifecycle contracts
        working-directory: web
        shell: bash
        run: |
          set +e
          node --test \
            test/document-bounded-read-and-close.test.mjs \
            test/document-render-queue.test.mjs \
            test/platform.test.mjs \
            test/service-worker-document-bound.test.mjs \
            > /tmp/issues-29-37-focused.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issues-29-37-focused.status
          cat /tmp/issues-29-37-focused.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issues-29-37-focused
          path: |
            /tmp/issues-29-37-focused.log
            /tmp/issues-29-37-focused.status
      - name: Stop on focused document failure
        run: test "$(cat /tmp/issues-29-37-focused.status)" = 0
      - name: Validate complete frontend and PWA contracts
        working-directory: web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run benchmark
          npm run build
          npm run build:platform
          npm run analyze:chunks
          npm run pwa:check
      - name: Validate focused Chromium document paths
        working-directory: web
        run: |
          npx playwright install --with-deps chromium
          npx playwright test \
            tests/e2e/document-viewer.spec.mjs \
            tests/e2e/integrated-app.spec.mjs \
            --project=chromium
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issues-29-37-document-reliability.yml \
            .github/tmp/issues_29_37_document_reliability.py
          git add \
            cloud_pages/sw.js \
            web/src/platform/documents/document-viewer-capability.js \
            web/src/platform/network/read-bounded-bytes.js \
            web/test/document-bounded-read-and-close.test.mjs \
            web/test/service-worker-document-bound.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: bound document reads and close teardown"
          git push origin HEAD:fix/issues-29-37-document-reliability
