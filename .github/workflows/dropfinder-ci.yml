name: DropFinder Cloud CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "cloud_pages/**"
      - "web/**"
      - "docs/**"
      - ".github/workflows/dropfinder-ci.yml"
      - ".github/workflows/dropfinder-cloud.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dropfinder-cloud-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Compile and test Python pipelines
        run: |
          set -euo pipefail
          python -m compileall -q scripts tests
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v4.py --self-test
          rm -rf /tmp/dropfinder-autonomous-merge-test
          python scripts/autonomous_merge.py --self-test
          python -m scripts.catalog_v4.selftest
          python -m unittest discover -s tests/catalog_v4 -v
          python -m unittest discover -s tests -p 'test_vendor_adapters*.py' -v
      - name: Validate published JSON contracts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          catalog=json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status=json.loads(Path('cloud_pages/data/status.json').read_text())
          assert catalog['product_count']==len(catalog['products'])
          assert status['product_count']==catalog['product_count']
          assert status['enabled_sources']==len(status['sources'])
          assert status['healthy_sources']+status['degraded_sources']==status['enabled_sources']
          required={'id','source_id','vendor','name','url','availability','collected_at'}
          controlled={'psilocybin_mushroom','psilocybin_vape'}
          for row in catalog['products']:
              assert required <= row.keys()
              evidence=row.get('classification_evidence') or {}
              primary=row.get('primary_type') or evidence.get('primary_type') or 'cannabis_flower'
              if primary in controlled:
                  assert not row.get('url')
                  assert not row.get('public_purchase_url')
                  assert not row.get('route_url')
              else:
                  assert row['url'].startswith(('https://','http://'))
          print(f"validated {len(catalog['products'])} products")
          PY
      - name: Verify catalog v4 generation
        run: |
          rm -rf /tmp/dropfinder-catalog-v4
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output /tmp/dropfinder-catalog-v4 \
            --detail-shards 16 \
            --minimum-products 1 \
            --minimum-variants 1
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output /tmp/dropfinder-catalog-v4 \
            --verify-only
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Lint frontend
        working-directory: web
        run: npm run lint
      - name: Typecheck frontend
        working-directory: web
        run: npm run typecheck
      - name: Test frontend contracts and platform
        working-directory: web
        run: npm test
      - name: Run frontend performance benchmark
        working-directory: web
        run: npm run benchmark
      - name: Build and verify static publication
        working-directory: web
        run: npm run build
      - name: Build platform bundle
        working-directory: web
        run: npm run build:platform
      - name: Analyze platform chunks
        working-directory: web
        run: npm run analyze:chunks
      - name: Verify PWA shell contract
        working-directory: web
        run: npm run pwa:check
      - name: Validate PWA files and privacy boundary
        run: |
          test -s cloud_pages/index.html
          test -s cloud_pages/manifest.webmanifest
          test -s cloud_pages/sw.js
          test -s cloud_pages/app-shell.json
          test -s cloud_pages/icon.svg
          node --check cloud_pages/sw.js
          ! grep -RIE '(authorization|set-cookie|private[_-]?key|BEGIN [A-Z ]+PRIVATE KEY)' cloud_pages/data
      - uses: actions/upload-artifact@v4
        with:
          name: dropfinder-integration-validation
          path: |
            /tmp/dropfinder-catalog-v4/catalog-v4
            web/dist-platform
          if-no-files-found: error
          retention-days: 7

  browser:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Frozen frontend install
        working-directory: web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run browser, mobile, keyboard, offline, PDF, and accessibility suites
        working-directory: web
        run: npm run test:e2e
      - name: Preserve browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dropfinder-browser-evidence
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 7
