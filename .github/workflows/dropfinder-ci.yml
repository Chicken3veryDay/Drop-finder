name: DropFinder Cloud CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/cloud_scan.py"
      - "scripts/cloud_scan_v2.py"
      - "cloud_pages/**"
      - "web/**"
      - ".github/workflows/dropfinder-ci.yml"
      - ".github/workflows/dropfinder-cloud.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dropfinder-cloud-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile and self-test scanner and publication gates
        run: |
          python -m py_compile \
            scripts/cloud_scan.py scripts/cloud_scan_v2.py \
            web/scripts/publication_gate.py
          python scripts/cloud_scan_v2.py --self-test
      - name: Validate current zero-degraded publication contracts
        run: python web/scripts/publication_gate.py validate-snapshot
      - name: Validate PWA files and privacy boundary
        run: |
          test -s cloud_pages/index.html
          test -s cloud_pages/manifest.webmanifest
          test -s cloud_pages/sw.js
          test -s cloud_pages/icon.svg
          ! grep -RIE '(authorization|set-cookie|private[_-]?key|BEGIN [A-Z ]+PRIVATE KEY)' cloud_pages/data
      - name: Ensure workflow has no external credentials
        run: |
          ! grep -RIE '(secrets\.|cloudflare|tailscale|oracle|ngrok|localtunnel)' \
            .github/workflows/dropfinder-cloud.yml \
            web/scripts/publication_gate.py \
            scripts/cloud_scan.py scripts/cloud_scan_v2.py
