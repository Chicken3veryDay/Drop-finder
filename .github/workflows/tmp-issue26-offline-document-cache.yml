name: Temporary Issue 26 Offline Document Cache

on:
  pull_request:
    branches:
      - fix/issue-26-offline-document-cache

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issue26-offline-document-cache'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-26-offline-document-cache
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply offline document cache repair
        run: python .github/tmp/issue26_offline_document_cache.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            cloud_pages/sw.js \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/register-marketplace-props.document-cache.test.ts \
            web/test/service-worker.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Capture focused integration and service-worker contracts
        working-directory: web
        shell: bash
        run: |
          set +e
          {
            npx vitest run src/features/integration/register-marketplace-props.document-cache.test.ts
            node --test test/service-worker.test.mjs test/service-worker-document-bound.test.mjs test/platform.test.mjs
          } > /tmp/issue26-focused.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issue26-focused.status
          cat /tmp/issue26-focused.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue26-focused
          path: |
            /tmp/issue26-focused.log
            /tmp/issue26-focused.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop on focused failure
        shell: bash
        run: test "$(cat /tmp/issue26-focused.status)" -eq 0
      - name: Validate complete frontend and PWA contracts
        working-directory: web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run benchmark
          npm run build
          npm run build:platform
          npm run analyze:chunks
          npm run pwa:check
      - name: Validate Chromium document and offline paths
        working-directory: web
        run: |
          npx playwright install --with-deps chromium
          npx playwright test tests/e2e/document-viewer.spec.mjs tests/e2e/platform.spec.mjs --project=chromium
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issue26-offline-document-cache.yml \
            .github/tmp/issue26_offline_document_cache.py
          git add \
            cloud_pages/sw.js \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/register-marketplace-props.document-cache.test.ts \
            web/test/service-worker.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: reconnect opened documents to the offline cache"
          git push origin HEAD:fix/issue-26-offline-document-cache
