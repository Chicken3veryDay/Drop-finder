name: Temporary Strict JSON Builder

on:
  push:
    branches:
      - fix/issue-89-strict-json-publication

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-89-strict-json-publication
      - name: Apply strict parsing and serialization
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          cli_path = Path('scripts/catalog_v4/cli.py')
          cli = cli_path.read_text(encoding='utf-8')
          cli = replace_once(cli, 'from .normalization import clean_text, normalize_weight, safe_decimal\n', 'from .normalization import clean_text, normalize_weight, safe_decimal\nfrom .strict_json import StrictJsonError, load_path_strict\n', 'CLI strict import')
          cli = replace_once(cli, '    payload = json.loads(args.input.read_text(encoding="utf-8"))\n', '''    try:
                  payload = load_path_strict(args.input)
              except StrictJsonError as exc:
                  raise SystemExit(str(exc)) from exc
          ''', 'CLI strict input')
          cli_path.write_text(cli, encoding='utf-8')

          vendor_path = Path('scripts/catalog_v4/vendor_profiles.py')
          vendor = vendor_path.read_text(encoding='utf-8')
          vendor = replace_once(vendor, 'import json\n', '', 'remove permissive vendor json import')
          vendor = replace_once(vendor, 'from scripts.vendor_expansion import public_age_index\n', 'from scripts.vendor_expansion import public_age_index\n\nfrom .strict_json import load_path_strict\n', 'vendor strict import')
          vendor = replace_once(vendor, '    return json.loads(path.read_text(encoding="utf-8"))\n', '    return load_path_strict(path)\n', 'vendor strict parse')
          vendor_path.write_text(vendor, encoding='utf-8')

          normalization_path = Path('scripts/catalog_v4/normalization.py')
          normalization = normalization_path.read_text(encoding='utf-8')
          normalization = replace_once(normalization, 'from typing import Any, Iterable\n', 'from typing import Any, Iterable\n\nfrom .strict_json import json_safe_raw\n', 'normalization strict import')
          normalization = replace_once(normalization, '''    if parsed_score is None or parsed_count is None or parsed_count != parsed_count.to_integral_value():
              return None, None, {"source": "unavailable", "raw_score": score, "raw_count": count}
              return (
              float(parsed_score.quantize(Decimal("0.01"))),
              int(parsed_count),
              {"source": "source_exposed", "raw_score": score, "raw_count": count},
            )
          ''', '''    if parsed_score is None or parsed_count is None or parsed_count != parsed_count.to_integral_value():
              return None, None, {
                  "source": "unavailable",
                  "raw_score": json_safe_raw(score),
                  "raw_count": json_safe_raw(count),
              }
              return (
              float(parsed_score.quantize(Decimal("0.01"))),
              int(parsed_count),
              {
                  "source": "source_exposed",
                  "raw_score": json_safe_raw(score),
                  "raw_count": json_safe_raw(count),
              },
            )
          ''', 'rating provenance sanitization')
          normalization_path.write_text(normalization, encoding='utf-8')

          builder_path = Path('scripts/catalog_v4/builder.py')
          builder = builder_path.read_text(encoding='utf-8')
          builder = replace_once(builder, 'import json\n', '', 'remove builder json import')
          builder = replace_once(builder, 'from .selection import select_active_variant\n', 'from .selection import select_active_variant\nfrom .strict_json import dumps_strict\n', 'builder strict import')
          builder = replace_once(builder, '''def _json_bytes(payload: Any) -> bytes:
              return (json.dumps(payload, indent=2, sort_keys=True, ensure_ascii=False, separators=(",", ": ")) + "\n").encode("utf-8")


          def _canonical_bytes(payload: Any) -> bytes:
              return json.dumps(payload, sort_keys=True, ensure_ascii=False, separators=(",", ":")).encode("utf-8")
          ''', '''def _json_bytes(payload: Any) -> bytes:
              return (dumps_strict(
                  payload,
                  indent=2,
                  sort_keys=True,
                  ensure_ascii=False,
                  separators=(",", ": "),
              ) + "\n").encode("utf-8")


          def _canonical_bytes(payload: Any) -> bytes:
              return dumps_strict(
                  payload,
                  sort_keys=True,
                  ensure_ascii=False,
                  separators=(",", ":"),
              ).encode("utf-8")
          ''', 'strict builder serialization')
          builder_path.write_text(builder, encoding='utf-8')

          verify_path = Path('scripts/catalog_v4/verify.py')
          verify = verify_path.read_text(encoding='utf-8')
          verify = replace_once(verify, 'import json\n', '', 'remove verifier json import')
          verify = replace_once(verify, 'from .selection import select_active_variant\n', 'from .selection import select_active_variant\nfrom .strict_json import StrictJsonError, load_path_strict\n', 'verifier strict import')
          verify = replace_once(verify, '''def _load(path: Path) -> dict[str, Any]:
              try:
                  value = json.loads(path.read_text(encoding="utf-8"))
              except (OSError, json.JSONDecodeError) as exc:
                  raise VerificationError(f"unable to load {path}: {exc}") from exc
          ''', '''def _load(path: Path) -> dict[str, Any]:
              try:
                  value = load_path_strict(path)
              except StrictJsonError as exc:
                  raise VerificationError(f"unable to load {path}: {exc}") from exc
          ''', 'strict verifier parse')
          verify_path.write_text(verify, encoding='utf-8')

          Path('tests/catalog_v4/test_strict_json.py').write_text('''from __future__ import annotations
          
          import hashlib
          import json
          import math
          import tempfile
          import unittest
          from pathlib import Path
          
          from scripts.catalog_v4.builder import _canonical_bytes, _json_bytes, build_catalog, write_result
          from scripts.catalog_v4.cli import main as cli_main
          from scripts.catalog_v4.normalization import rating
          from scripts.catalog_v4.strict_json import StrictJsonError, loads_strict
          from scripts.catalog_v4.verify import VerificationError, verify_publication
          
          
          class StrictJsonTests(unittest.TestCase):
              def test_strict_serializers_reject_non_finite_values_recursively(self):
                  for value in (math.nan, math.inf, -math.inf):
                      for payload in (
                          {"classification_evidence": {"score": value}},
                          {"documents": [{"provenance": {"raw": value}}]},
                          {"vendor": {"provenance": [value]}},
                      ):
                          with self.subTest(value=value, payload=payload):
                              with self.assertRaises(StrictJsonError):
                                  _json_bytes(payload)
                              with self.assertRaises(StrictJsonError):
                                  _canonical_bytes(payload)
              
              def test_invalid_rating_provenance_is_json_safe(self):
                  for value in (math.nan, math.inf, -math.inf):
                      score, count, provenance = rating(value, 10)
                      self.assertIsNone(score)
                      self.assertIsNone(count)
                      self.assertIsNone(provenance["raw_score"])
                      loads_strict(json.dumps(provenance, allow_nan=False))
              
              def test_cli_rejects_non_standard_numeric_constants_before_writing(self):
                  with tempfile.TemporaryDirectory() as root:
                      root_path = Path(root)
                      input_path = root_path / "input.json"
                      output_path = root_path / "output"
                      input_path.write_text('{"products":[{"rating":NaN}]}', encoding="utf-8")
                      with self.assertRaises(SystemExit) as raised:
                          cli_main(["--input", str(input_path), "--output", str(output_path)])
                      self.assertIn("non-finite JSON constant", str(raised.exception))
                      self.assertFalse(output_path.exists())
              
              def test_every_built_artifact_is_strictly_parseable(self):
                  result = build_catalog([
                      {
                          "source_id": "vendor",
                          "vendor": "Vendor",
                          "name": "Blue Dream THCA Flower 3.5g",
                          "url": "https://vendor.example/products/blue-dream",
                          "variant": "3.5g",
                          "price": 25,
                          "availability": "in_stock",
                          "rating": math.nan,
                          "review_count": 10,
                      }
                  ], generated_at="2026-01-01T00:00:00Z", detail_shards=1)
                  for path, payload in result.files.items():
                      with self.subTest(path=path):
                          loads_strict(payload, source=path)
              
              def test_verifier_rejects_hash_valid_non_standard_detail_json(self):
                  result = build_catalog([
                      {
                          "source_id": "vendor",
                          "vendor": "Vendor",
                          "name": "Blue Dream THCA Flower 3.5g",
                          "url": "https://vendor.example/products/blue-dream",
                          "variant": "3.5g",
                          "price": 25,
                          "availability": "in_stock",
                      }
                  ], generated_at="2026-01-01T00:00:00Z", detail_shards=1)
                  with tempfile.TemporaryDirectory() as root:
                      output = Path(root)
                      write_result(result, output)
                      manifest_path = output / "catalog-v4" / "manifest.json"
                      manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
                      detail_meta = manifest["product_detail_shards"][0]
                      detail_path = output / detail_meta["path"].removeprefix("data/")
                      text = detail_path.read_text(encoding="utf-8")
                      contaminated = text.replace('"products": [', '"contaminated": NaN,\n  "products": [', 1)
                      detail_path.write_text(contaminated, encoding="utf-8")
                      detail_meta["sha256"] = hashlib.sha256(contaminated.encode("utf-8")).hexdigest()
                      manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
                      with self.assertRaises(VerificationError):
                          verify_publication(output)
          
          
          if __name__ == "__main__":
              unittest.main()
          '''.replace('          ', ''), encoding='utf-8')
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate strict JSON boundary
        run: |
          python -m compileall -q scripts/catalog_v4 tests/catalog_v4
          python -m unittest tests.catalog_v4.test_strict_json tests.catalog_v4.test_builder
      - name: Commit final reconstruction
        shell: bash
        run: |
          rm -f .github/workflows/tmp-strict-json-builder.yml .github/.tmp-strict-json-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/catalog_v4/strict_json.py scripts/catalog_v4/cli.py scripts/catalog_v4/vendor_profiles.py scripts/catalog_v4/normalization.py scripts/catalog_v4/builder.py scripts/catalog_v4/verify.py tests/catalog_v4/test_strict_json.py .github/workflows/tmp-strict-json-builder.yml .github/.tmp-strict-json-trigger
          git commit -m "fix: enforce strict JSON publication boundaries"
          git push origin HEAD:fix/issue-89-strict-json-publication
