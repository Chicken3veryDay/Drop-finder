name: Temporary Document Viewer Controls

on:
  pull_request:
    branches:
      - fix/issues-35-42-48-64-document-viewer

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issues35-42-48-64-document-viewer'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/issues-35-42-48-64-document-viewer
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply document viewer repair and regressions
        run: |
          python .github/tmp/issues35_42_48_64_document_viewer.py
          python .github/tmp/issues35_42_48_64_tests.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
            git ls-files --others --exclude-standard
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            web/src/features/integration/document-overlay-controls.test.tsx \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/platform/documents/document-viewer-capability.js \
            web/test/document-viewer-controls.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Validate focused and complete frontend contracts
        working-directory: web
        run: |
          node --test test/document-viewer-controls.test.mjs test/document-bounded-read-and-close.test.mjs test/document-viewer-generation.test.mjs
          npx vitest run src/features/integration/document-overlay-controls.test.tsx src/features/integration/marketplace-integration.test.ts
          npm run lint
          npm run typecheck
          npm test
          npm run benchmark
          npm run build
          npm run build:platform
          npm run analyze:chunks
          npm run pwa:check
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Validate document browser paths
        working-directory: web
        run: |
          npx playwright test tests/e2e/platform.spec.mjs tests/e2e/integrated-app.spec.mjs --project=chromium
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-document-viewer-controls.yml \
            .github/tmp/issues35_42_48_64_document_viewer.py \
            .github/tmp/issues35_42_48_64_tests.py
          git add \
            web/src/features/integration/document-overlay-controls.test.tsx \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/platform/documents/document-viewer-capability.js \
            web/test/document-viewer-controls.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: synchronize document viewer controls and layout"
          git push origin HEAD:fix/issues-35-42-48-64-document-viewer
