name: Temporary Metadata Source Snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'fix/metadata-completeness'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Export source and catalog evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p metadata-snapshot
          find web/src scripts app tests -type f 2>/dev/null | sort > metadata-snapshot/source-files.txt
          grep -RInE --exclude-dir=node_modules --exclude-dir=.git \
            'lineage|total[_ -]?thc|rating|review[_ -]?count|potency|thca|delta.?9|coa|certificate' \
            web/src scripts app tests > metadata-snapshot/field-paths.txt || true
          tar -czf metadata-snapshot/source-tree.tar.gz web/src scripts app tests
          tar -czf metadata-snapshot/catalog-tree.tar.gz \
            cloud_pages/data/catalog-v4 cloud_pages/data/catalog.json cloud_pages/data/status.json
          python - <<'PY'
          import json
          import math
          import pathlib
          from collections import Counter, defaultdict

          base = pathlib.Path('cloud_pages/data/catalog-v4')
          out = pathlib.Path('metadata-snapshot')

          def rows(payload):
              if isinstance(payload, list):
                  return [x for x in payload if isinstance(x, dict)]
              if not isinstance(payload, dict):
                  return []
              for key in ('products', 'items', 'records', 'entries', 'data'):
                  value = payload.get(key)
                  if isinstance(value, list) and any(isinstance(x, dict) for x in value):
                      return [x for x in value if isinstance(x, dict)]
              return []

          detail_rows = []
          shapes = {}
          for path in sorted((base / 'details').glob('*.json')):
              payload = json.loads(path.read_text(encoding='utf-8'))
              extracted = rows(payload)
              shapes[str(path)] = {
                  'root_type': type(payload).__name__,
                  'root_keys': sorted(payload.keys()) if isinstance(payload, dict) else [],
                  'rows': len(extracted),
              }
              detail_rows.extend(extracted)
          index_payload = json.loads((base / 'index.json').read_text(encoding='utf-8'))
          index_rows = rows(index_payload)
          products = detail_rows or index_rows

          def get(obj, dotted):
              cur = obj
              for part in dotted.split('.'):
                  if not isinstance(cur, dict):
                      return None
                  cur = cur.get(part)
              return cur

          def present(value):
              if value is None:
                  return False
              if isinstance(value, str):
                  return value.strip().lower() not in {'', 'unknown', 'unavailable', 'n/a', 'na', 'none', '-', '—'}
              if isinstance(value, (list, dict, tuple, set)):
                  return bool(value)
              if isinstance(value, float) and math.isnan(value):
                  return False
              return True

          paths = {
              'lineage': ['lineage', 'strain.lineage', 'metadata.lineage', 'genetics.lineage', 'classification.lineage', 'strain_type'],
              'thca': ['potency.thca', 'potency.thca_percent', 'thca', 'thca_percent', 'cannabinoids.thca', 'potency.values.thca'],
              'delta9_thc': ['potency.delta9_thc', 'potency.delta9_thc_percent', 'delta9_thc', 'delta9_thc_percent', 'cannabinoids.delta9_thc', 'potency.values.delta9_thc'],
              'total_thc': ['potency.total_thc', 'potency.total_thc_percent', 'total_thc', 'total_thc_percent', 'cannabinoids.total_thc', 'potency.values.total_thc'],
              'rating': ['rating', 'reviews.rating', 'review_summary.rating', 'aggregate_rating.value', 'aggregateRating.ratingValue'],
              'review_count': ['review_count', 'reviews.count', 'review_summary.count', 'aggregate_rating.count', 'aggregateRating.reviewCount'],
              'images': ['images', 'image_urls', 'media.images', 'image'],
              'documents': ['documents', 'coa_documents', 'lab_documents', 'compliance.documents', 'potency.documents'],
          }

          coverage = {}
          resolved = defaultdict(Counter)
          missing = defaultdict(list)
          for field, candidates in paths.items():
              count = 0
              for product in products:
                  matched = None
                  for candidate in candidates:
                      value = get(product, candidate)
                      if present(value):
                          matched = candidate
                          break
                  if matched:
                      count += 1
                      resolved[field][matched] += 1
                  elif len(missing[field]) < 20:
                      missing[field].append({
                          'vendor': product.get('vendor_name') or product.get('vendor') or product.get('source_name'),
                          'name': product.get('name') or product.get('title') or product.get('strain_name'),
                          'id': product.get('id') or product.get('product_id'),
                      })
              coverage[field] = {
                  'populated': count,
                  'missing': len(products) - count,
                  'coverage': round(count / len(products), 6) if products else 0,
              }

          top = Counter()
          nested = Counter()
          for product in products:
              top.update(product.keys())
              for key, value in product.items():
                  if isinstance(value, dict):
                      nested.update(f'{key}.{sub}' for sub in value.keys())

          target_terms = ('plain jane', 'gold canna', 'bay smokes', 'green unicorn')
          samples = []
          for product in products:
              vendor = str(product.get('vendor_name') or product.get('vendor') or product.get('source_name') or '').lower()
              if any(term in vendor for term in target_terms):
                  samples.append(product)
              if len(samples) >= 40:
                  break

          result = {
              'schema_version': 'dropfinder-metadata-completeness-audit-v3',
              'product_count': len(products),
              'detail_product_count': len(detail_rows),
              'index_product_count': len(index_rows),
              'detail_shapes': shapes,
              'coverage': coverage,
              'resolved_paths': {k: dict(v) for k, v in resolved.items()},
              'missing_examples': dict(missing),
              'top_level_keys': dict(top),
              'nested_keys': dict(nested),
          }
          (out / 'summary.json').write_text(json.dumps(result, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          (out / 'sample-products.json').write_text(json.dumps(samples, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(coverage, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: metadata-source-snapshot
          path: metadata-snapshot
          if-no-files-found: error
          retention-days: 30
