name: Temporary Issue 60 WooCommerce Variations

on:
  pull_request:
    branches:
      - fix/issue-60-woocommerce-variations

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'trigger/issue60-woocommerce-variations'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-60-woocommerce-variations
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          git diff --name-only "$merge_base" HEAD | sort -u > /tmp/actual-files
          printf '%s\n' \
            scripts/cloud_scan.py \
            tests/test_woocommerce_variations.py \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Capture focused and complete Python validation
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q scripts tests
            python -m unittest -v tests.test_woocommerce_variations
            python scripts/cloud_scan.py --self-test
            python scripts/autonomous_worker.py --self-test
            python scripts/autonomous_worker_v2.py --self-test
            python scripts/autonomous_worker_v4.py --self-test
            python -m unittest discover -s tests -p 'test_*.py' -v
            python -m scripts.catalog_v4.selftest
            python -m unittest discover -s tests/catalog_v4 -v
          } > /tmp/issue60-validation.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issue60-validation.status
          tail -240 /tmp/issue60-validation.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue60-validation
          path: |
            /tmp/issue60-validation.log
            /tmp/issue60-validation.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop on validation failure
        shell: bash
        run: test "$(cat /tmp/issue60-validation.status)" -eq 0
      - name: Validate degraded source health on exhausted variation retrieval
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.error
          from scripts import cloud_scan

          original_sources = cloud_scan.SOURCES
          original_fetch = cloud_scan.fetch
          original_delays = cloud_scan.WOO_VARIATION_RETRY_DELAYS
          route = ('woo', 'https://shop.example/wp-json/wc/store/v1/products?per_page=100&search=flower', 'mixed_flower')
          parent = {
              'id': 42,
              'name': 'Blue THCA Flower',
              'permalink': 'https://shop.example/product/blue/',
              'has_options': True,
              'type': 'variable',
              'categories': [{'name': 'THCA Flower'}],
              'prices': {'currency_minor_unit': 2, 'price': '2500', 'price_range': {'min_amount': '2500', 'max_amount': '9000'}},
              'stock_status': 'instock',
          }
          simple = {
              'id': 43,
              'name': 'Simple THCA Flower 3.5g',
              'permalink': 'https://shop.example/product/simple/',
              'has_options': False,
              'type': 'simple',
              'short_description': '3.5g loose flower',
              'categories': [{'name': 'THCA Flower'}],
              'prices': {'currency_minor_unit': 2, 'price': '3000'},
              'stock_status': 'instock',
          }
          payload = json.dumps([parent, simple])
          def fetch(target):
              if target == route[1]:
                  return payload, 'application/json', 200
              raise urllib.error.HTTPError(target, 503, 'unavailable', {}, None)
          cloud_scan.SOURCES = [('fixture', 'Fixture Vendor', [route])]
          cloud_scan.fetch = fetch
          cloud_scan.WOO_VARIATION_RETRY_DELAYS = (0.0, 0.0)
          try:
              rows, status = cloud_scan.scan(cloud_scan.SOURCES[0])
              assert len(rows) == 1, rows
              assert rows[0]['source_product_id'] == '43', rows
              assert status['status'] == 'degraded', status
              assert status['health_reason_codes'] == ['woocommerce_variation_incomplete'], status
              route_status = status['route_results'][0]
              assert route_status['variation_failures'] == 1, route_status
              assert route_status['variation_failure_reasons'] == {'variation_http_503': 1}, route_status
          finally:
              cloud_scan.SOURCES = original_sources
              cloud_scan.fetch = original_fetch
              cloud_scan.WOO_VARIATION_RETRY_DELAYS = original_delays
          PY

# validation rerun 6
