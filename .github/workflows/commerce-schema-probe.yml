name: Probe DropFinder commerce schemas

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/commerce-schema-probe-request.txt"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe public storefront schemas
        run: |
          set -euo pipefail
          python -m py_compile scripts/commerce_schema_probe.py
          PYTHONPATH=scripts python scripts/commerce_schema_probe.py --output deployment/commerce-schema-probe.json
      - name: Record schema report
        run: |
          set -euo pipefail
          git config user.name "DropFinder Schema Probe"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/commerce-schema-probe.json
          if ! git diff --cached --quiet; then
            git commit -m "audit: record storefront variant schemas [skip ci]"
            git pull --rebase origin deploy/full-stack-hf
            git push origin HEAD:deploy/full-stack-hf
          fi
