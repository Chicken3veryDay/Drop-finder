name: Temporary Apply Metadata Completeness Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/metadata-completeness'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/metadata-completeness
          fetch-depth: 0
          persist-credentials: true
      - name: Apply reviewed metadata patch
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d | gunzip > /tmp/metadata-fix.patch
          git apply --check /tmp/metadata-fix.patch
          git apply /tmp/metadata-fix.patch
          rm -f .github/workflows/tmp-metadata-completeness-audit.yml
          rm -f .github/workflows/tmp-metadata-snapshot.yml
          rm -f .github/workflows/tmp-apply-metadata-fix.yml
          PYTHONPATH=. python -m unittest \
            tests.test_catalog_metadata_extraction \
            tests.test_cloud_scan_weights \
            tests.test_jsonld_offer_and_discovery \
            tests.test_woocommerce_variations \
            tests.multi_product.test_runtime -v
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: preserve and publish storefront metadata'
          git push origin HEAD:fix/metadata-completeness
