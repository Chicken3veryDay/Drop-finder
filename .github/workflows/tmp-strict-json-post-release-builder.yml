name: Temporary Strict JSON Post-Release Builder

on:
  pull_request:
    branches:
      - fix/strict-json-post-release

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.head_ref == 'trigger/strict-json-post-release'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/strict-json-post-release
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply exact reviewed strict JSON patch onto current main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin fix/issue-89-strict-json-publication
          git diff --binary \
            d0118d46877f20ef71bca6924fd390bc7849d7a4..5149fc8157d762c58ef42f0707c5787999261b00 \
            -- \
            docs/STRICT_JSON.md \
            scripts/catalog_v4/builder.py \
            scripts/catalog_v4/cli.py \
            scripts/catalog_v4/normalization.py \
            scripts/catalog_v4/strict_json.py \
            scripts/catalog_v4/vendor_profiles.py \
            scripts/catalog_v4/verify.py \
            tests/catalog_v4/test_strict_json.py \
            > /tmp/strict-json.patch
          test -s /tmp/strict-json.patch
          git apply --3way /tmp/strict-json.patch
      - name: Validate strict JSON and complete catalog contracts
        run: |
          set -euo pipefail
          python -m compileall -q scripts/catalog_v4 tests/catalog_v4
          python -m unittest -v tests.catalog_v4.test_strict_json
          python -m unittest discover -s tests/catalog_v4 -v
          python -m scripts.catalog_v4.selftest
          rm -rf /tmp/dropfinder-strict-json-catalog
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output /tmp/dropfinder-strict-json-catalog \
            --detail-shards 16 \
            --minimum-products 1 \
            --minimum-variants 1
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output /tmp/dropfinder-strict-json-catalog \
            --verify-only
      - name: Commit clean reconstruction
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/tmp-strict-json-post-release-builder.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: enforce strict JSON publication boundaries'
          git push origin HEAD:fix/strict-json-post-release
