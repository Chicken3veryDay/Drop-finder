name: Validate DropFinder Render package

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/render-validation-request.txt"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile and test deployment source
        run: |
          set -euo pipefail
          python -m py_compile \
            deploy/render/render_deploy.py \
            deploy/huggingface-space/space_app.py \
            deploy/huggingface-space/hf_state.py \
            deploy/huggingface-space/hf_supervisor.py \
            scripts/cloud_scan.py \
            scripts/cloud_scan_v2.py \
            scripts/autonomous_worker.py \
            scripts/autonomous_worker_v2.py \
            scripts/autonomous_worker_v4.py \
            scripts/autonomous_worker_v5.py \
            scripts/autonomous_merge.py \
            scripts/catalog_completeness_audit.py
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v5.py --self-test
          python scripts/autonomous_merge.py --self-test
          test -s deploy/render/Dockerfile
          grep -q 'plan.*free' deploy/render/render_deploy.py
          grep -q 'render_autonomous_service' deploy/render/Dockerfile
          grep -q 'autonomous_worker_v5.py' deploy/render/Dockerfile
          grep -q 'exact_price_weight_ppg_thca_stock_image_v1' scripts/autonomous_merge.py
      - name: Validate browser shell
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          html = Path('cloud_pages/index.html').read_text(encoding='utf-8')
          required = (
              'id="query"',
              'id="vendor"',
              'id="stock"',
              'id="sort"',
              'id="favoritesOnly"',
              'id="sourcesButton"',
              'id="scanButton"',
              'id="grid"',
          )
          missing = [value for value in required if value not in html]
          if missing:
              raise SystemExit(f'missing required UI hooks: {missing}')
          forbidden = (
              'Always-available phone snapshot',
              'class="stats"',
              'id="weight"',
              'id="bestPrice"',
              'id="favoriteCount"',
              'Number(value);return Number.isFinite(n)?n:null',
          )
          present = [value for value in forbidden if value in html]
          if present:
              raise SystemExit(f'forbidden or unsafe UI content remains: {present}')
          required_logic = (
              "value===null||value===undefined||value===''",
              "potency!==null&&potency<=100",
              "exact_variant",
              "starting_at",
          )
          missing_logic = [value for value in required_logic if value not in html]
          if missing_logic:
              raise SystemExit(f'missing null-safe pricing UI logic: {missing_logic}')
          scripts = re.findall(r'<script>(.*?)</script>', html, re.S)
          if len(scripts) != 1:
              raise SystemExit(f'expected one inline script, found {len(scripts)}')
          Path('/tmp/dropfinder-index.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/dropfinder-index.js
          node --check deploy/huggingface-space/operator.js
          grep -q "dropfinder-cloud-v4" cloud_pages/sw.js
      - name: Record validation result
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          payload = {
              "schema_version": "dropfinder-render-validation-v3",
              "status": "healthy",
              "validated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              "python_compile": True,
              "worker_v5_self_tests": True,
              "embedded_variation_tests": True,
              "bidirectional_thca_tests": True,
              "pricing_pairing_tests": True,
              "complete_comparison_gate_tests": True,
              "merge_self_test": True,
              "browser_javascript_syntax": True,
              "null_safe_ui_values": True,
              "operator_javascript_syntax": True,
              "filler_ui_removed": True,
              "service_worker_cache_updated": True,
              "dockerfile_uses_v5": True,
          }
          Path("deployment/render-validation.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          cp deployment/render-validation.json /tmp/render-validation.json
          git fetch origin deploy/full-stack-hf
          git reset --hard origin/deploy/full-stack-hf
          cp /tmp/render-validation.json deployment/render-validation.json
          git config user.name "DropFinder Render Validator"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/render-validation.json
          if ! git diff --cached --quiet; then
            git commit -m "deploy: record healthy complete-data validation [skip ci]"
            git push origin HEAD:deploy/full-stack-hf
          fi
