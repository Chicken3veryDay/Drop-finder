name: DropFinder UI Rewrite Bootstrap

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: read

concurrency:
  group: dropfinder-ui-rewrite-bootstrap
  cancel-in-progress: true

jobs:
  compose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'ui-rewrite/06-full-integration'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-rewrite/06-full-integration
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .integration/web/package.json

      - id: compose
        name: Compose exact audited workstream heads
        run: |
          set -euo pipefail
          python scripts/ui_rewrite_merge.py
          python scripts/ui_rewrite_finalize.py
          python scripts/ui_rewrite_post_finalize.py

      - id: catalog
        name: Publish current catalog through v4 inside the integration tree
        run: |
          set -euo pipefail
          rm -rf cloud_pages/data/catalog-v4
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output cloud_pages/data \
            --detail-shards 16 \
            --minimum-products 1 \
            --minimum-variants 1
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output cloud_pages/data \
            --verify-only

      - id: lockfile
        name: Generate unified frozen lockfile
        working-directory: web
        run: npm install --package-lock-only --ignore-scripts

      - id: install
        name: Verify frozen frontend install
        working-directory: web
        run: npm ci

      - id: build
        name: Build integrated application
        working-directory: web
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/dropfinder-integration-build.log

      - id: pwa
        name: Generate and verify application shell
        working-directory: web
        run: |
          npm run pwa:manifest
          npm run pwa:check

      - id: commit
        name: Commit the exact integrated tree before validation
        run: |
          set -euo pipefail
          git config user.name "DropFinder Integration Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate DropFinder UI rewrite workstreams [skip ci]"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          test -z "$(git status --porcelain)"

      - id: python
        name: Validate Python scanner, worker, merge, vendor, and catalog paths
        run: |
          set -euo pipefail
          python -m compileall -q scripts tests
          python scripts/cloud_scan_v2.py --self-test
          python scripts/autonomous_worker_v4.py --self-test
          rm -rf /tmp/dropfinder-autonomous-merge-test
          python scripts/autonomous_merge.py --self-test
          python -m scripts.catalog_v4.selftest
          python -m unittest discover -s tests/catalog_v4 -v
          python -m unittest discover -s tests -p 'test_vendor_adapters.py' -v

      - id: lint
        name: Lint integrated frontend
        working-directory: web
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee /tmp/dropfinder-integration-lint.log

      - id: typecheck
        name: Typecheck integrated frontend
        working-directory: web
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee /tmp/dropfinder-integration-typecheck.log

      - id: tests
        name: Run integrated frontend and platform tests
        working-directory: web
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/dropfinder-integration-tests.log

      - id: benchmark
        name: Run 1k, 10k, and 50k performance gates
        working-directory: web
        run: |
          set -o pipefail
          npm run benchmark 2>&1 | tee /tmp/dropfinder-integration-benchmark.log

      - id: chunks
        name: Build and analyze platform chunks
        working-directory: web
        run: |
          set -o pipefail
          npm run build:platform 2>&1 | tee /tmp/dropfinder-integration-platform-build.log
          npm run analyze:chunks 2>&1 | tee /tmp/dropfinder-integration-chunks.log
          npm run pwa:check

      - id: browsers
        name: Install and validate browser matrix
        working-directory: web
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium firefox webkit
          npm run test:e2e

      - id: exact
        name: Confirm exact commit remained reproducible and clean
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ steps.commit.outputs.sha }}"
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - id: push
        name: Push validated integration head
        run: git push origin HEAD:ui-rewrite/06-full-integration

      - name: Preserve exact-head evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-rewrite-integration-${{ steps.commit.outputs.sha || github.run_id }}
          path: |
            web/playwright-report
            web/test-results
            web/dist-platform
            cloud_pages/data/catalog-v4
            /tmp/dropfinder-integration-*.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish fail-closed stage evidence
        if: failure()
        env:
          COMPOSE_OUTCOME: ${{ steps.compose.outcome }}
          CATALOG_OUTCOME: ${{ steps.catalog.outcome }}
          LOCKFILE_OUTCOME: ${{ steps.lockfile.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PWA_OUTCOME: ${{ steps.pwa.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
          PYTHON_OUTCOME: ${{ steps.python.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          BENCHMARK_OUTCOME: ${{ steps.benchmark.outcome }}
          CHUNKS_OUTCOME: ${{ steps.chunks.outcome }}
          BROWSERS_OUTCOME: ${{ steps.browsers.outcome }}
          EXACT_OUTCOME: ${{ steps.exact.outcome }}
          PUSH_OUTCOME: ${{ steps.push.outcome }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/bootstrap-logs
          cp /tmp/dropfinder-integration-*.log /tmp/bootstrap-logs/ 2>/dev/null || true
          git fetch origin main ui-rewrite/06-full-integration
          git reset --hard origin/ui-rewrite/06-full-integration
          git clean -fdx
          mkdir -p .integration/logs
          cp /tmp/bootstrap-logs/* .integration/logs/ 2>/dev/null || true
          python - <<'PY'
          import json, os
          from pathlib import Path
          keys = ['COMPOSE','CATALOG','LOCKFILE','INSTALL','BUILD','PWA','COMMIT','PYTHON','LINT','TYPECHECK','TESTS','BENCHMARK','CHUNKS','BROWSERS','EXACT','PUSH']
          payload = {key.lower(): os.environ[f'{key}_OUTCOME'] for key in keys}
          payload['run_id'] = os.environ['GITHUB_RUN_ID']
          payload['source_head'] = os.environ['GITHUB_SHA']
          Path('.integration/BOOTSTRAP_FAILURE.json').write_text(json.dumps(payload, indent=2) + '\n')
          PY
          git config user.name "DropFinder Integration Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .integration/BOOTSTRAP_FAILURE.json .integration/logs
          git commit -m "Record integration bootstrap failure ${GITHUB_RUN_ID}"
          git push --force origin HEAD:ui-rewrite/06-failure-evidence
