name: Temporary Document Lifecycle Fixture Repair

on:
  pull_request:
    branches:
      - fix/image-decode-main-regression

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/document-lifecycle-fixture-repair'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/image-decode-main-regression
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Keep lifecycle fixtures independent from decode behavior
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('web/test/platform.test.mjs')
          text = path.read_text(encoding='utf-8')

          old = '  const viewer = new DocumentViewerCapability({ fetchImpl });\n'
          new = '  const viewer = new DocumentViewerCapability({ fetchImpl, decodeImage: async () => {} });\n'
          if text.count(old) != 1:
              raise SystemExit(f'superseded-open fixture: expected one match, found {text.count(old)}')
          text = text.replace(old, new, 1)

          old = "    loadPdfJs: async () => ({ getDocument: () => loadingTask }),\n  });\n  await viewer.open({ url: 'https://x/original.pdf', mimeType: 'application/pdf' });\n"
          new = "    loadPdfJs: async () => ({ getDocument: () => loadingTask }),\n    decodeImage: async () => {},\n  });\n  await viewer.open({ url: 'https://x/original.pdf', mimeType: 'application/pdf' });\n"
          if text.count(old) != 1:
              raise SystemExit(f'newest-open fixture: expected one match, found {text.count(old)}')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate complete frontend platform lifecycle
        working-directory: web
        run: |
          npm ci
          npm test
          npm run lint
          npm run typecheck
      - name: Commit repair and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/tmp-document-lifecycle-fixture-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: isolate document lifecycle fixtures from image decoding"
          git push origin HEAD:fix/image-decode-main-regression
