name: Temporary Document Lifecycle Fixture Repair

on:
  pull_request:
    branches:
      - fix/image-decode-main-regression

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/document-lifecycle-fixture-repair'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/image-decode-main-regression
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Keep newest-open fixture independent from decode behavior
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('web/test/platform.test.mjs')
          text = path.read_text(encoding='utf-8')
          start = text.index("test('document viewer keeps the newest open when older cleanup finishes later'")
          end = text.index("\ntest('document viewer close waits for cleanup already claimed by a superseded open'", start)
          block = text[start:end]
          anchor = "    loadPdfJs: async () => ({ getDocument: () => loadingTask }),\n"
          decoder = "    decodeImage: async () => {},\n"
          if decoder not in block:
              if block.count(anchor) != 1:
                  raise SystemExit(f'newest-open decoder anchor: expected one match, found {block.count(anchor)}')
              block = block.replace(anchor, anchor + decoder, 1)
          text = text[:start] + block + text[end:]
          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate complete frontend platform lifecycle
        working-directory: web
        run: |
          npm ci
          npm test
          npm run lint
          npm run typecheck
      - name: Commit repair and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/tmp-document-lifecycle-fixture-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: isolate document lifecycle fixture from image decoding"
          git push origin HEAD:fix/image-decode-main-regression
