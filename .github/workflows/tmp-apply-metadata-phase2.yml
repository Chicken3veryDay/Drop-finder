name: Temporary Apply Metadata Phase 2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/metadata-completeness-phase2'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PATCH_1: ''
      PATCH_2: ''
      PATCH_3: ''
      PATCH_4: ''
      PATCH_CHUNKS: '4'
      PATCH_BYTES: '31755'
      PATCH_SHA256: 'd7641a145970bc7c9501acd0e5ecf6d9b664608d51f1cd25985b231867634d94'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/metadata-completeness-phase2
          fetch-depth: 0
          persist-credentials: true
      - name: Apply reviewed metadata phase two patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, gzip, hashlib, os, pathlib
          count = int(os.environ['PATCH_CHUNKS'])
          encoded = ''.join(os.environ[f'PATCH_{i}'] for i in range(1, count + 1))
          patch = gzip.decompress(base64.b64decode(encoded, validate=True))
          assert len(patch) == int(os.environ['PATCH_BYTES']), (len(patch), os.environ['PATCH_BYTES'])
          assert hashlib.sha256(patch).hexdigest() == os.environ['PATCH_SHA256']
          pathlib.Path('/tmp/metadata-phase2.patch').write_bytes(patch)
          PY
          git apply --check /tmp/metadata-phase2.patch
          git apply /tmp/metadata-phase2.patch
          rm -f .github/workflows/tmp-export-metadata-phase2.yml
          rm -f METADATA_PHASE2.md METADATA_PHASE2_SCOPE.md METADATA_PHASE2_TRIGGER.txt METADATA_PHASE2_TRIGGER_2.txt METADATA_PHASE2_TRIGGER_3.txt METADATA_PHASE2_TRIGGER_4.txt
          python -m py_compile scripts/cloud_scan.py scripts/product_detail_reliability.py scripts/catalog_v4/normalization.py scripts/catalog_v4/builder.py
          python -m unittest tests.test_catalog_metadata_extraction tests.test_metadata_phase2
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: extract remaining first-party catalog metadata'
          git push origin HEAD:fix/metadata-completeness-phase2
          rm -f .github/workflows/tmp-apply-metadata-phase2.yml
          git add -A
          git commit -m 'chore: remove temporary metadata phase two applicator'
          git push origin HEAD:fix/metadata-completeness-phase2
