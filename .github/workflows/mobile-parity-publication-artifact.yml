name: Mobile Parity Publication Artifact

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/mobile-parity-publication-artifact.yml"

permissions:
  contents: write

concurrency:
  group: mobile-parity-publication-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build deterministic publication
        working-directory: web
        run: |
          set -euo pipefail
          npm ci
          npm run build
          node - <<'NODE'
          const { readFileSync, readdirSync, rmSync } = require('node:fs');
          const manifest = JSON.parse(readFileSync('../cloud_pages/assets/vite-manifest.json', 'utf8'));
          const active = new Set();
          for (const record of Object.values(manifest)) {
            if (record.file) active.add(record.file.replace(/^assets\//, ''));
            for (const css of record.css || []) active.add(css.replace(/^assets\//, ''));
            for (const asset of record.assets || []) active.add(asset.replace(/^assets\//, ''));
          }
          for (const name of readdirSync('../cloud_pages/assets')) {
            if ((/^app-.*\.js$/.test(name) || /^index-.*\.css$/.test(name)) && !active.has(name)) {
              rmSync(`../cloud_pages/assets/${name}`);
            }
          }
          NODE
          npm run pwa:manifest
          npm run pwa:check
          npm run verify:publication
      - name: Commit generated publication
        run: |
          set -euo pipefail
          git config user.name "DropFinder Mobile UI Builder"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_pages/index.html cloud_pages/app-shell.json cloud_pages/assets
          if ! git diff --cached --quiet; then
            git commit -m "Build mobile desktop-parity publication [skip ci]"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
