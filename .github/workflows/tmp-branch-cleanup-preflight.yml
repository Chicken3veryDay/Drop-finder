name: Temporary Branch Cleanup Preflight

on:
  pull_request:
    branches: [verification/cache-convergence-monitor]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  inventory:
    if: github.head_ref == 'trigger/cache-convergence-monitor'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Build fail-closed branch graph
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          python - <<'PY'
          import fnmatch
          import json
          import os
          import subprocess
          from urllib.parse import quote

          repo = os.environ['REPOSITORY']
          owner = repo.split('/', 1)[0]

          def run(*args, check=True):
              proc = subprocess.run(args, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              if check and proc.returncode:
                  raise RuntimeError(f"command failed ({proc.returncode}): {' '.join(args)}\n{proc.stderr}")
              return proc

          def gh_json(path):
              return json.loads(subprocess.check_output(['gh', 'api', '--paginate', path], text=True))

          branch_pages = gh_json(f'repos/{repo}/branches?per_page=100')
          branches = branch_pages if isinstance(branch_pages, list) else []
          open_prs = gh_json(f'repos/{repo}/pulls?state=open&per_page=100')
          open_heads = {pr['head']['ref']: pr['number'] for pr in open_prs}

          protected_names = {'main', 'gh-pages'}
          temp_patterns = (
              '.github/workflows/tmp-*',
              '.tmp/*',
              '.trigger-*',
              '.monitor-*',
              '.production-monitor-*',
          )

          def ancestor(ref, target):
              return run('git', 'merge-base', '--is-ancestor', ref, target, check=False).returncode == 0

          def changed_paths(branch):
              ref = f'refs/remotes/origin/{branch}'
              base_proc = run('git', 'merge-base', 'refs/remotes/origin/main', ref, check=False)
              if base_proc.returncode:
                  return []
              base = base_proc.stdout.strip()
              diff = run('git', 'diff', '--name-only', f'{base}..{ref}').stdout
              return [line for line in diff.splitlines() if line]

          def temp_only(paths):
              return bool(paths) and all(any(fnmatch.fnmatch(path, pattern) for pattern in temp_patterns) for path in paths)

          ledger = []
          for item in sorted(branches, key=lambda row: row['name']):
              name = item['name']
              tip = item['commit']['sha']
              ref = f'refs/remotes/origin/{name}'
              paths = changed_paths(name) if name not in protected_names else []
              merged_exact = []
              if name not in protected_names:
                  query = f"repos/{repo}/pulls?state=closed&head={quote(owner + ':' + name, safe='')}&per_page=100"
                  try:
                      prs = gh_json(query)
                  except Exception:
                      prs = []
                  merged_exact = [
                      pr['number'] for pr in prs
                      if pr.get('merged_at') and (pr.get('head') or {}).get('sha') == tip
                  ]
              reasons = []
              safe = False
              if name in protected_names or item.get('protected'):
                  reasons.append('protected')
              else:
                  if ancestor(ref, 'refs/remotes/origin/main'):
                      safe = True
                      reasons.append('reachable_from_main')
                  if ancestor(ref, 'refs/remotes/origin/gh-pages'):
                      safe = True
                      reasons.append('reachable_from_gh_pages')
                  if merged_exact:
                      safe = True
                      reasons.append('exact_tip_merged_pr')
                  if temp_only(paths):
                      safe = True
                      reasons.append('temporary_only_unique_diff')
                  if name in open_heads and open_heads[name] != 456:
                      safe = False
                      reasons.append(f'open_pr_{open_heads[name]}')
              ledger.append({
                  'branch': name,
                  'tip': tip,
                  'protected': bool(item.get('protected')) or name in protected_names,
                  'open_pr': open_heads.get(name),
                  'changed_paths_from_main_merge_base': paths,
                  'exact_tip_merged_prs': merged_exact,
                  'safe_to_delete': safe,
                  'reasons': reasons or ['unclassified_unique_history'],
              })

          payload = {
              'schema_version': 'dropfinder-branch-cleanup-preflight-v1',
              'main': run('git', 'rev-parse', 'refs/remotes/origin/main').stdout.strip(),
              'gh_pages': run('git', 'rev-parse', 'refs/remotes/origin/gh-pages').stdout.strip(),
              'open_prs': [
                  {'number': pr['number'], 'head': pr['head']['ref'], 'base': pr['base']['ref']}
                  for pr in open_prs
              ],
              'branches': ledger,
              'safe_delete_count': sum(1 for row in ledger if row['safe_to_delete']),
              'retained_unprotected': [
                  row['branch'] for row in ledger
                  if not row['protected'] and not row['safe_to_delete']
              ],
          }
          with open('branch-cleanup-preflight.json', 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: branch-cleanup-preflight
          path: branch-cleanup-preflight.json
          if-no-files-found: error
          retention-days: 30
