name: Temporary Prepared Generation Source Export

on:
  pull_request:
    branches: [automation/prepared-generation-race-repair]
    paths:
      - automation/prepared-generation-source-export.trigger
      - .github/workflows/tmp-prepared-generation-source-export.yml

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'trigger/prepared-generation-source-export'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 811e8de954da34702f565ec8de5a018d0a7b66e0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prepared-generation-repair-sources
          path: |
            cloud_pages/sw.js
            web/test/service-worker.test.mjs
          if-no-files-found: error
          retention-days: 7
