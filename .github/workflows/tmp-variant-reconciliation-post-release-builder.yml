name: Temporary Variant Reconciliation Post-Release Builder

on:
  pull_request:
    branches:
      - fix/variant-reconciliation-post-release

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.head_ref == 'trigger/variant-reconciliation-post-release'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/variant-reconciliation-post-release
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply exact reviewed variant reconciliation patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin fix/issue-50-reconcile-duplicate-variants
          git diff --binary \
            d0118d46877f20ef71bca6924fd390bc7849d7a4..13e5f34dd97a1475345e4e23154735340d9a2a01 \
            -- scripts/catalog_v4/builder.py tests/catalog_v4/test_builder.py \
            > /tmp/variant-reconciliation.patch
          test -s /tmp/variant-reconciliation.patch
          git apply --3way /tmp/variant-reconciliation.patch
      - name: Validate duplicate identity and complete catalog contracts
        run: |
          set -euo pipefail
          python -m compileall -q scripts/catalog_v4 tests/catalog_v4
          python -m unittest -v tests.catalog_v4.test_builder
          python -m unittest discover -s tests/catalog_v4 -v
          python -m scripts.catalog_v4.selftest
          rm -rf /tmp/dropfinder-variant-catalog
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output /tmp/dropfinder-variant-catalog \
            --detail-shards 16 \
            --minimum-products 1 \
            --minimum-variants 1
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --output /tmp/dropfinder-variant-catalog \
            --verify-only
      - name: Commit clean reconstruction
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/tmp-variant-reconciliation-post-release-builder.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: reconcile variants across duplicate product URLs'
          git push origin HEAD:fix/variant-reconciliation-post-release
