name: Temporary Variant Reconciliation PR Runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'fix/issue-50-reconcile-duplicate-variants' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-50-reconcile-duplicate-variants
      - name: Apply staged reconstruction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/tmp-variant-reconciliation-builder.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          code = textwrap.dedent(workflow[start:end])
          exec(compile(code, 'variant-reconciliation', 'exec'))
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate catalog reconstruction
        run: |
          python -m py_compile scripts/catalog_v4/*.py
          python -m unittest tests.catalog_v4.test_builder
      - name: Commit final reconstruction
        shell: bash
        run: |
          rm -f .github/workflows/tmp-variant-reconciliation-builder.yml .github/workflows/tmp-variant-pr-runner.yml .github/.tmp-variant-reconciliation-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reconcile variants across duplicate product URLs"
          git push origin HEAD:fix/issue-50-reconcile-duplicate-variants
