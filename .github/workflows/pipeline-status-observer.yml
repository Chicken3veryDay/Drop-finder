name: Observe DropFinder pipeline runs

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/pipeline-status-request.txt"

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - name: Capture recent relevant runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          names = {
              'Canary complete DropFinder catalog',
              'Benchmark DropFinder one-page performance',
              'Apply DropFinder normalization and UI patch',
              'Apply DropFinder repository patches',
              'Finalize DropFinder normalization patches',
              'Validate DropFinder Render package',
              'Deploy full DropFinder to Render',
              'Deploy DropFinder to Hugging Face Space',
              'Verify complete live DropFinder release',
              'Probe live Render service',
              'Observe Render rollout status',
          }
          query = urllib.parse.urlencode({'branch': 'deploy/full-stack-hf', 'per_page': 100})
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GH_REPO']}/actions/runs?{query}",
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'User-Agent': 'DropFinder-Pipeline-Observer/5.0',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              data = json.load(response)
          runs = []
          for row in data.get('workflow_runs', []):
              if row.get('name') not in names:
                  continue
              runs.append({
                  'id': row.get('id'),
                  'name': row.get('name'),
                  'status': row.get('status'),
                  'conclusion': row.get('conclusion'),
                  'head_sha': row.get('head_sha'),
                  'created_at': row.get('created_at'),
                  'updated_at': row.get('updated_at'),
                  'html_url': row.get('html_url'),
                  'run_attempt': row.get('run_attempt'),
              })
          payload = {
              'schema_version': 'dropfinder-pipeline-status-v5',
              'captured_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'runs': runs[:100],
          }
          Path('deployment/pipeline-status.json').write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
      - name: Record observer report
        run: |
          set -euo pipefail
          cp deployment/pipeline-status.json /tmp/pipeline-status.json
          git config user.name "DropFinder Pipeline Observer"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          recorded=false
          for attempt in 1 2 3 4 5; do
            git fetch origin deploy/full-stack-hf
            git reset --hard origin/deploy/full-stack-hf
            cp /tmp/pipeline-status.json deployment/pipeline-status.json
            git add deployment/pipeline-status.json
            if git diff --cached --quiet; then
              recorded=true
              break
            fi
            git commit -m "ci: record pipeline status [skip ci]"
            if git push origin HEAD:deploy/full-stack-hf; then
              recorded=true
              break
            fi
            git reset --hard HEAD~1
            sleep $((attempt * 2))
          done
          test "$recorded" = true
