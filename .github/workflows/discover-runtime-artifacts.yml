name: Discover retained DropFinder artifacts

on:
  workflow_dispatch:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - ".github/workflows/discover-runtime-artifacts.yml"

permissions:
  actions: read
  contents: write

concurrency:
  group: dropfinder-artifact-discovery
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - name: Inventory repository artifacts and releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p deployment
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" > /tmp/artifacts-pages.jsonl
          python - <<'PY'
          import json
          from pathlib import Path

          artifacts=[]
          text=Path('/tmp/artifacts-pages.jsonl').read_text(encoding='utf-8').strip()
          decoder=json.JSONDecoder()
          index=0
          while index < len(text):
              while index < len(text) and text[index].isspace():
                  index += 1
              if index >= len(text):
                  break
              page,index=decoder.raw_decode(text,index)
              artifacts.extend(page.get('artifacts',[]))
          records=[]
          for item in artifacts:
              records.append({
                  'id': item.get('id'),
                  'name': item.get('name'),
                  'size_in_bytes': item.get('size_in_bytes'),
                  'expired': item.get('expired'),
                  'created_at': item.get('created_at'),
                  'expires_at': item.get('expires_at'),
                  'workflow_run_id': (item.get('workflow_run') or {}).get('id'),
                  'head_sha': (item.get('workflow_run') or {}).get('head_sha'),
              })
          output={
              'schema_version':'dropfinder-artifact-inventory-v1',
              'count':len(records),
              'artifacts':records,
          }
          Path('deployment/artifact-inventory.json').write_text(json.dumps(output,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          print(json.dumps(output,indent=2))
          PY
      - name: Commit inventory
        run: |
          set -euo pipefail
          git config user.name "DropFinder Artifact Discovery"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/artifact-inventory.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: record retained workflow artifact inventory [skip ci]"
            git push origin HEAD:deploy/full-stack-hf
          fi
