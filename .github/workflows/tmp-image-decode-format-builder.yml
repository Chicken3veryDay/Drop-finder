name: Temporary Image Decode Format Builder

on:
  pull_request:
    branches:
      - fix/image-decode-main-regression

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'trigger/image-decode-format'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/image-decode-main-regression
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Normalize generated method formatting
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('web/src/platform/documents/document-viewer-capability.js')
          text = path.read_text(encoding='utf-8')
          start = text.index('async openImage(documentRef, sessionId, signal) {')
          end = text.index('\n\n  renderPage(', start)
          block = text[start:end]
          if not block.startswith('  async openImage'):
              block = '\n'.join(f'  {line}' for line in block.splitlines())
          text = text[:start] + block + text[end:]
          text = text.replace('\n}\n\n\nfunction decodeImageUrl', '\n}\n\nfunction decodeImageUrl', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate full frontend
        working-directory: web
        run: |
          npm ci
          npm test
          npm run lint
          npm run typecheck
      - name: Commit formatting and remove builder
        shell: bash
        run: |
          rm -f .github/workflows/tmp-image-decode-format-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: normalize document image lifecycle formatting"
          git push origin HEAD:fix/image-decode-main-regression
