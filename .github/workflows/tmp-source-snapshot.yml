name: Temporary Pages Cache Convergence Applicator

on:
  pull_request:
    branches: [verification/balanced-recovery-publish]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'trigger/balanced-recovery-publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/pages-cache-convergence
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Apply reviewed cache convergence repair
        id: repair
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -o pipefail
          {
            set -eux
            test "$(git rev-parse HEAD)" = "3e82b9edb232e31720ddd6f5abb769e0d9aba422"
            gh api "repos/${REPOSITORY}/contents/.tmp/pages-cache-convergence.patch?ref=trigger/balanced-recovery-publish" --jq .content \
              | tr -d '\n' | base64 -d > /tmp/pages-cache-convergence.patch
            patch -p1 --forward --batch < /tmp/pages-cache-convergence.patch
            git diff --check
            cd web
            node --test test/verify-pages-endpoint.test.mjs
            cd ..
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add web/scripts/verify-pages-endpoint.mjs web/test/verify-pages-endpoint.test.mjs
            git commit -m 'fix: cache-bust Pages generation verification'
            git push origin HEAD:fix/pages-cache-convergence
          } > pages-cache-convergence.log 2>&1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: pages-cache-convergence-diagnostic
          path: pages-cache-convergence.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce repair result
        if: steps.repair.outcome != 'success'
        shell: bash
        run: |
          cat pages-cache-convergence.log
          exit 1
