name: Temporary Pages Cache Convergence Applicator

on:
  pull_request:
    branches: [verification/balanced-recovery-publish]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'trigger/balanced-recovery-publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/pages-cache-convergence
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Apply reviewed cache convergence repair
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if git log -1 --format=%s | grep -Fxq 'fix: cache-bust Pages generation verification'; then
            echo 'Patch already committed.'
            exit 0
          fi
          test "$(git rev-parse HEAD)" = "3e82b9edb232e31720ddd6f5abb769e0d9aba422"
          gh api "repos/${REPOSITORY}/contents/.tmp/pages-cache-convergence.patch?ref=trigger/balanced-recovery-publish" --jq .content \
            | tr -d '\n' | base64 -d > /tmp/pages-cache-convergence.patch
          patch -p1 --forward --batch < /tmp/pages-cache-convergence.patch
          git diff --check
          cd web
          node --test test/verify-pages-endpoint.test.mjs
          cd ..
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/scripts/verify-pages-endpoint.mjs web/test/verify-pages-endpoint.test.mjs
          git commit -m 'fix: cache-bust Pages generation verification'
          git push origin HEAD:fix/pages-cache-convergence
