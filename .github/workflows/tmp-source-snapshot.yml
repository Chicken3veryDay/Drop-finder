name: Temporary Fallback Health Patch Applicator

on:
  pull_request:
    branches: [verification/balanced-recovery-publish]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'trigger/balanced-recovery-publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/fallback-health-accounting
          fetch-depth: 0
      - name: Apply reviewed patch and focused regressions
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if git log -1 --format=%s | grep -Fxq 'fix: isolate fallback verification health'; then
            echo 'Patch is already committed.'
            exit 0
          fi
          git merge-base --is-ancestor e4f9265c6fc74ea26ea132a8c1caa25b112ef73d HEAD
          gh api "repos/${REPOSITORY}/contents/.tmp/fallback-health.patch?ref=trigger/balanced-recovery-publish" --jq .content \
            | tr -d '\n' | base64 -d > /tmp/fallback-health.patch
          patch -p1 --forward --batch < /tmp/fallback-health.patch
          git diff --check
          python -m unittest tests.test_product_detail_reliability tests.catalog_v4.test_route_repair -v
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/product_detail_reliability.py scripts/route_repair.py \
            tests/test_product_detail_reliability.py tests/catalog_v4/test_route_repair.py
          git commit -m 'fix: isolate fallback verification health'
          git push origin HEAD:fix/fallback-health-accounting
