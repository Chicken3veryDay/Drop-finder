name: Temporary Source Snapshot

on:
  pull_request:
    branches: [verification/balanced-recovery-publish]

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'trigger/balanced-recovery-publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: e4f9265c6fc74ea26ea132a8c1caa25b112ef73d
          persist-credentials: false
      - name: Package exact repository tree
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git -czf repository-snapshot.tar.gz .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exact-repository-snapshot
          path: repository-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
