name: Temporary Fallback Health Follow-up Applicator

on:
  pull_request:
    branches: [verification/balanced-recovery-publish]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'trigger/balanced-recovery-publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/fallback-health-accounting
          fetch-depth: 0
      - name: Apply reviewed follow-up and regressions
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if git log -1 --format=%s | grep -Fxq 'fix: preserve nonblocking fallback diagnostics'; then
            echo 'Follow-up is already committed.'
            exit 0
          fi
          test "$(git rev-parse HEAD)" = "e6792ecc3c20d34b4ea76d5b371ae18f79eb9518"
          gh api "repos/${REPOSITORY}/contents/.tmp/fallback-health-followup.patch?ref=trigger/balanced-recovery-publish" --jq .content \
            | tr -d '\n' | base64 -d > /tmp/fallback-health-followup.patch
          patch -p1 --forward --batch < /tmp/fallback-health-followup.patch
          git diff --check
          python -m unittest tests.test_product_detail_reliability tests.catalog_v4.test_route_repair -v
          python scripts/autonomous_merge.py --self-test
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/autonomous_merge.py tests/test_product_detail_reliability.py
          git commit -m 'fix: preserve nonblocking fallback diagnostics'
          git push origin HEAD:fix/fallback-health-accounting
