name: Probe live Render service

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/render-service-probe-request.txt"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - name: Query and validate complete live release
        id: live_probe
        continue-on-error: true
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import math
          import os
          import urllib.parse
          import urllib.request
          from collections import Counter
          from datetime import datetime, timezone
          from pathlib import Path

          CONTRACT = 'exact_price_weight_ppg_thca_stock_image_v1'
          PRODUCT_MARKERS = ('/product/', '/products/', '/product-page/', '/l/national/product/', '/cbd-hemp-flower/', '/hemp-products/')
          LISTING_MARKERS = ('/product-category/', '/product-tag/', '/collections/', '/category/', '/categories/')

          token = os.environ.get('RENDER_API_KEY', '').strip()
          if not token:
              raise SystemExit('RENDER_API_KEY is missing')

          def api(path):
              request = urllib.request.Request(
                  'https://api.render.com/v1' + path,
                  headers={
                      'Accept': 'application/json',
                      'Authorization': f'Bearer {token}',
                      'User-Agent': 'DropFinder-Render-Service-Probe/3.0',
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def public(url, *, decode_json=True):
              request = urllib.request.Request(url, headers={'User-Agent': 'DropFinder-Public-Release-Probe/3.0'})
              with urllib.request.urlopen(request, timeout=120) as response:
                  raw = response.read().decode('utf-8', 'replace')
              return json.loads(raw) if decode_json else raw

          def positive(value):
              if value is None or value == '' or isinstance(value, bool):
                  return None
              try:
                  number = float(value)
              except (TypeError, ValueError):
                  return None
              return number if math.isfinite(number) and number > 0 else None

          def direct_product_url(value):
              try:
                  parsed = urllib.parse.urlsplit(str(value or ''))
              except ValueError:
                  return False
              if parsed.scheme not in {'http', 'https'} or not parsed.netloc:
                  return False
              path = urllib.parse.unquote(parsed.path).lower()
              return not any(marker in path for marker in LISTING_MARKERS) and any(marker in path for marker in PRODUCT_MARKERS)

          owners = api('/owners?limit=20') or []
          owner_rows = [row.get('owner', row) for row in owners if isinstance(row, dict)]
          if not owner_rows:
              raise SystemExit('No Render workspace is accessible')
          owner_id = str(owner_rows[0].get('id') or '')
          query = urllib.parse.urlencode({'name': 'dropfinder-os', 'ownerId': owner_id, 'limit': 20})
          service_rows = api('/services?' + query) or []
          services = [row.get('service', row) for row in service_rows if isinstance(row, dict)]
          matches = [row for row in services if row.get('name') == 'dropfinder-os']
          if not matches:
              raise SystemExit('dropfinder-os Render service was not found')
          service = matches[0]
          service_id = str(service.get('id') or '')
          details = service.get('serviceDetails') if isinstance(service.get('serviceDetails'), dict) else {}
          app_url = str(details.get('url') or service.get('url') or '').rstrip('/')
          if not app_url and service.get('slug'):
              app_url = f"https://{service['slug']}.onrender.com"

          deploy_rows = api(f'/services/{service_id}/deploys?limit=5') or []
          deploys = [row.get('deploy', row) for row in deploy_rows if isinstance(row, dict)]
          report = {
              'schema_version': 'dropfinder-render-service-probe-v3',
              'checked_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'service_id': service_id,
              'service_name': service.get('name'),
              'service_url': app_url,
              'service_type': service.get('type'),
              'suspended': service.get('suspended'),
              'dashboard_url': service.get('dashboardUrl'),
              'recent_deploys': [
                  {
                      'id': row.get('id'),
                      'status': row.get('status'),
                      'created_at': row.get('createdAt'),
                      'updated_at': row.get('updatedAt'),
                      'commit_id': (row.get('commit') or {}).get('id') if isinstance(row.get('commit'), dict) else None,
                      'commit_message': (row.get('commit') or {}).get('message') if isinstance(row.get('commit'), dict) else None,
                  }
                  for row in deploys[:5]
              ],
          }

          failures = []
          try:
              health = public(app_url + '/health')
              ready = public(app_url + '/ready')
              catalog = public(app_url + '/api/catalog')
              source_status = public(app_url + '/api/status')
              runtime = public(app_url + '/api/runtime')
              page = public(app_url + '/', decode_json=False)
              products = catalog.get('products') or []
              by_source = Counter(str(row.get('source_id') or 'unknown') for row in products)
              field_counts = Counter()
              product_failures = []

              for product in products:
                  price = positive(product.get('price'))
                  grams = positive(product.get('grams'))
                  price_per_gram = positive(product.get('price_per_gram'))
                  thca = positive(product.get('thca'))
                  failed = []
                  required = {
                      'comparison_complete': product.get('comparison_complete') is True,
                      'comparison_contract': product.get('comparison_contract') == CONTRACT,
                      'price': price is not None,
                      'grams': grams is not None,
                      'price_per_gram': price_per_gram is not None,
                      'pricing_confidence': product.get('pricing_confidence') in {'exact_variant', 'exact_title'},
                      'weight_source': product.get('weight_source') in {'variant', 'title'},
                      'thca': thca is not None and thca <= 100,
                      'availability': product.get('availability') in {'in_stock', 'out_of_stock'},
                      'image': str(product.get('image') or '').startswith(('http://', 'https://')),
                      'direct_product_url': direct_product_url(product.get('url')),
                  }
                  for field, valid in required.items():
                      if not valid:
                          failed.append(field)
                  if price is not None and grams is not None and price_per_gram is not None:
                      calculated = round(price / grams, 4)
                      if abs(calculated - price_per_gram) > max(0.02, calculated * 0.01):
                          failed.append('price_per_gram_arithmetic')
                  if failed:
                      field_counts.update(failed)
                      product_failures.append({
                          'id': product.get('id'),
                          'source_id': product.get('source_id'),
                          'name': product.get('name'),
                          'failed': failed,
                      })

              release_checks = {
                  'health': health.get('status') == 'healthy',
                  'ready': ready.get('ready') is True,
                  'catalog_count': catalog.get('product_count') == len(products),
                  'nonempty_catalog': len(products) >= 25,
                  'source_floor': int(source_status.get('healthy_sources') or 0) >= 5,
                  'zero_degraded_sources': source_status.get('degraded_sources') == 0,
                  'source_count_consistent': source_status.get('healthy_sources') == source_status.get('enabled_sources'),
                  'catalog_contract': catalog.get('comparison_contract') == CONTRACT,
                  'status_contract': source_status.get('comparison_contract') == CONTRACT,
                  'runtime_contract': runtime.get('comparison_contract') == CONTRACT,
                  'complete_count_consistent': source_status.get('complete_products') == len(products) and runtime.get('complete_products') == len(products),
                  'completeness_gate': source_status.get('services', {}).get('comparison_completeness_gate') == 'healthy',
                  'all_product_fields': not product_failures,
                  'rebuilt_ui': 'Best verified $/g' in page and 'id="scanButton"' in page,
                  'null_safe_ui': "value===null||value===undefined||value===''" in page,
                  'no_false_zero_thca_text': '0% THCA' not in page,
                  'legacy_banner_removed': 'Always-available phone snapshot' not in page and 'class="stats"' not in page,
              }
              failures = [name for name, passed in release_checks.items() if not passed]
              report.update(
                  health=health,
                  ready=ready,
                  source_status={
                      'enabled_sources': source_status.get('enabled_sources'),
                      'healthy_sources': source_status.get('healthy_sources'),
                      'degraded_sources': source_status.get('degraded_sources'),
                      'quarantined_sources': source_status.get('quarantined_sources'),
                  },
                  runtime=runtime,
                  comparison_contract=catalog.get('comparison_contract'),
                  product_count=len(products),
                  complete_product_count=sum(product.get('comparison_complete') is True for product in products),
                  products_by_source=dict(sorted(by_source.items())),
                  field_failure_count=len(product_failures),
                  field_failure_counts=dict(sorted(field_counts.items())),
                  field_failure_examples=product_failures[:50],
                  release_checks=release_checks,
                  failed_release_checks=failures,
                  status='healthy' if not failures else 'invalid',
              )
          except Exception as exc:
              report['status'] = 'warming_or_unhealthy'
              report['public_error_type'] = type(exc).__name__
              report['public_error'] = str(exc)[:1500]
              failures = ['public_probe_exception']

          Path('deployment/render-service-probe.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          if failures:
              raise SystemExit(f"live release verification failed: {failures}")
          PY
      - name: Record live verification report
        if: always()
        run: |
          set -euo pipefail
          if test -s deployment/render-service-probe.json; then
            cp deployment/render-service-probe.json /tmp/render-service-probe.json
            git fetch origin deploy/full-stack-hf
            git reset --hard origin/deploy/full-stack-hf
            cp /tmp/render-service-probe.json deployment/render-service-probe.json
            git config user.name "DropFinder Render Service Probe"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add deployment/render-service-probe.json
            if ! git diff --cached --quiet; then
              git commit -m "deploy: record full live comparison verification [skip ci]"
              git push origin HEAD:deploy/full-stack-hf
            fi
          fi
      - name: Require healthy live release
        if: always()
        env:
          PROBE_OUTCOME: ${{ steps.live_probe.outcome }}
        run: |
          set -euo pipefail
          test "$PROBE_OUTCOME" = success
