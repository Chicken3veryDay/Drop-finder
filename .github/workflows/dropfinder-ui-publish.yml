name: DropFinder UI Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/dropfinder-ui-publish.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: dropfinder-ui-publish
  cancel-in-progress: true

jobs:
  publish-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Validate current catalog snapshot
        run: python web/scripts/publication_gate.py validate-snapshot
      - name: Validate and build current frontend
        working-directory: web
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run lint
          npm run typecheck
          npm test
          npm run build
          npm run verify:publication
      - name: Publish current frontend with current data
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-ui-site
          mkdir -p /tmp/dropfinder-ui-site
          cp -a cloud_pages/. /tmp/dropfinder-ui-site/
          touch /tmp/dropfinder-ui-site/.nojekyll
          test -s /tmp/dropfinder-ui-site/data/catalog.json
          test -s /tmp/dropfinder-ui-site/data/status.json
          test -s /tmp/dropfinder-ui-site/assets/vite-manifest.json
          git config user.name "DropFinder UI Publisher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan ui-pages-next
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx >/dev/null 2>&1 || true
          cp -a /tmp/dropfinder-ui-site/. .
          git add -A
          git commit -m "Publish current DropFinder UI ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
      - name: Verify published branch
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          rm -rf /tmp/dropfinder-ui-published
          git worktree add --detach /tmp/dropfinder-ui-published origin/gh-pages
          node web/scripts/verify-publication.mjs /tmp/dropfinder-ui-published
          python web/scripts/publication_gate.py verify-published --root /tmp/dropfinder-ui-published

# Keep UI deployment independent from storefront rescans.
