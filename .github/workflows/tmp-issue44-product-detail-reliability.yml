name: Temporary Issue 44 Product Detail Reliability

on:
  pull_request:
    branches:
      - fix/issue-44-product-detail-reliability

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issue44-product-detail-reliability'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-44-product-detail-reliability
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply product detail reliability integration
        run: python .github/tmp/issue44_product_detail_reliability.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            scripts/autonomous_merge.py \
            scripts/autonomous_worker_v4.py \
            scripts/product_detail_reliability.py \
            tests/test_product_detail_reliability.py \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Capture focused and complete Python validation
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q scripts tests
            python -m unittest -v tests.test_product_detail_reliability
            python -m unittest discover -s tests -p 'test_*.py' -v
            python scripts/autonomous_worker.py --self-test
            python scripts/autonomous_worker_v2.py --self-test
            python scripts/autonomous_worker_v4.py --self-test
            rm -rf /tmp/issue44-merge-selftest
            python scripts/autonomous_merge.py --self-test /tmp/issue44-merge-selftest
          } > /tmp/issue44-validation.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/issue44-validation.status
          cat /tmp/issue44-validation.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue44-validation
          path: |
            /tmp/issue44-validation.log
            /tmp/issue44-validation.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop on validation failure
        shell: bash
        run: test "$(cat /tmp/issue44-validation.status)" -eq 0
      - name: Validate shard serialization contract
        shell: bash
        run: |
          python - <<'PY'
          import json
          import tempfile
          from pathlib import Path
          from scripts import autonomous_worker_v4 as production
          from scripts import product_detail_reliability as detail

          production.install_runtime()
          worker = production.worker
          original_sources = worker.core.SOURCES
          original_scan = worker.aggregate.scan_all_routes
          original_fetch = worker.core.fetch
          original_delays = detail.PRODUCT_DETAIL_RETRY_DELAYS
          worker.core.SOURCES = [('fixture', 'Fixture Vendor', [])]
          detail.PRODUCT_DETAIL_RETRY_DELAYS = (0.0, 0.0)
          direct = {
              'id': 'direct', 'source_id': 'fixture', 'vendor': 'Fixture Vendor',
              'name': 'Direct THCA Flower 3.5g', 'url': 'https://example.test/products/direct',
              'price': 25.0, 'primary_type': 'cannabis_flower', 'source_type': 'html',
              'classification_evidence': worker.evidence_payload('Direct THCA Flower 3.5g', 'product_title_or_url'),
          }
          unresolved = {
              'id': 'unresolved', 'source_product_id': 'remote-2', 'source_id': 'fixture',
              'vendor': 'Fixture Vendor', 'name': 'Mystery Product',
              'url': 'https://example.test/products/mystery', 'price': 29.0,
              'primary_type': 'cannabis_flower', 'source_type': 'html',
              'classification_evidence': {},
          }
          worker.aggregate.scan_all_routes = lambda _source: ([direct, unresolved], {
              'source_id': 'fixture', 'name': 'Fixture Vendor',
              'route_results': [{'route_id': 'fixture-1', 'url': 'https://example.test/catalog', 'source_type': 'html', 'status': 'healthy', 'http_status': 200, 'products': 2}],
          })
          worker.core.fetch = lambda _target: (_ for _ in ()).throw(TimeoutError('persistent timeout'))
          try:
              with tempfile.TemporaryDirectory() as directory:
                  output = Path(directory)
                  assert worker.run(0, 1, output, 1) == 0
                  payload = json.loads((output / 'shard-0.json').read_text())
                  source = payload['sources'][0]
                  assert source['status'] == 'degraded', source
                  assert source['quality']['verification_failures'] == 1, source
                  route = next(row for row in source['route_results'] if row.get('source_type') == 'product_detail_verification')
                  assert route['verification_failure_records'][0]['product_id'] == 'remote-2', route
          finally:
              worker.core.SOURCES = original_sources
              worker.aggregate.scan_all_routes = original_scan
              worker.core.fetch = original_fetch
              detail.PRODUCT_DETAIL_RETRY_DELAYS = original_delays
          PY
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issue44-product-detail-reliability.yml \
            .github/tmp/issue44_product_detail_reliability.py
          git add \
            scripts/autonomous_merge.py \
            scripts/autonomous_worker_v4.py \
            scripts/product_detail_reliability.py \
            tests/test_product_detail_reliability.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: retain product detail verification failures"
          git push origin HEAD:fix/issue-44-product-detail-reliability
