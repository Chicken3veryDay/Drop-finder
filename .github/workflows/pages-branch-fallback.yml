name: Publish DropFinder via gh-pages Branch

# Second commit intentionally triggers this workflow after GitHub has registered it.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages-branch-fallback.yml"
      - "web/scripts/verify-pages-endpoint.mjs"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  actions: read

concurrency:
  group: pages-branch-fallback
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate canonical site
        run: |
          set -euo pipefail
          node web/scripts/verify-publication.mjs cloud_pages
          python web/scripts/publication_gate.py verify-published --root cloud_pages
      - name: Publish immutable site tree to gh-pages
        run: |
          set -euo pipefail
          rm -rf /tmp/dropfinder-gh-pages
          mkdir -p /tmp/dropfinder-gh-pages
          cp -a cloud_pages/. /tmp/dropfinder-gh-pages/
          touch /tmp/dropfinder-gh-pages/.nojekyll

          git config user.name "dropfinder-pages-branch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-publish
          git rm -rf . >/dev/null 2>&1 || true
          cp -a /tmp/dropfinder-gh-pages/. .
          git add -A
          git commit -m "Publish DropFinder Cloud ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
          git checkout --force main
      - name: Configure branch-based GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/tmp/pages-before.json 2>/tmp/pages-before.err; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" \
              -F build_type=legacy \
              -F 'source[branch]=gh-pages' \
              -F 'source[path]=/' >/tmp/pages-configure.json
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" \
              -F build_type=legacy \
              -F 'source[branch]=gh-pages' \
              -F 'source[path]=/' >/tmp/pages-configure.json
          fi
          cat /tmp/pages-configure.json
      - name: Verify public URL and commit receipt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git checkout --force main
          git pull --rebase origin main
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          known_url="https://${owner,,}.github.io/${repo}/"
          page_url="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.html_url // empty')"
          [ -n "$page_url" ] || page_url="$known_url"

          verified=false
          verification_error=""
          for attempt in $(seq 1 30); do
            if node web/scripts/verify-pages-endpoint.mjs "$page_url" >/tmp/pages-verification.json 2>/tmp/pages-verification.err; then
              cat /tmp/pages-verification.json
              verified=true
              verification_error=""
              break
            fi
            verification_error="$(cat /tmp/pages-verification.err)"
            echo "Waiting for branch publication (attempt $attempt): $verification_error"
            sleep 10
          done

          pages_api="$(gh api "repos/${GITHUB_REPOSITORY}/pages")"
          mkdir -p deployment
          PAGE_URL="$page_url" VERIFIED="$verified" PAGES_API="$pages_api" \
          VERIFICATION_ERROR="$verification_error" python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          catalog=json.loads(Path('cloud_pages/data/catalog.json').read_text())
          status=json.loads(Path('cloud_pages/data/status.json').read_text())
          api=json.loads(os.environ['PAGES_API'])
          live=os.environ['VERIFIED']=='true'
          payload={
              'schema_version':'dropfinder-pages-branch-receipt-v2',
              'status':'live' if live else 'failed',
              'verified_at':datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'page_url':os.environ['PAGE_URL'],
              'http_status':200 if live else 0,
              'publication_verified':live,
              'verification_error':os.environ['VERIFICATION_ERROR'][:2000],
              'pages_status':api.get('status'),
              'pages_build_type':api.get('build_type'),
              'pages_source':api.get('source'),
              'workflow_sha':os.environ.get('GITHUB_SHA',''),
              'published_branch':'gh-pages',
              'product_count':catalog['product_count'],
              'healthy_sources':status['healthy_sources'],
              'enabled_sources':status['enabled_sources'],
          }
          Path('deployment/pages-branch-receipt.json').write_text(json.dumps(payload,indent=2,sort_keys=True)+'\n')
          if live:
              Path('deployment/pages.json').write_text(json.dumps(payload,indent=2,sort_keys=True)+'\n')
          print(json.dumps(payload,indent=2,sort_keys=True))
          PY

          git config user.name "dropfinder-pages-branch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/pages-branch-receipt.json
          [ -f deployment/pages.json ] && git add deployment/pages.json || true
          git diff --cached --quiet || git commit -m "chore: record branch Pages deployment [skip ci]"
          git push origin HEAD:main

          test "$verified" = "true"
