name: Temporary Apply Product Detail Metadata Enrichment

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/product-detail-metadata-enrichment'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/product-detail-metadata-enrichment
          fetch-depth: 0
          persist-credentials: true
      - name: Apply bounded detail enrichment
        shell: bash
        env:
          P01: ''
          P02: ''
          P03: ''
          P04: ''
          P05: ''
          P06: ''
        run: |
          set -euo pipefail
          printf '%s%s%s%s%s%s' "$P01" "$P02" "$P03" "$P04" "$P05" "$P06" | base64 -d | gunzip > /tmp/detail-enrichment.patch
          test "$(wc -c < /tmp/detail-enrichment.patch)" -eq 15541
          test "$(sha256sum /tmp/detail-enrichment.patch | cut -d' ' -f1)" = 'f8fa345b0e0b56e6c1bae0683b510e69f7a347d32a7f33f81ff06bfbd280be8b'
          git apply --check /tmp/detail-enrichment.patch
          git apply /tmp/detail-enrichment.patch
          rm -f .github/workflows/tmp-apply-product-detail-enrichment.yml
          PYTHONPATH=. python -m unittest \
            tests.test_product_detail_reliability \
            tests.test_catalog_metadata_extraction \
            tests.multi_product.test_runtime -v
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: enrich structured products from detail pages'
          git push origin HEAD:fix/product-detail-metadata-enrichment
