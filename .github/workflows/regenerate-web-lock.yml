name: Regenerate web lock

on:
  push:
    branches:
      - ui-rewrite/05-performance-platform
    paths:
      - web/package.json
      - .github/workflows/regenerate-web-lock.yml

permissions:
  contents: write

concurrency:
  group: regenerate-web-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - name: Regenerate frozen lock
        working-directory: web
        run: npm install --package-lock-only --lockfile-version=1 --ignore-scripts --no-audit --no-fund
      - name: Commit changed lock
        run: |
          if git diff --quiet -- web/package-lock.json; then
            echo 'Lockfile already current.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/package-lock.json
          git commit -m 'chore(web): regenerate lock for PDF.js 5.4.624 [skip ci]'
          git push origin HEAD:${GITHUB_REF_NAME}
