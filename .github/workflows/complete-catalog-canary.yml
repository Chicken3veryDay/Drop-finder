name: Canary complete DropFinder catalog

on:
  push:
    branches: [deploy/full-stack-hf]
    paths:
      - "deployment/complete-catalog-canary-request.txt"

permissions:
  contents: write

concurrency:
  group: dropfinder-complete-catalog-canary
  cancel-in-progress: true

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy/full-stack-hf
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile and self-test strict pipeline
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/cloud_scan.py \
            scripts/cloud_scan_v2.py \
            scripts/autonomous_worker.py \
            scripts/autonomous_worker_v2.py \
            scripts/autonomous_worker_v4.py \
            scripts/autonomous_worker_v5.py \
            scripts/autonomous_worker_v6.py \
            scripts/autonomous_merge.py \
            scripts/catalog_normalization.py \
            scripts/autonomous_merge_complete.py \
            scripts/catalog_completeness_audit.py
          python scripts/catalog_normalization.py --self-test
          python scripts/autonomous_worker_v6.py --self-test
          python scripts/autonomous_merge_complete.py --self-test
      - name: Run complete live catalog canary
        run: |
          set -euo pipefail
          rm -rf .canary-complete
          mkdir -p .canary-complete/shards .canary-complete/output
          python scripts/autonomous_worker_v6.py \
            --shard 0 \
            --shards 1 \
            --workers 4 \
            --output .canary-complete/shards
          python scripts/autonomous_merge_complete.py \
            --input .canary-complete/shards \
            --output .canary-complete/output \
            --min-active 0 \
            --min-products 0
          python scripts/catalog_completeness_audit.py \
            --catalog-file .canary-complete/output/catalog.json \
            --output .canary-complete/completeness.json
      - name: Build canary report
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys
          import urllib.parse
          from collections import Counter, defaultdict
          from datetime import datetime, timezone
          from pathlib import Path

          sys.path.insert(0, str(Path('scripts').resolve()))
          from catalog_normalization import NORMALIZATION_CONTRACT, normalization_failures

          root = Path('.canary-complete')
          catalog = json.loads((root / 'output/catalog.json').read_text())
          status = json.loads((root / 'output/status.json').read_text())
          runtime = json.loads((root / 'output/runtime.json').read_text())
          quarantine = json.loads((root / 'output/quarantine.json').read_text())
          rejections = json.loads((root / 'output/rejections.json').read_text())
          completeness = json.loads((root / 'completeness.json').read_text())
          products = catalog.get('products') or []
          by_source = Counter(str(row.get('source_id') or 'unknown') for row in products)
          rejected_by_source = defaultdict(Counter)
          for row in rejections.get('products') or []:
              rejected_by_source[str(row.get('source_id') or 'unknown')][str(row.get('reason') or 'unknown')] += 1

          listing_markers = ('/product-category/', '/product-tag/', '/collections/', '/category/', '/categories/')
          product_markers = ('/product/', '/products/', '/product-page/', '/l/national/product/', '/cbd-hemp-flower/', '/hemp-products/')
          def direct_url(value):
              try:
                  path = urllib.parse.unquote(urllib.parse.urlsplit(str(value or '')).path).lower()
              except ValueError:
                  return False
              return not any(marker in path for marker in listing_markers) and any(marker in path for marker in product_markers)

          field_failures = []
          normalization_failure_counts = Counter()
          raw_to_display_examples = []
          for row in products:
              failures = []
              required = {
                  'comparison_complete': row.get('comparison_complete') is True,
                  'price': isinstance(row.get('price'), (int, float)) and row.get('price') > 0,
                  'grams': isinstance(row.get('grams'), (int, float)) and row.get('grams') > 0,
                  'price_per_gram': isinstance(row.get('price_per_gram'), (int, float)) and row.get('price_per_gram') > 0,
                  'thca': isinstance(row.get('thca'), (int, float)) and 0 < row.get('thca') <= 100,
                  'availability': row.get('availability') in {'in_stock', 'out_of_stock'},
                  'image': str(row.get('image') or '').startswith(('http://', 'https://')),
                  'direct_product_url': direct_url(row.get('url')),
                  'normalization_contract': row.get('normalization_contract') == NORMALIZATION_CONTRACT,
              }
              failures.extend(key for key, value in required.items() if not value)
              normalized_failures = normalization_failures(row)
              failures.extend(normalized_failures)
              normalization_failure_counts.update(normalized_failures)
              if failures:
                  field_failures.append({'id': row.get('id'), 'source_id': row.get('source_id'), 'name': row.get('name'), 'raw_name': row.get('raw_name'), 'failed': sorted(set(failures))})
              if len(raw_to_display_examples) < 60:
                  raw_to_display_examples.append({
                      'source_id': row.get('source_id'),
                      'raw_name': row.get('raw_name'),
                      'display_name': row.get('display_name'),
                      'package_label': row.get('package_label'),
                      'flower_form': row.get('flower_form'),
                      'cultivation': row.get('cultivation'),
                  })
          metadata_checks = {
              'catalog_normalization_contract': catalog.get('normalization_contract') == NORMALIZATION_CONTRACT,
              'status_normalization_contract': status.get('normalization_contract') == NORMALIZATION_CONTRACT,
              'runtime_normalization_contract': runtime.get('normalization_contract') == NORMALIZATION_CONTRACT,
              'final_normalizer_healthy': status.get('services', {}).get('final_normalizer') == 'healthy',
          }
          failed_metadata = [key for key, value in metadata_checks.items() if not value]
          report = {
              'schema_version': 'dropfinder-complete-catalog-canary-v4',
              'worker': 'autonomous_worker_v6',
              'merger': 'autonomous_merge_complete',
              'canary_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'status': 'healthy' if not field_failures and not failed_metadata and products else 'empty' if not products else 'invalid',
              'comparison_contract': catalog.get('comparison_contract'),
              'normalization_contract': catalog.get('normalization_contract'),
              'metadata_checks': metadata_checks,
              'failed_metadata_checks': failed_metadata,
              'candidate_sources': status.get('candidate_sources'),
              'active_sources': status.get('enabled_sources'),
              'quarantined_sources': quarantine.get('count'),
              'complete_products': len(products),
              'complete_products_by_source': dict(sorted(by_source.items())),
              'rejected_products': rejections.get('count'),
              'rejection_reasons': rejections.get('reason_counts'),
              'rejection_reasons_by_source': {
                  source: dict(sorted(reasons.items()))
                  for source, reasons in sorted(rejected_by_source.items())
              },
              'field_failure_count': len(field_failures),
              'field_failure_examples': field_failures[:100],
              'normalization_failure_counts': dict(sorted(normalization_failure_counts.items())),
              'raw_to_display_examples': raw_to_display_examples,
              'completeness_audit': {
                  'complete_product_count': completeness.get('complete_product_count'),
                  'incomplete_product_count': completeness.get('incomplete_product_count'),
                  'complete_ratio': completeness.get('complete_ratio'),
                  'issue_counts': completeness.get('issue_counts'),
              },
              'runtime': runtime,
              'source_quality': {
                  str(row.get('source_id')): row.get('quality', {})
                  for row in status.get('sources', [])
              },
              'quarantine_summary': [
                  {
                      'source_id': row.get('source_id'),
                      'name': row.get('name'),
                      'reason_codes': row.get('reason_codes'),
                      'quality': row.get('quality'),
                  }
                  for row in quarantine.get('sources', [])
              ],
              'sample_products': products[:40],
          }
          Path('deployment/complete-catalog-canary.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps({
              'status': report['status'],
              'active_sources': report['active_sources'],
              'complete_products': report['complete_products'],
              'rejected_products': report['rejected_products'],
              'field_failure_count': report['field_failure_count'],
              'failed_metadata_checks': report['failed_metadata_checks'],
          }, indent=2))
          if report['status'] != 'healthy':
              raise SystemExit('complete catalog normalization canary failed')
          PY
      - name: Record canary evidence
        if: always()
        run: |
          set -euo pipefail
          if test -s deployment/complete-catalog-canary.json; then
            cp deployment/complete-catalog-canary.json /tmp/complete-catalog-canary.json
            git fetch origin deploy/full-stack-hf
            git reset --hard origin/deploy/full-stack-hf
            cp /tmp/complete-catalog-canary.json deployment/complete-catalog-canary.json
            git config user.name "DropFinder Complete Catalog Canary"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add deployment/complete-catalog-canary.json
            if ! git diff --cached --quiet; then
              git commit -m "audit: record normalized complete catalog canary [skip ci]"
              git push origin HEAD:deploy/full-stack-hf
            fi
          fi
