name: Temporary Issue 57 Vendor Documents

on:
  pull_request:
    branches:
      - fix/issue-57-vendor-document-artifact

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'trigger/issue57-vendor-documents'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-57-vendor-document-artifact
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify exact implementation boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          git diff --name-only "$merge_base" HEAD | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            data/vendor_document_sources.json \
            docs/catalog/VENDOR_DOCUMENT_ARTIFACT.md \
            scripts/vendor_adapters/publication_artifact.py \
            tests/test_vendor_document_publication.py \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
          git diff --name-only "$merge_base" HEAD | grep -Fx '.github/workflows/catalog-v4.yml'
      - name: Validate deterministic artifact and attachment
        run: |
          set -euo pipefail
          python -m compileall -q scripts/catalog_v4 scripts/vendor_adapters tests/test_vendor_document_publication.py
          python -m unittest -v tests.test_vendor_document_publication
          python -m scripts.vendor_adapters.publication_artifact \
            --catalog cloud_pages/data/catalog.json \
            --vendor-profiles data/vendor_profiles.json \
            --sources data/vendor_document_sources.json \
            --output /tmp/vendor-documents-a.json
          python -m scripts.vendor_adapters.publication_artifact \
            --catalog cloud_pages/data/catalog.json \
            --vendor-profiles data/vendor_profiles.json \
            --sources data/vendor_document_sources.json \
            --output /tmp/vendor-documents-a.json \
            --verify-only
          python -m scripts.vendor_adapters.publication_artifact \
            --catalog cloud_pages/data/catalog.json \
            --vendor-profiles data/vendor_profiles.json \
            --sources data/vendor_document_sources.json \
            --output /tmp/vendor-documents-b.json
          cmp /tmp/vendor-documents-a.json /tmp/vendor-documents-b.json
          python - <<'PY'
          import json
          payload=json.load(open('/tmp/vendor-documents-a.json',encoding='utf-8'))
          assert payload['counts']['source_documents']==8,payload['counts']
          assert payload['counts']['mapped_documents']+payload['counts']['unmatched_documents']==8,payload['counts']
          assert all(row['reason'] for row in payload['unmatched_documents'])
          PY
      - name: Validate complete Catalog V4 composition
        run: |
          set -euo pipefail
          python -m scripts.catalog_v4.selftest
          python -m unittest discover -s tests/catalog_v4 -v
          rm -rf /tmp/catalog-v4-issue57
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --documents /tmp/vendor-documents-a.json \
            --output /tmp/catalog-v4-issue57 \
            --detail-shards 16 \
            --minimum-products 1 \
            --minimum-variants 1
          python -m scripts.catalog_v4 \
            --input cloud_pages/data/catalog.json \
            --documents /tmp/vendor-documents-a.json \
            --output /tmp/catalog-v4-issue57 \
            --verify-only
      - uses: actions/upload-artifact@v4
        with:
          name: issue57-vendor-document-artifact
          path: |
            /tmp/vendor-documents-a.json
            /tmp/catalog-v4-issue57/catalog-v4
          if-no-files-found: error
          retention-days: 7
      - name: Remove temporary workflow
        shell: bash
        run: |
          git rm .github/workflows/tmp-issue57-vendor-documents.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove issue 57 execution workflow"
          git push origin HEAD:fix/issue-57-vendor-document-artifact
