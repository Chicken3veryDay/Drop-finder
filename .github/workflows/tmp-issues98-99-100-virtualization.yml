name: Temporary Issues 98 99 100 Virtualization

on:
  pull_request:
    branches:
      - fix/issues-98-99-virtualization-focus-anchor

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/issues98-99-100-virtualization'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issues-98-99-virtualization-focus-anchor
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply virtualization repair and regressions
        run: |
          python .github/tmp/issues98_99_100_virtualization.py
          python .github/tmp/write_virtualization_tests.py
      - name: Verify exact source boundary
        shell: bash
        run: |
          git fetch origin main
          merge_base=$(git merge-base origin/main HEAD)
          {
            git diff --name-only "$merge_base" HEAD
            git diff --name-only HEAD
            git ls-files --others --exclude-standard
          } | grep -v '^\.github/' | sort -u > /tmp/actual-files
          printf '%s\n' \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/marketplace-virtualization.test.tsx \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/virtual-focus-anchor.test.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Validate focused and complete frontend contracts
        working-directory: web
        run: |
          npx vitest run src/features/integration/marketplace-virtualization.test.tsx src/features/integration/marketplace-integration.test.ts
          node --test test/virtual-focus-anchor.test.mjs test/virtual-page-retention.test.mjs test/platform.test.mjs
          npm run lint
          npm run typecheck
          npm test
          npm run benchmark
          npm run build
          npm run build:platform
          npm run analyze:chunks
          npm run pwa:check
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Validate integrated virtualization behavior
        working-directory: web
        run: npx playwright test tests/e2e/platform.spec.mjs --project=chromium
      - name: Commit clean implementation
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-issues98-99-100-virtualization.yml \
            .github/tmp/issues98_99_100_virtualization.py \
            .github/tmp/write_virtualization_tests.py
          git add \
            web/src/features/integration/register-marketplace-props.tsx \
            web/src/features/integration/marketplace-virtualization.test.tsx \
            web/src/platform/virtualization/virtual-marketplace-adapter.js \
            web/test/virtual-focus-anchor.test.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: reset semantic queries and preserve focus continuity"
          git push origin HEAD:fix/issues-98-99-virtualization-focus-anchor
