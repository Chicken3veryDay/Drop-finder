name: Temporary PR 309 Browser Repair

on:
  pull_request:
    branches:
      - fix/issues-34-46-query-pagination-retention-current-main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'trigger/pr309-browser-repair'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issues-34-46-query-pagination-retention-current-main
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply browser integration repair
        run: |
          python .github/tmp/pr309_browser_repair.py
          python .github/tmp/pr309_browser_test_repair.py
      - name: Verify exact repair boundary
        shell: bash
        run: |
          git diff --name-only HEAD | grep -v '^\.github/' | sort > /tmp/actual-files
          printf '%s\n' \
            web/src/features/marketplace/MarketplaceFeature.query-path.test.tsx \
            web/src/features/marketplace/MarketplaceFeature.tsx \
            web/tests/e2e/fixtures/harness.js \
            web/tests/e2e/platform.spec.mjs \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
      - name: Install frozen frontend dependencies
        working-directory: web
        run: npm ci
      - name: Validate focused semantic query and platform contracts
        working-directory: web
        run: |
          npx vitest run \
            src/features/marketplace/MarketplaceFeature.query-path.test.tsx \
            src/features/integration/marketplace-integration.test.ts
          node --test test/virtual-page-retention.test.mjs test/platform.test.mjs
      - name: Validate complete frontend contracts
        working-directory: web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run benchmark
          npm run build
      - name: Validate focused Chromium interaction paths
        working-directory: web
        run: |
          npx playwright install --with-deps chromium
          npx playwright test \
            tests/e2e/integrated-app.spec.mjs \
            tests/e2e/platform.spec.mjs \
            --project=chromium
      - name: Commit clean repair
        shell: bash
        run: |
          git rm \
            .github/workflows/tmp-pr309-browser-repair.yml \
            .github/tmp/pr309_browser_repair.py \
            .github/tmp/pr309_browser_test_repair.py
          git add \
            web/src/features/marketplace/MarketplaceFeature.query-path.test.tsx \
            web/src/features/marketplace/MarketplaceFeature.tsx \
            web/tests/e2e/fixtures/harness.js \
            web/tests/e2e/platform.spec.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: preserve expanded rows across detail enrichment"
          git push origin HEAD:fix/issues-34-46-query-pagination-retention-current-main
