name: Temporary Patch Price Minor Units

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/price-minor-units'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/price-minor-units
          fetch-depth: 0
      - name: Patch first-party JSON minor-unit normalization
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('scripts/source_recovery.py')
          text = source.read_text(encoding='utf-8')

          if '_MINOR_UNIT = re.compile(' not in text:
              marker = '_DOLLAR = re.compile'
              index = text.find(marker)
              if index < 0:
                  raise SystemExit('dollar-regex insertion marker missing')
              addition = '''_MINOR_UNIT = re.compile(
              r'["\\'](?:currency_minor_unit|currencyMinorUnit)["\\']\\s*:\\s*["\\']?([0-4])',
              re.I,
          )
          _SHOPIFY_CENT_STATE = re.compile(
              r'(?:Shopify|["\\']price_(?:min|max|varies)["\\']|["\\']compare_at_price["\\'])',
              re.I,
          )
          '''
              text = text[:index] + addition + text[index:]

          if 'def _json_price(' not in text:
              marker = 'def extract_first_party_price('
              index = text.find(marker)
              if index < 0:
                  raise SystemExit('price-function insertion marker missing')
              addition = '''def _json_price(core: Any, raw: str, payload: str) -> float | None:
              parsed = _valid_price(core, raw)
              if parsed is None:
                  return None
              raw_text = str(raw).strip()
              if "." in raw_text or parsed < 1000:
                  return parsed
              document = payload[:1_500_000]
              minor_match = _MINOR_UNIT.search(document)
              minor_unit = int(minor_match.group(1)) if minor_match else None
              if minor_unit == 2 or _SHOPIFY_CENT_STATE.search(document):
                  normalized = round(parsed / 100, 4)
                  return normalized if normalized >= 1 else None
              return parsed


          '''
              text = text[:index] + addition + text[index:]

          old = '''    if not candidates:
              for raw in _JSON_PRICE.findall(payload[:1_500_000]):
                  parsed = _valid_price(core, raw)
          '''
          new = '''    if not candidates:
              for raw in _JSON_PRICE.findall(payload[:1_500_000]):
                  parsed = _json_price(core, raw, payload)
          '''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'expected one JSON fallback loop, found {text.count(old)}')
              text = text.replace(old, new, 1)
          source.write_text(text, encoding='utf-8')

          test_path = Path('tests/catalog_v4/test_source_recovery.py')
          tests = test_path.read_text(encoding='utf-8')
          if 'test_json_price_minor_units_are_normalized_only_with_framework_evidence' not in tests:
              marker = '    def test_route_overrides_remove_known_dead_paths(self):\n'
              index = tests.find(marker)
              if index < 0:
                  raise SystemExit('source-recovery test insertion marker missing')
              addition = '''    def test_json_price_minor_units_are_normalized_only_with_framework_evidence(self):
              woo_minor = '<script>{"currency_minor_unit":2,"price":"2900"}</script>'
              shopify_theme = '<script>Shopify.theme={};{"price":3750,"price_min":3750}</script>'
              ordinary_dollars = '<script>{"price":1600}</script>'
              explicit_decimal = '<script>{"price":"37.50"}</script>'
              self.assertEqual(source_recovery.extract_first_party_price(PriceCore, woo_minor), 29.0)
              self.assertEqual(source_recovery.extract_first_party_price(PriceCore, shopify_theme), 37.5)
              self.assertEqual(source_recovery.extract_first_party_price(PriceCore, ordinary_dollars), 1600.0)
              self.assertEqual(source_recovery.extract_first_party_price(PriceCore, explicit_decimal), 37.5)

          '''
              tests = tests[:index] + addition + tests[index:]
          test_path.write_text(tests, encoding='utf-8')
          PY
          git diff --check
          python -m py_compile scripts/source_recovery.py
          python -m unittest -v tests.catalog_v4.test_source_recovery
          git config user.name 'dropfinder-maintenance-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/source_recovery.py tests/catalog_v4/test_source_recovery.py
          git commit -m 'fix: normalize first-party JSON price minor units'
          git push origin HEAD:fix/price-minor-units
