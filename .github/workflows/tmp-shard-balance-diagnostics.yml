name: Temporary Shard Balance Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/balance-autonomous-shards'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          {
            python -m py_compile scripts/vendor_expansion.py
            echo compile_exit=$?
            python -m unittest -v tests.catalog_v4.test_vendor_expansion_balancing
            echo balance_test_exit=$?
            python scripts/autonomous_worker_v4.py --self-test
            echo worker_self_test_exit=$?
            python -m unittest discover -s tests -v
            echo discover_exit=$?
          } > shard-balance-diagnostics.txt 2>&1
          cat shard-balance-diagnostics.txt
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: shard-balance-diagnostics
          path: shard-balance-diagnostics.txt
          if-no-files-found: error
          retention-days: 1
