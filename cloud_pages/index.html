<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DropFinder Cloud</title><style>
:root{color-scheme:dark;--bg:#080b10;--panel:#111722;--line:#263142;--text:#eef4ff;--muted:#96a4b8;--good:#54d18b;--bad:#ff7a88;--accent:#78a9ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 system-ui,-apple-system,sans-serif}header{position:sticky;top:0;z-index:2;background:#080b10e8;backdrop-filter:blur(12px);padding:18px 16px 12px;border-bottom:1px solid var(--line)}h1{font-size:22px;margin:0}.sub{color:var(--muted);margin-top:4px}.wrap{max-width:1100px;margin:auto;padding:14px}.notice{padding:14px;margin-bottom:12px;background:#121a27;border:1px solid #33445c;border-radius:14px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat,.card{background:var(--panel);border:1px solid var(--line);border-radius:14px}.stat{padding:13px}.stat b{font-size:21px;display:block}.stat span,.meta{color:var(--muted);font-size:12px}.tools{display:grid;grid-template-columns:1fr auto;gap:9px;margin:14px 0}input,select{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px;color:var(--text);min-width:0}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:11px}.card{padding:14px}.name{font-weight:700;font-size:16px}.price{font-size:20px;font-weight:750;margin:7px 0}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;margin:4px 4px 0 0;color:var(--muted);font-size:12px}.good{color:var(--good)}.bad{color:var(--bad)}a{color:var(--accent);text-decoration:none}.empty{padding:28px;text-align:center;color:var(--muted)}@media(max-width:520px){.stats{grid-template-columns:1fr 1fr}.stats .stat:last-child{grid-column:1/-1}}
</style></head><body><header><h1>DropFinder Cloud</h1><div class="sub" id="updated">Loading published snapshot…</div></header><main class="wrap"><div class="notice"><b>Recovery deployment</b><div class="meta">The dashboard is online as a read-only static snapshot. Product collection remains unavailable until the full application source import is completed.</div></div><section class="stats"><div class="stat"><b id="products">—</b><span>products</span></div><div class="stat"><b id="sources">—</b><span>configured sources</span></div><div class="stat"><b id="healthy">—</b><span>certified routes</span></div></section><div class="tools"><input id="q" type="search" placeholder="Search products or vendors"><select id="sort"><option value="price">Lowest price</option><option value="value">Best $/g</option><option value="name">Name</option></select></div><section class="grid" id="grid"><div class="empty">Loading…</div></section></main><script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let data=[];
function render(){let q=document.querySelector('#q').value.toLowerCase(),sort=document.querySelector('#sort').value;let rows=data.filter(x=>`${x.name} ${x.vendor} ${x.source_id}`.toLowerCase().includes(q));rows.sort((a,b)=>sort==='name'?String(a.name).localeCompare(String(b.name)):(sort==='value'?(a.price_per_gram??1e12)-(b.price_per_gram??1e12):(a.price??1e12)-(b.price??1e12)));document.querySelector('#grid').innerHTML=rows.length?rows.map(x=>`<article class="card"><div class="name">${esc(x.name)}</div><div class="meta">${esc(x.vendor||x.source_id)}</div><div class="price">${x.price!=null?'$'+Number(x.price).toFixed(2):'Price unavailable'}</div>${x.price_per_gram!=null?`<span class="pill">$${Number(x.price_per_gram).toFixed(2)}/g</span>`:''}${x.grams!=null?`<span class="pill">${esc(x.grams)}g</span>`:''}<span class="pill ${x.availability==='in_stock'?'good':''}">${esc(x.availability||'unknown')}</span><div style="margin-top:12px"><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">Open product ↗</a></div></article>`).join(''):'<div class="empty">No products are present in the current published snapshot.</div>'}
Promise.all([fetch('data/catalog.json',{cache:'no-store'}).then(r=>r.json()),fetch('data/status.json',{cache:'no-store'}).then(r=>r.json())]).then(([c,s])=>{data=c.products||[];document.querySelector('#products').textContent=data.length;document.querySelector('#sources').textContent=s.source_count??0;document.querySelector('#healthy').textContent=s.healthy_routes??0;document.querySelector('#updated').textContent=`Published ${s.generated_at||'unknown'} · read-only snapshot`;render()}).catch(()=>{document.querySelector('#grid').innerHTML='<div class="empty bad">Published data files could not be loaded.</div>';document.querySelector('#updated').textContent='Snapshot load failed'});document.querySelector('#q').addEventListener('input',render);document.querySelector('#sort').addEventListener('change',render);
</script></body></html>
