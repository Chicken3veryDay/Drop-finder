<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080c13">
<meta name="description" content="Compare verified THCA flower listings across trusted storefronts.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>DropFinder</title>
<style>
:root{color-scheme:dark;--bg:#080c13;--panel:#0e1520;--panel-2:#121b28;--panel-3:#172233;--line:#233149;--line-strong:#344766;--text:#f3f7ff;--muted:#8f9fb7;--subtle:#66758d;--accent:#77adff;--accent-strong:#9bc4ff;--good:#52d79a;--warn:#f5c56b;--bad:#ff7f91;--radius:18px}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 75% -20%,rgba(41,91,160,.22),transparent 42%),var(--bg);color:var(--text);font:15px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,select{font:inherit}button,a{-webkit-tap-highlight-color:transparent}a{color:inherit;text-decoration:none}button{cursor:pointer}
.header{position:sticky;top:0;z-index:30;border-bottom:1px solid rgba(35,49,73,.86);background:rgba(8,12,19,.9);backdrop-filter:blur(16px);padding:calc(11px + env(safe-area-inset-top)) 14px 11px}
.header-inner{max-width:1280px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:11px;min-width:0}.mark{width:39px;height:39px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;background:linear-gradient(145deg,#8ab7ff,#58d5b3);color:#07111d;font-size:15px;font-weight:950;box-shadow:0 8px 24px rgba(74,145,255,.2)}.brand-copy{min-width:0}.brand-title{font-size:18px;font-weight:900;letter-spacing:-.025em}.brand-meta{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58vw}.header-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.action{min-height:40px;border:1px solid var(--line);border-radius:12px;background:var(--panel-2);color:var(--text);padding:9px 12px;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:800;font-size:13px}.action:hover{border-color:var(--line-strong);background:var(--panel-3)}.action.primary{border-color:transparent;background:linear-gradient(135deg,#3979d7,#277f77)}.status-dot{width:8px;height:8px;border-radius:999px;background:var(--good);box-shadow:0 0 0 4px rgba(82,215,154,.1)}
.wrap{max-width:1280px;margin:auto;padding:16px 14px calc(44px + env(safe-area-inset-bottom))}.toolbar{position:sticky;top:62px;z-index:20;margin:0 -5px 14px;padding:8px 5px;background:linear-gradient(to bottom,rgba(8,12,19,.97) 70%,rgba(8,12,19,0));backdrop-filter:blur(12px)}.filters{display:grid;grid-template-columns:minmax(220px,1.75fr) repeat(3,minmax(130px,.66fr)) auto;gap:8px}.field{width:100%;min-height:44px;border:1px solid var(--line);border-radius:13px;background:var(--panel);color:var(--text);padding:10px 12px;outline:none}.field::placeholder{color:#6f7e94}.field:focus{border-color:#5287d6;box-shadow:0 0 0 3px rgba(82,135,214,.16)}.favorite-filter{min-width:46px;padding:9px 12px;color:var(--subtle);font-size:18px}.favorite-filter.active{color:#ffd06f;border-color:#6e5932;background:#211c13}.results-meta{min-height:29px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 2px 0;color:var(--muted);font-size:12px}.results-meta strong{color:var(--text);font-weight:850}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;contain:layout style}.card{position:relative;display:grid;grid-template-columns:112px minmax(0,1fr);gap:14px;min-height:190px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(145deg,var(--panel),#101925);content-visibility:auto;contain:layout paint style;contain-intrinsic-size:190px 380px;transition:transform .14s ease,border-color .14s ease}.card:hover{transform:translateY(-1px);border-color:#3b506f}.media{position:relative;width:112px;height:132px;border-radius:15px;overflow:hidden;border:1px solid #2a3850;background:linear-gradient(145deg,#182438,#111a28);display:grid;place-items:center;contain:strict}.media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#111925}.image-fallback{font-weight:950;color:#536580;letter-spacing:.08em}.favorite{position:absolute;top:10px;right:10px;width:36px;height:36px;border:1px solid rgba(45,61,86,.9);border-radius:11px;background:rgba(9,14,22,.86);color:#7788a2;font-size:20px;line-height:1;z-index:2}.favorite.active{color:#ffd06f;border-color:#705c33;background:#211c13}.card-body{min-width:0;display:flex;flex-direction:column}.vendor-row{display:flex;align-items:center;gap:7px;padding-right:36px;color:var(--muted);font-size:12px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.availability-dot{width:7px;height:7px;flex:0 0 auto;border-radius:999px;background:var(--subtle)}.availability-dot.in_stock{background:var(--good)}.availability-dot.out_of_stock{background:var(--bad)}.name{margin:5px 38px 0 0;font-size:16px;line-height:1.28;font-weight:880;letter-spacing:-.015em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.price-row{display:flex;align-items:baseline;gap:7px;margin-top:10px;min-height:34px}.price{font-size:26px;line-height:1;font-weight:950;letter-spacing:-.04em}.facts{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;min-height:25px}.fact{border:1px solid var(--line);background:#0a111b;border-radius:999px;padding:4px 8px;color:var(--muted);font-size:11px;line-height:1.2;white-space:nowrap}.fact.value{color:var(--accent-strong);border-color:#304d75;background:#0d1828;font-weight:800}.fact.good{color:var(--good);border-color:#275944}.fact.bad{color:var(--bad);border-color:#65313b}.card-link{margin-top:auto;padding-top:12px;display:flex;align-items:center;justify-content:space-between;color:var(--accent-strong);font-size:13px;font-weight:850}.card-link::after{content:'↗';font-size:17px}.empty{grid-column:1/-1;padding:64px 20px;border:1px dashed var(--line);border-radius:var(--radius);text-align:center;color:var(--muted);background:rgba(14,21,32,.45)}
.drawer-backdrop{position:fixed;inset:0;z-index:50;display:none;background:rgba(0,0,0,.68);backdrop-filter:blur(4px)}.drawer-backdrop.open{display:block}.drawer{position:absolute;top:0;right:0;bottom:0;width:min(480px,94vw);overflow:auto;padding:calc(18px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));border-left:1px solid var(--line);background:var(--bg)}.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:15px}.drawer h2{margin:0;font-size:20px}.small{color:var(--muted);font-size:12px}.close{border:1px solid var(--line);border-radius:11px;background:var(--panel);color:var(--text);padding:8px 11px}.source{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;padding:12px;border:1px solid var(--line);border-radius:13px;background:var(--panel)}.source-name{font-weight:800}.source-meta{color:var(--muted);font-size:11px;margin-top:2px}.source-status{font-size:11px;font-weight:850;text-transform:capitalize}.source-status.healthy{color:var(--good)}.source-status.quarantined,.source-status.degraded{color:var(--warn)}.source-status.error{color:var(--bad)}
@media(max-width:850px){.filters{grid-template-columns:1fr 1fr 1fr auto}.filters .search{grid-column:1/-1}.toolbar{top:62px}}
@media(max-width:620px){.header{padding-left:11px;padding-right:11px;backdrop-filter:none}.header-actions .source-label{display:none}.action{padding-left:10px;padding-right:10px}.wrap{padding-left:10px;padding-right:10px}.toolbar{position:static;margin-bottom:10px;background:transparent;backdrop-filter:none}.filters{grid-template-columns:1fr 1fr auto}.filters .search{grid-column:1/-1}.filters #sort{grid-column:1/3}.grid{grid-template-columns:1fr;gap:10px}.card{grid-template-columns:94px minmax(0,1fr);gap:12px;min-height:176px;padding:12px;contain-intrinsic-size:176px 360px}.media{width:94px;height:116px;border-radius:14px}.name{font-size:15px;margin-right:34px}.price{font-size:24px}.brand-meta{max-width:42vw}}
@media(max-width:390px){.mark{width:36px;height:36px}.brand-title{font-size:17px}.header-actions{gap:6px}.action{min-height:38px;font-size:12px}.card{grid-template-columns:82px minmax(0,1fr)}.media{width:82px;height:104px}}
@media(hover:none),(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.card,.card-link::after{transition:none}.card:hover{transform:none}.header,.toolbar,.drawer-backdrop{backdrop-filter:none}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="brand"><div class="mark">DF</div><div class="brand-copy"><div class="brand-title">DropFinder</div><div class="brand-meta" id="updated">Loading catalog…</div></div></div><div class="header-actions"><button class="action" id="sourcesButton" type="button"><span class="status-dot"></span><span class="source-label" id="sourceLabel">Sources</span></button><a class="action primary" id="scanButton" href="https://github.com/Chicken3veryDay/Drop-finder/actions/workflows/dropfinder-cloud.yml" target="_blank" rel="noopener">Refresh</a></div></div></header>
<main class="wrap"><section class="toolbar" aria-label="Product filters"><div class="filters"><input class="field search" id="query" type="search" placeholder="Search flower or vendor" autocomplete="off" aria-label="Search products"><select class="field" id="vendor" aria-label="Vendor"><option value="">All vendors</option></select><select class="field" id="stock" aria-label="Availability"><option value="">Any stock</option><option value="in_stock">In stock</option><option value="out_of_stock">Out of stock</option></select><select class="field" id="sort" aria-label="Sort"><option value="ppg">Best verified $/g</option><option value="price">Lowest price</option><option value="name">Name A–Z</option></select><button class="action favorite-filter" id="favoritesOnly" type="button" aria-pressed="false" aria-label="Show favorites only">★</button></div><div class="results-meta"><span id="resultCount" aria-live="polite">Loading…</span><span id="freshness"></span></div></section><section class="grid" id="grid" data-render-complete="false"><div class="empty">Loading catalog…</div></section></main>
<div class="drawer-backdrop" id="drawer"><aside class="drawer" aria-label="Source health"><div class="drawer-head"><div><h2>Source health</h2><div class="small" id="healthSummary"></div></div><button class="close" id="closeDrawer" type="button">Close</button></div><div id="sources"></div></aside></div>
<script>
'use strict';
const $=selector=>document.querySelector(selector);
const esc=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
const number=value=>{if(value===null||value===undefined||value===''||typeof value==='boolean')return null;const n=Number(value);return Number.isFinite(n)?n:null};
const positive=value=>{const n=number(value);return n!==null&&n>0?n:null};
const money=value=>positive(value)!==null?'$'+positive(value).toFixed(2):'—';
const collator=new Intl.Collator(undefined,{numeric:true,sensitivity:'base'});
const schedule=window.requestIdleCallback?(task=>requestIdleCallback(task,{timeout:48})):(task=>requestAnimationFrame(()=>task({didTimeout:true,timeRemaining:()=>8})));
const state={products:[],status:{},favorites:new Set(JSON.parse(localStorage.getItem('dropfinder-favorites')||'[]')),favoritesOnly:false,renderToken:0,metrics:{}};
window.__dropfinderMetrics=state.metrics;
const exactPricing=product=>product._ppg!==null&&['exact_variant','exact_title'].includes(product.pricing_confidence);
function relativeTime(raw){const time=Date.parse(raw||'');if(!Number.isFinite(time))return 'Update time unavailable';const seconds=Math.max(0,Math.floor((Date.now()-time)/1000));if(seconds<60)return 'Updated just now';if(seconds<3600)return `Updated ${Math.floor(seconds/60)}m ago`;if(seconds<86400)return `Updated ${Math.floor(seconds/3600)}h ago`;return `Updated ${Math.floor(seconds/86400)}d ago`}
function saveFavorites(){localStorage.setItem('dropfinder-favorites',JSON.stringify([...state.favorites]))}
function prepare(product){const row={...product};row._price=positive(row.price);row._ppg=positive(row.price_per_gram);row._grams=positive(row.grams);row._thca=positive(row.thca);row._name=String(row.display_name||row.name||'Untitled product');row._search=String(row.search_text||`${row._name} ${row.raw_name||''} ${row.vendor||''} ${row.source_id||''} ${row.package_label||''} ${row.thca||''}`).toLowerCase();return row}
function filtered(){const query=$('#query').value.trim().toLowerCase();const vendor=$('#vendor').value;const stock=$('#stock').value;const sort=$('#sort').value;const large=Number.MAX_SAFE_INTEGER;const rows=state.products.filter(product=>(!query||product._search.includes(query))&&(!vendor||product.source_id===vendor)&&(!stock||product.availability===stock)&&(!state.favoritesOnly||state.favorites.has(product.id)));rows.sort((a,b)=>sort==='name'?collator.compare(a._name,b._name):sort==='price'?(a._price??large)-(b._price??large):(exactPricing(a)?a._ppg:large)-(exactPricing(b)?b._ppg:large));return rows}
function availability(product){if(product.availability==='in_stock')return{label:'In stock',className:'in_stock'};if(product.availability==='out_of_stock')return{label:'Out of stock',className:'out_of_stock'};return{label:'Stock unknown',className:''}}
function card(product){const stock=availability(product);const favorite=state.favorites.has(product.id);const facts=[];if(exactPricing(product))facts.push(`<span class="fact value">${money(product._ppg)}/g</span>`);if(product.package_label||product._grams!==null)facts.push(`<span class="fact">${esc(product.package_label||`${product._grams} g`)}</span>`);if(product._thca!==null&&product._thca<=100)facts.push(`<span class="fact">${esc(product._thca.toFixed(1).replace(/\.0$/,''))}% THCA</span>`);facts.push(`<span class="fact ${stock.className==='in_stock'?'good':'bad'}">${stock.label}</span>`);const image=product.image?`<img loading="lazy" decoding="async" fetchpriority="low" width="112" height="132" src="${esc(product.image)}" alt="" referrerpolicy="no-referrer" onerror="this.remove()">`:'';return `<article class="card" data-product-id="${esc(product.id)}"><div class="media">${image}<span class="image-fallback">DF</span></div><button class="favorite ${favorite?'active':''}" data-favorite="${esc(product.id)}" type="button" aria-label="${favorite?'Remove from':'Add to'} favorites" aria-pressed="${favorite}">★</button><div class="card-body"><div class="vendor-row"><span class="availability-dot ${stock.className}"></span>${esc(product.vendor||product.source_id||'Unknown vendor')}</div><div class="name">${esc(product._name)}</div><div class="price-row"><span class="price">${money(product._price)}</span></div><div class="facts">${facts.join('')}</div><a class="card-link" href="${esc(product.url)}" target="_blank" rel="noopener noreferrer">View product</a></div></article>`}
function render(){const started=performance.now();const token=++state.renderToken;const rows=filtered();const grid=$('#grid');const comparable=rows.filter(exactPricing).length;$('#resultCount').innerHTML=`<strong>${rows.length}</strong> products on this page${comparable?` · ${comparable} with verified unit pricing`:''}`;grid.dataset.renderComplete='false';grid.replaceChildren();if(!rows.length){grid.innerHTML='<div class="empty">No products match these filters.</div>';grid.dataset.renderComplete='true';return}let index=0;const chunkSize=18;const append=deadline=>{if(token!==state.renderToken)return;const markup=[];let count=0;while(index<rows.length&&count<chunkSize&&(deadline.didTimeout||deadline.timeRemaining()>1)){markup.push(card(rows[index++]));count++}grid.insertAdjacentHTML('beforeend',markup.join(''));if(index<rows.length){schedule(append)}else{grid.dataset.renderComplete='true';state.metrics.lastRenderMs=Math.round((performance.now()-started)*100)/100;state.metrics.renderedProducts=rows.length;document.body.dataset.catalogReady='true';document.dispatchEvent(new CustomEvent('dropfinder:render-complete',{detail:{count:rows.length,durationMs:state.metrics.lastRenderMs}}))}};schedule(append)}
function renderSources(){const sources=state.status.sources||[];$('#healthSummary').textContent=`${state.status.healthy_sources||0} healthy · ${state.status.quarantined_sources||0} quarantined`;$('#sourceLabel').textContent=`${state.status.healthy_sources||0} sources`;$('#sources').innerHTML=sources.map(source=>`<div class="source"><div><div class="source-name">${esc(source.name||source.source_id)}</div><div class="source-meta">${esc(source.products||0)} products</div></div><div class="source-status ${esc(source.status||'')}">${esc(source.status||'unknown')}</div></div>`).join('')||'<div class="empty">No source status is available.</div>'}
async function load(){const started=performance.now();try{const[catalog,status]=await Promise.all([fetch('data/catalog.json',{cache:'no-cache'}).then(response=>{if(!response.ok)throw Error(response.status);return response.json()}),fetch('data/status.json',{cache:'no-cache'}).then(response=>{if(!response.ok)throw Error(response.status);return response.json()})]);state.products=(Array.isArray(catalog.products)?catalog.products:[]).map(prepare);state.status=status||{};state.metrics.fetchAndParseMs=Math.round((performance.now()-started)*100)/100;const vendors=[...new Map(state.products.map(product=>[product.source_id,product.vendor||product.source_id])).entries()].sort((a,b)=>collator.compare(String(a[1]),String(b[1])));$('#vendor').innerHTML='<option value="">All vendors</option>'+vendors.map(([id,name])=>`<option value="${esc(id)}">${esc(name)}</option>`).join('');const generated=status.generated_at||catalog.generated_at;$('#updated').textContent=`${state.products.length} verified listings · ${relativeTime(generated)}`;$('#freshness').textContent=relativeTime(generated);renderSources();render()}catch(error){$('#grid').innerHTML='<div class="empty">The catalog could not be loaded. Reload after the service wakes.</div>';$('#grid').dataset.renderComplete='true';$('#updated').textContent='Catalog unavailable'}}
let queryTimer=0;$('#query').addEventListener('input',()=>{clearTimeout(queryTimer);queryTimer=setTimeout(render,75)});['vendor','stock','sort'].forEach(id=>$('#'+id).addEventListener('change',render));$('#favoritesOnly').addEventListener('click',event=>{state.favoritesOnly=!state.favoritesOnly;event.currentTarget.classList.toggle('active',state.favoritesOnly);event.currentTarget.setAttribute('aria-pressed',String(state.favoritesOnly));render()});$('#grid').addEventListener('click',event=>{const button=event.target.closest('[data-favorite]');if(!button)return;const id=button.dataset.favorite;state.favorites.has(id)?state.favorites.delete(id):state.favorites.add(id);saveFavorites();if(state.favoritesOnly){render();return}const active=state.favorites.has(id);button.classList.toggle('active',active);button.setAttribute('aria-pressed',String(active));button.setAttribute('aria-label',`${active?'Remove from':'Add to'} favorites`)});$('#sourcesButton').addEventListener('click',()=>$('#drawer').classList.add('open'));$('#closeDrawer').addEventListener('click',()=>$('#drawer').classList.remove('open'));$('#drawer').addEventListener('click',event=>{if(event.target===$('#drawer'))$('#drawer').classList.remove('open')});document.addEventListener('keydown',event=>{if(event.key==='Escape')$('#drawer').classList.remove('open')});load();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
