<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DropFinder Platform Harness</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#070a0f;color:#eef5ff}*{box-sizing:border-box}body{margin:0;background:#070a0f;color:#eef5ff}label,.controls{color:#eef5ff}button,input,select{font:inherit;color:#eef5ff;-webkit-text-fill-color:#eef5ff;background:#111924;border:1px solid #334155;border-radius:8px;padding:8px}button:focus-visible,input:focus-visible,select:focus-visible,[tabindex]:focus-visible{outline:3px solid #7cb2ff;outline-offset:2px}header{padding:14px;display:grid;gap:10px;position:sticky;top:0;background:#070a0ff2;z-index:2;border-bottom:1px solid #253246}.controls{display:flex;gap:8px;flex-wrap:wrap}.status{font-size:13px;color:#a9b7ca}main{padding:14px}.viewport{height:620px;overflow:auto;border:1px solid #253246;border-radius:12px;contain:strict;background:#0b1119}.row{display:grid;grid-template-columns:minmax(130px,1fr) minmax(100px,.7fr) auto;gap:12px;align-items:start;padding:12px;border-bottom:1px solid #253246;min-height:96px;background:#0e1621}.row[data-expanded="true"]{min-height:220px}.row h2{font-size:16px;margin:0 0 5px}.row p{margin:0;color:#a9b7ca}.actions{display:flex;gap:6px;flex-wrap:wrap}.details{grid-column:1/-1;padding-top:8px}.overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(3px);display:grid;place-items:center;z-index:10;padding:16px}.overlay[hidden]{display:none}.dialog{width:min(900px,96vw);height:min(760px,92vh);display:grid;grid-template-rows:auto 1fr;background:#0e1621;border:1px solid #415976;border-radius:14px;box-shadow:0 20px 80px #000;padding:12px}.dialog-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.document-stage{overflow:auto;display:grid;place-items:start center;padding:12px;background:#070a0f;border-radius:10px}.document-stage canvas{background:white}.fallback{padding:30px}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:600px){header,main{padding:10px}.viewport{height:68vh}.row{grid-template-columns:1fr}.actions,.details{grid-column:1}.dialog{height:95vh;width:98vw}}
  </style>
</head>
<body>
<header>
  <strong>DropFinder platform harness</strong>
  <div class="controls" role="search">
    <label>Search <input id="search" type="search" aria-label="Search vendor or strain"></label>
    <label>Sort <select id="sort" aria-label="Sort results"><option value="lowest_ppg">Lowest PPG</option><option value="highest_total_thc">Highest Total THC</option><option value="strain_az">Strain A-Z</option><option value="vendor_za">Vendor Z-A</option></select></label>
    <label>Weight <select id="weight" aria-label="Weight"><option value="">All</option><option value="7">7 g</option><option value="14">14 g</option><option value="28">28 g</option></select></label>
    <button id="unsupported" type="button">Open unsupported</button>
    <button id="simulate-update" type="button">Simulate update</button>
  </div>
  <div class="status" id="status" aria-live="polite">Initializing…</div>
</header>
<main id="main" data-ready="false">
  <div id="viewport" class="viewport" tabindex="0">
    <div id="feed" role="feed" aria-label="Marketplace results"></div>
  </div>
</main>
<div id="overlay" class="overlay" hidden>
  <section id="dialog" class="dialog" role="dialog" aria-modal="true" aria-labelledby="document-title" tabindex="-1">
    <div class="dialog-toolbar">
      <strong id="document-title">Product document</strong>
      <button id="previous-page" type="button">Previous page</button>
      <span id="page-status">Page 1</span>
      <button id="next-page" type="button">Next page</button>
      <button id="zoom-out" type="button">Zoom out</button>
      <button id="zoom-in" type="button">Zoom in</button>
      <button id="fit-width" type="button">Fit width</button>
      <a id="open-original" href="./sample.pdf" target="_blank" rel="noopener">Open original</a>
      <button id="close-dialog" type="button">Close</button>
    </div>
    <div id="document-stage" class="document-stage" tabindex="0" aria-label="Scrollable document page"><canvas id="pdf-canvas" role="img" aria-label="Rendered PDF page"></canvas><div id="document-fallback" class="fallback" hidden></div></div>
  </section>
</div>
<script type="module" src="./harness.js"></script>
</body>
</html>
